title = "Ectropy Platform - GitLeaks Configuration"

[extend]
# Extend default GitLeaks rules
useDefault = true

[[rules]]
description = "Ectropy specific secrets"
id = "ectropy-api-key"
regex = '''(?i)(ectropy[_-]?api[_-]?key)[\s=:'"]{1,3}([a-zA-Z0-9]{32,})'''
tags = ["secret", "api-key", "ectropy"]

[[rules]]
description = "Database connection strings"
id = "database-url"
regex = '''(?i)(database[_-]?url|db[_-]?url)[\s=:'"]{1,3}(postgresql://[^${][^\s'"${]{10,})'''
tags = ["secret", "database"]

[[rules]]
description = "JWT secrets"
id = "jwt-secret"
regex = '''(?i)(jwt[_-]?secret|token[_-]?secret)[\s=:'"]{1,3}([a-zA-Z0-9+/]{32,})'''
tags = ["secret", "jwt"]

[[rules]]
description = "Development environment exclusions"
id = "dev-env-safe"
regex = '''(?i)(dev_secure_|development_|local_dev_)[a-zA-Z0-9_]*[\s=:'"]{1,3}[a-zA-Z0-9+/]{8,}'''
tags = ["dev", "safe"]

[allowlist]
description = "Allow template and example files"
files = [
    '''.env.template''',
    '''.env.example''',
    '''.env.staging.example''',
    '''.env.production.template''',
    '''.env.ci''',
    '''.devcontainer/.env.dev''',
    '''.devcontainer/.env.template''',
    '''.devcontainer/docker-compose.yml''',
    '''docs/.*''',
    '''README.md''',
    '''archive/.*''',
    '''docs/DEPLOYMENT_SECRETS.md''',
    '''docs/deployment/GITHUB_SECRETS_SETUP_GUIDE.md''',
    '''docs/security/.*''',
    '''environments/.*\.template''',
    '''environments/.*\.example''',
    '''.env.ci''',
    '''(.*)?\.env\.template''',
    '''(.*)?\.env\.example''',
    '''(.*)?example.*''',
    '''(.*)?template.*''',
    '''.devcontainer/.*''',
    '''docs/.*''',
    '''archive/.*''',
    '''.security-remediation-backup/.*''',
    '''logs/.*''',
    '''test-data/.*''',
    '''.*\.md$''',  # All Markdown files
    '''.*README.*''',
    '''apps/.*/README.md''',
    '''scripts/seed-users.sh''',  # Development seed script
    '''scripts/provision-test-database.sh''',  # Test database script
    '''scripts/security/setup-secure-config.sh''',  # Setup script with templates
    '''scripts/security-audit-and-fix.sh''',  # Audit script with examples
    '''scripts/configure-sharp-enterprise.ts''',  # TypeScript configuration script
    '''scripts/security/secrets-scanner.sh''',  # This secrets scanner script itself
    '''tools/dev-setup/.*''',  # Development setup scripts
    '''validate-deployment-fixes.sh''',  # Validation script with patterns
    '''.nx/.*''',  # Nx workspace data
    '''nx-graph.json''',  # Nx graph file
]

