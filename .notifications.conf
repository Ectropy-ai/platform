# Ectropy Deployment Notification Configuration
# Edit these values and uncomment to enable notifications
# Environment variables will override these settings

# Slack Integration
# Set SLACK_WEBHOOK_URL environment variable or uncomment below
#SLACK_WEBHOOK_URL="https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"

# Email Configuration  
# Set EMAIL_TO and EMAIL_SMTP_HOST environment variables or uncomment below
#EMAIL_SMTP_HOST="smtp.gmail.com"
#EMAIL_SMTP_PORT="587"
#EMAIL_USERNAME="your-email@gmail.com"
#EMAIL_PASSWORD="your-app-password"
#EMAIL_FROM="noreply@ectropy.com"
#EMAIL_TO="admin@ectropy.com"

# Discord Integration
# Set DISCORD_WEBHOOK_URL environment variable or uncomment below
#DISCORD_WEBHOOK_URL="https://discord.com/api/webhooks/YOUR/DISCORD/WEBHOOK"

# Microsoft Teams Integration
# Set TEAMS_WEBHOOK_URL environment variable or uncomment below
#TEAMS_WEBHOOK_URL="https://your-tenant.webhook.office.com/YOUR/TEAMS/WEBHOOK"

# Telegram Integration
# Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID environment variables or uncomment below
#TELEGRAM_BOT_TOKEN="your-bot-token"
#TELEGRAM_CHAT_ID="your-chat-id"

# Generic Webhook
# Set WEBHOOK_URL environment variable or uncomment below
#WEBHOOK_URL="https://your-webhook-endpoint.com/notifications"

# Notification Level (INFO, WARNING, ERROR)
# Controls which notifications are sent. ERROR = only failures, WARNING = failures and warnings, INFO = all
NOTIFICATION_LEVEL="${NOTIFICATION_LEVEL:-INFO}"

# Rate Limiting (notifications per hour)
# Prevents notification spam - set to 0 to disable rate limiting
MAX_NOTIFICATIONS_PER_HOUR="${MAX_NOTIFICATIONS_PER_HOUR:-20}"

# Fallback behavior when no channels are configured
# Set to "fail" to make deployments fail when notifications can't be sent
# Set to "warn" to log warnings but continue deployment (recommended)
NOTIFICATION_FALLBACK_MODE="${NOTIFICATION_FALLBACK_MODE:-warn}"
