# 🏗️ SPECKLE SERVER DEPLOYMENT - ENTERPRISE BIM COLLABORATION
# Enhanced Speckle server with your DAO governance integration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speckle-server
  namespace: ectropy-production
  labels:
    app: speckle-server
    tier: bim
    component: collaboration
spec:
  replicas: 2 # Scale for enterprise BIM collaboration
  selector:
    matchLabels:
      app: speckle-server
  template:
    metadata:
      labels:
        app: speckle-server
      annotations:
        security.ectropy.io/access-control: 'dao-governed'
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: ectropy-service-account
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: speckle-server
          image: speckle/speckle-server:2
          ports:
            - containerPort: 3000
              name: http
          env:
            # Core Speckle configuration
            - name: CANONICAL_URL
              valueFrom:
                configMapKeyRef:
                  name: ectropy-config
                  key: CANONICAL_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: SESSION_SECRET
            - name: STRATEGY_LOCAL
              value: 'true'
            - name: NODE_ENV
              value: 'production'

            # Database configuration (shared with your platform)
            - name: DATABASE_URL
              value: 'postgres://ectropy:$(DB_PASSWORD)@postgresql-service:5432/ectropy_federated_platform'
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: DB_PASSWORD

            # Redis configuration
            - name: REDIS_URL
              value: 'redis://:$(REDIS_PASSWORD)@redis-service:6379'
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: REDIS_PASSWORD

            # S3/MinIO configuration (validated by your security system)
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ectropy-config
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: S3_SECRET_KEY
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ectropy-config
                  key: S3_BUCKET
            - name: S3_CREATE_BUCKET
              value: 'true'

            # File upload configuration for enterprise BIM
            - name: FILE_SIZE_LIMIT_MB
              valueFrom:
                configMapKeyRef:
                  name: ectropy-config
                  key: FILE_SIZE_LIMIT_MB
            - name: FILEIMPORT_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: ectropy-config
                  key: FILEIMPORT_TIMEOUT

            # Performance optimization
            - name: NODE_OPTIONS
              value: '--max-old-space-size=6144' # 6GB for large BIM models

            # Security configuration
            - name: DISABLE_TRACKING
              value: 'true'
            - name: LOG_LEVEL
              value: 'info'

          # Enterprise resource allocation for BIM processing
          resources:
            requests:
              memory: '4Gi'
              cpu: '2'
            limits:
              memory: '8Gi'
              cpu: '4'
          livenessProbe:
            httpGet:
              path: /graphql?query={serverInfo{version}}
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /graphql?query={serverInfo{version}}
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: speckle-server-service
  namespace: ectropy-production
  labels:
    app: speckle-server
    tier: bim
spec:
  selector:
    app: speckle-server
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

---
# Speckle Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speckle-frontend
  namespace: ectropy-production
  labels:
    app: speckle-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speckle-frontend
  template:
    metadata:
      labels:
        app: speckle-frontend
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: speckle-frontend
          image: speckle/speckle-frontend-2:2
          ports:
            - containerPort: 8080
          env:
            - name: NUXT_PUBLIC_SERVER_NAME
              value: 'Ectropy Federated Construction Platform'
            - name: NUXT_PUBLIC_API_ORIGIN
              value: 'https://speckle.ectropy.io'
            - name: NUXT_PUBLIC_BACKEND_API_ORIGIN
              value: 'http://speckle-server-service:3000'
            - name: NUXT_PUBLIC_BASE_URL
              value: 'https://speckle.ectropy.io'
            - name: NUXT_REDIS_URL
              value: 'redis://:$(REDIS_PASSWORD)@redis-service:6379'
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: '1Gi'
              cpu: '500m'
            limits:
              memory: '2Gi'
              cpu: '1'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: speckle-frontend-service
  namespace: ectropy-production
  labels:
    app: speckle-frontend
spec:
  selector:
    app: speckle-frontend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP

---
# Horizontal Pod Autoscaler for Speckle Server
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: speckle-server-hpa
  namespace: ectropy-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: speckle-server
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
