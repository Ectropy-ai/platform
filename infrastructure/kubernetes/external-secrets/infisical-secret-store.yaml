apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: infisical-secret-store
  namespace: ectropy-dev
spec:
  provider:
    webhook:
      url: "https://app.infisical.com/api/v3/secrets/raw"
      method: GET
      headers:
        Authorization: "Bearer {{ .auth.token }}"
        Content-Type: "application/json"
      secrets:
        - name: infisical-token
          key: token
          secretRef:
            name: infisical-credentials
            key: token
      body: |
        {
          "workspaceId": "{{ .workspaceId }}",
          "environment": "{{ .environment }}"
        }
      result:
        jsonPath: "$.secret.secretValue"
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: infisical-secret-store-staging
  namespace: ectropy-staging
spec:
  provider:
    webhook:
      url: "https://app.infisical.com/api/v3/secrets/raw"
      method: GET
      headers:
        Authorization: "Bearer {{ .auth.token }}"
        Content-Type: "application/json"
      secrets:
        - name: infisical-token
          key: token
          secretRef:
            name: infisical-credentials
            key: token
      body: |
        {
          "workspaceId": "{{ .workspaceId }}",
          "environment": "staging"
        }
      result:
        jsonPath: "$.secret.secretValue"
---
# Infisical authentication secret (manually created)
apiVersion: v1
kind: Secret
metadata:
  name: infisical-credentials
  namespace: ectropy-dev
type: Opaque
data:
  # Base64 encoded Infisical service token
  # Create with: echo -n "your-infisical-token" | base64
  token: # TO_BE_REPLACED_WITH_ACTUAL_TOKEN
---
apiVersion: v1
kind: Secret
metadata:
