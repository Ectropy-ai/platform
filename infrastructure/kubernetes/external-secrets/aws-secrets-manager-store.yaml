apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store
  namespace: ectropy-production
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Use IRSA (IAM Roles for Service Accounts) for production
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager-store-staging
  namespace: ectropy-staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
---
# Service Account for IRSA (production)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: ectropy-production
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ectropy-external-secrets-role
---
# AWS credentials for staging (using access keys)
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: ectropy-staging
type: Opaque
data:
  # Base64 encoded AWS credentials
  # Create with: echo -n "your-access-key" | base64
  access-key-id: # TO_BE_REPLACED_WITH_ACTUAL_KEY
  secret-access-key: # TO_BE_REPLACED_WITH_ACTUAL_SECRET