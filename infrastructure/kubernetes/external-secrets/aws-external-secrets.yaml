apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ectropy-production-secrets
  namespace: ectropy-production
spec:
  refreshInterval: 10m  # Longer interval for production stability
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: ectropy-production-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: ectropy
          environment: production
          managed-by: external-secrets
          classification: critical
      data:
        # Core infrastructure secrets
        POSTGRES_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        REDIS_PASSWORD: "{{ .REDIS_PASSWORD }}"
        JWT_SECRET: "{{ .JWT_SECRET }}"
        JWT_REFRESH_SECRET: "{{ .JWT_REFRESH_SECRET }}"
        ENCRYPTION_KEY: "{{ .ENCRYPTION_KEY }}"
        # Speckle BIM secrets
        SPECKLE_POSTGRES_PASSWORD: "{{ .SPECKLE_POSTGRES_PASSWORD }}"
        SPECKLE_REDIS_PASSWORD: "{{ .SPECKLE_REDIS_PASSWORD }}"
        SPECKLE_SESSION_SECRET: "{{ .SPECKLE_SESSION_SECRET }}"
        # Production-specific secrets
        DATABASE_ENCRYPTION_KEY: "{{ .DATABASE_ENCRYPTION_KEY }}"
        S3_ACCESS_KEY: "{{ .S3_ACCESS_KEY }}"
        S3_SECRET_KEY: "{{ .S3_SECRET_KEY }}"
  data:
  # Core infrastructure secrets with hierarchical naming
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: "ectropy/production/POSTGRES_PASSWORD"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: "ectropy/production/REDIS_PASSWORD"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: JWT_SECRET
    remoteRef:
      key: "ectropy/production/JWT_SECRET"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: JWT_REFRESH_SECRET
    remoteRef:
      key: "ectropy/production/JWT_REFRESH_SECRET"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: ENCRYPTION_KEY
    remoteRef:
      key: "ectropy/production/ENCRYPTION_KEY"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  # Speckle BIM secrets
  - secretKey: SPECKLE_POSTGRES_PASSWORD
    remoteRef:
      key: "ectropy/production/SPECKLE_POSTGRES_PASSWORD"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: SPECKLE_REDIS_PASSWORD
    remoteRef:
      key: "ectropy/production/SPECKLE_REDIS_PASSWORD"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: SPECKLE_SESSION_SECRET
    remoteRef:
      key: "ectropy/production/SPECKLE_SESSION_SECRET"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  # Production-specific secrets
  - secretKey: DATABASE_ENCRYPTION_KEY
    remoteRef:
      key: "ectropy/production/DATABASE_ENCRYPTION_KEY"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: S3_ACCESS_KEY
    remoteRef:
      key: "ectropy/production/S3_ACCESS_KEY"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: S3_SECRET_KEY
    remoteRef:
      key: "ectropy/production/S3_SECRET_KEY"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
---
# High-assurance secrets for FIPS compliance
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ectropy-fips-secrets
  namespace: ectropy-production
spec:
  refreshInterval: 15m  # FIPS secrets rotated less frequently
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: SecretStore
  target:
    name: ectropy-fips-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: ectropy
          environment: production
          managed-by: external-secrets
          classification: fips-required
          compliance: "FIPS-140-2-Level-2"
      data:
        # FIPS-required database credentials
        POSTGRES_ADMIN_PASSWORD: "{{ .POSTGRES_ADMIN_PASSWORD }}"
        # FIPS-required encryption keys
        MASTER_ENCRYPTION_KEY: "{{ .MASTER_ENCRYPTION_KEY }}"
        # FIPS-required API keys
        BLOCKCHAIN_PRIVATE_KEY: "{{ .BLOCKCHAIN_PRIVATE_KEY }}"
  data:
  - secretKey: POSTGRES_ADMIN_PASSWORD
    remoteRef:
      key: "ectropy/production/fips/POSTGRES_ADMIN_PASSWORD"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: MASTER_ENCRYPTION_KEY
    remoteRef:
      key: "ectropy/production/fips/MASTER_ENCRYPTION_KEY"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore
  - secretKey: BLOCKCHAIN_PRIVATE_KEY
    remoteRef:
      key: "ectropy/production/fips/BLOCKCHAIN_PRIVATE_KEY"
    sourceRef:
      storeRef:
        name: aws-secrets-manager-store
        kind: SecretStore