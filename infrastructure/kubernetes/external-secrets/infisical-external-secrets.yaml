apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ectropy-core-secrets
  namespace: ectropy-dev
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical-secret-store
    kind: SecretStore
  target:
    name: ectropy-core-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: ectropy
          environment: development
          managed-by: external-secrets
      data:
        POSTGRES_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        REDIS_PASSWORD: "{{ .REDIS_PASSWORD }}"
        JWT_SECRET: "{{ .JWT_SECRET }}"
        JWT_REFRESH_SECRET: "{{ .JWT_REFRESH_SECRET }}"
        SPECKLE_POSTGRES_PASSWORD: "{{ .SPECKLE_POSTGRES_PASSWORD }}"
        SPECKLE_REDIS_PASSWORD: "{{ .SPECKLE_REDIS_PASSWORD }}"
        SPECKLE_SESSION_SECRET: "{{ .SPECKLE_SESSION_SECRET }}"
  data:
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: POSTGRES_PASSWORD
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: REDIS_PASSWORD
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
  - secretKey: JWT_SECRET
    remoteRef:
      key: JWT_SECRET
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
  - secretKey: JWT_REFRESH_SECRET
    remoteRef:
      key: JWT_REFRESH_SECRET
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
  - secretKey: SPECKLE_POSTGRES_PASSWORD
    remoteRef:
      key: SPECKLE_POSTGRES_PASSWORD
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
  - secretKey: SPECKLE_REDIS_PASSWORD
    remoteRef:
      key: SPECKLE_REDIS_PASSWORD
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
  - secretKey: SPECKLE_SESSION_SECRET
    remoteRef:
      key: SPECKLE_SESSION_SECRET
      property: secretValue
    sourceRef:
      storeRef:
        name: infisical-secret-store
        kind: SecretStore
---
