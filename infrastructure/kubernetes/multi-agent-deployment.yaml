---
# Services for Agent Communication
apiVersion: v1
kind: Service
metadata:
  name: ectropy-task-manager-service
  namespace: ectropy-agents
  labels:
    app: ectropy-task-manager-agent
spec:
  selector:
    app: ectropy-task-manager-agent
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ectropy-compliance-service
  namespace: ectropy-agents
  labels:
    app: ectropy-compliance-agent
spec:
  selector:
    app: ectropy-compliance-agent
  ports:
    - port: 3002
      targetPort: 3002
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ectropy-performance-service
  namespace: ectropy-agents
  labels:
    app: ectropy-performance-agent
  ports:
    - port: 3003
      targetPort: 3003
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ectropy-procurement-service
  namespace: ectropy-agents
  labels:
    app: ectropy-procurement-agent
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  type: ClusterIP

---
# Network Policy for Secure Agent Communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ectropy-agent-network-policy
  namespace: ectropy-agents
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ectropy-production
        - podSelector:
            matchLabels:
              tier: agents
      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 3002
        - protocol: TCP
          port: 3003
        - protocol: TCP
          port: 3004
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: ectropy-production
      ports:
        - protocol: TCP
          port: 4000 # API Gateway
        - protocol: TCP
          port: 5432 # PostgreSQL
        - protocol: TCP
          port: 6379 # Redis
    - to: []
      ports:
        - protocol: TCP
          port: 53 # DNS
        - protocol: UDP
          port: 53 # DNS
        - protocol: TCP
          port: 443 # HTTPS for external APIs

---
# Horizontal Pod Autoscaler for Agents
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ectropy-compliance-agent-hpa
  namespace: ectropy-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ectropy-compliance-agent
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ectropy-performance-agent-hpa
  namespace: ectropy-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ectropy-performance-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
