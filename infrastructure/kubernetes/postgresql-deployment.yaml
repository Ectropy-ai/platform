# 🗃️ POSTGRESQL DEPLOYMENT - ENTERPRISE READY
# Enhanced with your database schema and security
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: ectropy-production
  labels:
    app: postgresql
    tier: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd # Use appropriate storage class

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: ectropy-production
data:
  postgresql.conf: |
    # PostgreSQL configuration for enterprise workloads
    max_connections = 200
    shared_buffers = 1GB
    effective_cache_size = 3GB
    maintenance_work_mem = 512MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 8MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    max_worker_processes = 8
    max_parallel_workers_per_gather = 4
    max_parallel_workers = 8
    max_parallel_maintenance_workers = 4

    # Logging configuration
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_statement = 'all'
    log_min_duration_statement = 1000

    # Security configuration
    ssl = on
    ssl_cert_file = 'server.crt'
    ssl_key_file = 'server.key'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: ectropy-production
  labels:
    app: postgresql
    tier: database
    component: federated-platform
spec:
  replicas: 1 # Use StatefulSet for production with replicas
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
      annotations:
        security.ectropy.io/database-tier: 'enterprise'
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: postgis/postgis:15-3.3
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: ectropy-config
                  key: DB_NAME
            - name: POSTGRES_USER
              value: 'ectropy'
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ectropy-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
          # Production resource allocation for your federated platform
          resources:
            requests:
              memory: '4Gi'
              cpu: '2'
            limits:
              memory: '8Gi'
              cpu: '4'
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ectropy
                - -d
                - ectropy_federated_platform
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ectropy
                - -d
                - ectropy_federated_platform
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-config
          configMap:
            name: postgres-config

---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-service
  namespace: ectropy-production
  labels:
    app: postgresql
    tier: database
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  type: ClusterIP
