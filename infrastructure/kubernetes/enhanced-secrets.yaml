# 🔒 ENHANCED SECRETS - INTEGRATES WITH SECURE CONFIG SYSTEM
# NOTE: This template integrates with your secure configuration management
# The actual secrets will be generated by your enhanced security system
apiVersion: v1
kind: Secret
metadata:
  name: ectropy-secrets
  namespace: ectropy-production
  annotations:
    security.ectropy.io/generated-by: 'secure-config-validator'
    security.ectropy.io/validation-level: 'enterprise'
    security.ectropy.io/entropy-validated: 'true'
type: Opaque
stringData:
  # Database credentials (validated by your config system)
  DB_PASSWORD: 'PLACEHOLDER_FOR_SECURE_DB_PASSWORD'

  # JWT secrets (generated by your secure config system)
  JWT_SECRET: 'PLACEHOLDER_FOR_SECURE_JWT_SECRET'
  JWT_REFRESH_SECRET: 'PLACEHOLDER_FOR_SECURE_JWT_REFRESH_SECRET'
  SESSION_SECRET: 'PLACEHOLDER_FOR_SECURE_SESSION_SECRET'

  # Redis authentication
  REDIS_PASSWORD: 'PLACEHOLDER_FOR_SECURE_REDIS_PASSWORD'

  # S3/MinIO credentials
  S3_ACCESS_KEY: 'PLACEHOLDER_FOR_SECURE_S3_ACCESS_KEY'
  S3_SECRET_KEY: 'PLACEHOLDER_FOR_SECURE_S3_SECRET_KEY'

  # Blockchain private keys
  BLOCKCHAIN_PRIVATE_KEY: 'PLACEHOLDER_FOR_SECURE_BLOCKCHAIN_PRIVATE_KEY'

  # External API keys
  OPENAI_API_KEY: 'PLACEHOLDER_FOR_SECURE_OPENAI_API_KEY'
  ANTHROPIC_API_KEY: 'PLACEHOLDER_FOR_SECURE_ANTHROPIC_API_KEY'

  # Manufacturer API credentials
  MANUFACTURER_API_KEYS: 'PLACEHOLDER_FOR_SECURE_MANUFACTURER_API_KEYS'

---
# Template for production secret generation script
# This will be populated by your secure configuration system
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-generation-template
  namespace: ectropy-production
data:
  generate-secrets.sh: |
    #!/bin/bash
    # This script uses your enhanced security configuration system
    # to generate cryptographically secure secrets

    echo "🔐 Generating enterprise-grade secrets using enhanced security system..."

    # Use your secure config validator to generate secrets
    node /app/libs/shared/config/src/config.validator.js --generate-secrets --env=production

    # Create Kubernetes secret with generated values
    kubectl create secret generic ectropy-secrets \
      --namespace=ectropy-production \
      --from-env-file=/tmp/secure-config.env \
      --dry-run=client -o yaml | kubectl apply -f -

    # Clean up temporary files
    rm -f /tmp/secure-config.env

    echo "✅ Enterprise secrets generated and applied!"
