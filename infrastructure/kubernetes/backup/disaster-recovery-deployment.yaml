apiVersion: v1
kind: Namespace
metadata:
  name: ectropy-backup
  labels:
    ectropy.io/component: disaster-recovery
    ectropy.io/deployment-type: enterprise
    ectropy.io/security-level: enhanced

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-manager
  namespace: ectropy-backup
  labels:
    app: backup-manager
    ectropy.io/service: backup
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backup-manager
  template:
    metadata:
      labels:
        app: backup-manager
        ectropy.io/service: backup
    spec:
      serviceAccountName: ectropy-backup-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: backup-manager
          image: postgres:15
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_HOST
              value: 'postgresql-service.ectropy-production.svc.cluster.local'
            - name: POSTGRES_PORT
              value: '5432'
            - name: POSTGRES_DB
              value: 'ectropy_db'
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backup-credentials
                  key: postgres-user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: backup-credentials
                  key: postgres-password
            - name: BACKUP_SCHEDULE
              value: '0 2 * * *' # Daily at 2 AM
            - name: RETENTION_DAYS
              value: '30'
            - name: S3_BUCKET
              value: 'ectropy-backups'
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-credentials
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-credentials
                  key: aws-secret-key
            - name: AWS_DEFAULT_REGION
              value: 'us-east-1'
          command:
            - /bin/sh
            - -c
            - |
              apt-get update && apt-get install -y awscli && rm -rf /var/lib/apt/lists/*

              # Backup function
              backup_database() {
                echo "Starting backup at $(date)"
                BACKUP_FILE="ectropy-$(date +%Y%m%d-%H%M%S).sql"
                
                # Create database backup
                pg_dump -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB > /backup/$BACKUP_FILE
                
                if [ $? -eq 0 ]; then
                  echo "Database backup successful: $BACKUP_FILE"
                  
                  # Compress backup
                  gzip /backup/$BACKUP_FILE
                  
                  # Upload to S3
                  aws s3 cp /backup/$BACKUP_FILE.gz s3://$S3_BUCKET/database/
                  
                  if [ $? -eq 0 ]; then
                    echo "Backup uploaded to S3 successfully"
                    rm -f /backup/$BACKUP_FILE.gz
                  else
                    echo "Failed to upload backup to S3"
                  fi
                else
                  echo "Database backup failed"
                fi
                
                # Cleanup old local backups
                find /backup -name "*.sql*" -mtime +$RETENTION_DAYS -delete
                
                # Cleanup old S3 backups
                aws s3 ls s3://$S3_BUCKET/database/ | awk '{print $4}' | while read file; do
                  if [ ! -z "$file" ]; then
                    # Delete files older than retention period
                    aws s3 rm s3://$S3_BUCKET/database/$file --recursive --exclude "*" --include "*.sql.gz" --older-than ${RETENTION_DAYS}d
                  fi
                done
              }

              # Initial backup
              backup_database

              # Schedule regular backups
              while true; do
                sleep 86400  # 24 hours
                backup_database
              done
          volumeMounts:
            - name: backup-storage
              mountPath: /backup
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '200m'
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backup-storage-pvc
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage-pvc
  namespace: ectropy-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  storageClassName: fast-ssd

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cross-region-sync
  namespace: ectropy-backup
  labels:
    app: cross-region-sync
    ectropy.io/service: disaster-recovery
spec:
  schedule: '0 */6 * * *' # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: cross-region-sync-job
        spec:
          serviceAccountName: ectropy-backup-service-account
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 2000
          containers:
            - name: sync-manager
              image: alpine/curl:latest
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: REGIONS
                  value: 'us-east-1,us-west-2,eu-west-1,ap-southeast-1'
                - name: PRIMARY_REGION
                  value: 'us-east-1'
                - name: S3_BUCKET
                  value: 'ectropy-backups'
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: aws-access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: aws-secret-key
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update && apt-get install -y awscli && rm -rf /var/lib/apt/lists/*

                  echo "Starting cross-region sync at $(date)"

                  # Split regions
                  IFS=',' read -r -a REGION_ARRAY <<< "$REGIONS"

                  for region in "${REGION_ARRAY[@]}"; do
                    if [ "$region" != "$PRIMARY_REGION" ]; then
                      echo "Syncing to region: $region"
                      
                      # Sync latest backups to regional buckets
                      aws s3 sync s3://$S3_BUCKET/database/ s3://ectropy-backups-$region/database/ \
                        --region $region \
                        --exclude "*" \
                        --include "*.sql.gz" \
                        --delete
                      
                      if [ $? -eq 0 ]; then
                        echo "Successfully synced to $region"
                      else
                        echo "Failed to sync to $region"
                      fi
                    else
                      echo "Skipping primary region: $region"
                    fi
                  done

                  echo "Cross-region sync completed at $(date)"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  memory: '128Mi'
                  cpu: '100m'
                limits:
                  memory: '256Mi'
                  cpu: '200m'
          volumes:
            - name: tmp
              emptyDir: {}
          restartPolicy: OnFailure

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: speckle-models-backup
  namespace: ectropy-backup
  labels:
    app: speckle-models-backup
    ectropy.io/service: bim-backup
spec:
  schedule: '0 1 * * *' # Daily at 1 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: speckle-models-backup-job
        spec:
          serviceAccountName: ectropy-backup-service-account
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 2000
          containers:
            - name: speckle-backup
              image: node:20
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: SPECKLE_SERVER_URL
                  value: 'http://speckle-server-service.ectropy-production:3000'
                - name: SPECKLE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: speckle-api-token
                - name: S3_BUCKET
                  value: 'ectropy-backups'
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: aws-access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: aws-secret-key
                - name: AWS_DEFAULT_REGION
                  value: 'us-east-1'
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update && apt-get install -y awscli curl && rm -rf /var/lib/apt/lists/*
                  pnpm install -g @speckle/speckle-js

                  echo "Starting Speckle models backup at $(date)"

                  # Create backup directory
                  mkdir -p /tmp/speckle-backup

                  # Get all streams from Speckle server
                  STREAMS=$(curl -s -H "Authorization: Bearer $SPECKLE_API_TOKEN" \
                    "$SPECKLE_SERVER_URL/api/v1/streams" | \
                    grep -o '"id":"[^"]*"' | \
                    cut -d'"' -f4)

                  for stream_id in $STREAMS; do
                    echo "Backing up stream: $stream_id"
                    
                    # Export stream data
                    curl -s -H "Authorization: Bearer $SPECKLE_API_TOKEN" \
                      "$SPECKLE_SERVER_URL/api/v1/streams/$stream_id/export" \
                      -o "/tmp/speckle-backup/stream-$stream_id-$(date +%Y%m%d).json"
                    
                    if [ $? -eq 0 ]; then
                      echo "Stream $stream_id backed up successfully"
                    else
                      echo "Failed to backup stream $stream_id"
                    fi
                  done

                  # Compress backup
                  tar -czf /tmp/speckle-models-$(date +%Y%m%d-%H%M%S).tar.gz -C /tmp speckle-backup/

                  # Upload to S3
                  aws s3 cp /tmp/speckle-models-*.tar.gz s3://$S3_BUCKET/speckle-models/

                  if [ $? -eq 0 ]; then
                    echo "Speckle models backup uploaded to S3 successfully"
                  else
                    echo "Failed to upload Speckle models backup to S3"
                  fi

                  echo "Speckle models backup completed at $(date)"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  memory: '256Mi'
                  cpu: '200m'
                limits:
                  memory: '512Mi'
                  cpu: '400m'
          volumes:
            - name: tmp
              emptyDir: {}
          restartPolicy: OnFailure

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ectropy-backup-service-account
  namespace: ectropy-backup

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: ectropy-backup
  name: ectropy-backup-role
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'configmaps', 'secrets']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments', 'jobs']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['batch']
    resources: ['jobs', 'cronjobs']
    verbs: ['get', 'list', 'watch', 'create']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ectropy-backup-rolebinding
  namespace: ectropy-backup
subjects:
  - kind: ServiceAccount
    name: ectropy-backup-service-account
    namespace: ectropy-backup
roleRef:
  kind: Role
  name: ectropy-backup-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: Secret
metadata:
  name: backup-credentials
  namespace: ectropy-backup
type: Opaque
data:
  postgres-user: BASE64_USER_PLACEHOLDER # ectropy_user
  postgres-password: '' # Add your PostgreSQL password here (base64 encoded)
  aws-access-key: '' # Add your AWS access key here (base64 encoded)
  aws-secret-key: '' # Add your AWS secret key here (base64 encoded)
  speckle-api-token: '' # Add your Speckle API token here (base64 encoded)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disaster-recovery-monitor
  namespace: ectropy-backup
  labels:
    app: disaster-recovery-monitor
    ectropy.io/service: dr-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disaster-recovery-monitor
  template:
    metadata:
      labels:
        app: disaster-recovery-monitor
        ectropy.io/service: dr-monitor
    spec:
      serviceAccountName: ectropy-backup-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: dr-monitor
          image: alpine/curl:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: CHECK_INTERVAL
              value: '300' # 5 minutes
            - name: ALERT_WEBHOOK_URL
              value: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            - name: BACKUP_BUCKET
              value: 'ectropy-backups'
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-credentials
                  key: aws-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-credentials
                  key: aws-secret-key
          command:
            - /bin/sh
            - -c
            - |
              apt-get update && apt-get install -y awscli jq && rm -rf /var/lib/apt/lists/*

              send_alert() {
                local message="$1"
                echo "ALERT: $message"
                
                # Send to Slack (if webhook configured)
                if [ ! -z "$ALERT_WEBHOOK_URL" ]; then
                  curl -X POST -H 'Content-type: application/json' \
                    --data "{\"text\":\"🚨 Ectropy DR Alert: $message\"}" \
                    "$ALERT_WEBHOOK_URL"
                fi
              }

              check_backup_health() {
                echo "Checking backup health at $(date)"
                
                # Check if recent backups exist
                RECENT_BACKUPS=$(aws s3 ls s3://$BACKUP_BUCKET/database/ | \
                  grep "$(date +%Y-%m-%d)" | wc -l)
                
                if [ $RECENT_BACKUPS -eq 0 ]; then
                  send_alert "No recent database backups found for today"
                fi
                
                # Check Speckle backups
                RECENT_SPECKLE=$(aws s3 ls s3://$BACKUP_BUCKET/speckle-models/ | \
                  grep "$(date +%Y%m%d)" | wc -l)
                  
                if [ $RECENT_SPECKLE -eq 0 ]; then
                  send_alert "No recent Speckle model backups found for today"
                fi
                
                # Check cross-region replication
                REGIONS="us-west-2 eu-west-1 ap-southeast-1"
                for region in $REGIONS; do
                  REPLICATED=$(aws s3 ls s3://ectropy-backups-$region/database/ --region $region | \
                    grep "$(date +%Y-%m-%d)" | wc -l)
                  
                  if [ $REPLICATED -eq 0 ]; then
                    send_alert "Cross-region replication to $region appears to be failing"
                  fi
                done
              }

              # Main monitoring loop
              while true; do
                check_backup_health
                sleep $CHECK_INTERVAL
              done
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '128Mi'
              cpu: '100m'
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: disaster-recovery-monitor-service
  namespace: ectropy-backup
  labels:
    app: disaster-recovery-monitor
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: disaster-recovery-monitor
ry-monitor
