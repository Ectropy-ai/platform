# ============================================================================
# Ectropy Platform - Edge Nginx Main Configuration
# ============================================================================
# Target: OnLogic Karbon 521 at construction jobsite
# Tuned for low-user-count, high-reliability edge deployment
# Worker processes matched to Karbon 521 efficiency cores
# ============================================================================

user nginx;
worker_processes 4;    # Fixed: 4 workers for edge (auto would use 14-16 on Karbon 521)
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Conservative file limits for edge (no 10K concurrent users here)
worker_rlimit_nofile 8192;

events {
    worker_connections 512;    # Reduced: ~20-50 concurrent users on a jobsite
    use epoll;
    multi_accept on;
}

http {
    # ========================================================================
    # Basic Settings
    # ========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ========================================================================
    # Docker DNS Resolution
    # ========================================================================
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ========================================================================
    # Performance Optimizations (tuned for edge)
    # ========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 500;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ========================================================================
    # Gzip Compression (important over satellite/cellular)
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 512;      # Lower threshold — every byte matters on Starlink
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # ========================================================================
    # Rate Limiting (relaxed for small user base)
    # ========================================================================
    limit_req_zone $binary_remote_addr zone=general:5m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api:5m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:5m rate=10r/s;

    limit_conn_zone $binary_remote_addr zone=addr:5m;

    # ========================================================================
    # Security Headers
    # ========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================================================================
    # Site Configuration
    # ========================================================================
    include /etc/nginx/sites-enabled/*;
}
