# ============================================================================
# Ectropy Staging Server Block - Docker Network Architecture
# ============================================================================
# This file contains BOTH upstream definitions AND server block configuration
# Deployed to: /opt/ectropy/infrastructure/nginx/ectropy-staging.conf
#
# ROOT CAUSE #162 VALIDATION TEST: Trigger nginx reload provisioner
# ARCHITECTURE DECISION (2026-01-26):
# ------------------------------------
# REFACTORED: Migrated from 127.0.0.1:PORT (host networking) to Docker container
# names for full strategic alignment with production and development environments.
#
# BEFORE (Legacy Pattern):
#   - upstream api_gateway { server 127.0.0.1:4000; }
#   - Requires published ports on host
#   - Breaks containerization (nginx must run on host)
#   - Incompatible with docker-compose.staging.yml container architecture
#   - Violates production parity principle
#
# AFTER (Enterprise Pattern):
#   - upstream api_gateway { server ectropy-api-gateway:4000; }
#   - Uses Docker internal DNS resolution (main.conf:60 resolver 127.0.0.11)
#   - Enables nginx containerization (docker-compose pattern)
#   - Full alignment: dev → staging → production
#   - Enables horizontal scaling and service mesh migration
#
# BENEFITS:
# ---------
# 1. Production Parity: Staging now matches production architecture exactly
# 2. CI/CD Alignment: Identical deployment patterns across environments
# 3. Container-Native: nginx runs in Docker with inter-container communication
# 4. DNS Resolution: Automatic failover if containers restart with new IPs
# 5. Port Independence: No host port conflicts, containers use internal network
# 6. Future-Proof: Ready for Kubernetes migration (same DNS resolution pattern)
#
# CONTAINER NAME MAPPING (docker-compose.staging.yml):
# ----------------------------------------------------
#   Service          Container Name       Port(s)
#   -----------      ----------------     -------
#   api-gateway      ectropy-api-gateway  4000
#   mcp-server       ectropy-mcp          3001, 3002
#   web-dashboard    ectropy-web-dashboard 3000
#   postgres         ectropy-postgres     5432
#   redis            ectropy-redis        6379
#   (Speckle/MinIO not yet deployed to staging)
#
# DNS RESOLUTION:
# ---------------
# Docker's embedded DNS server (127.0.0.11) resolves container names to IPs
# Nginx caches DNS results for 30s (main.conf:60 valid=30s)
# If container restarts, DNS updates within 30s (automatic failover)
#
# DEPLOYMENT VALIDATION:
# ----------------------
# After deployment, verify DNS resolution:
#   docker exec ectropy-nginx nslookup ectropy-api
#   docker exec ectropy-nginx curl -f http://ectropy-api-gateway:4000/health
#
# ROLLBACK PLAN (if needed):
# ---------------------------
# Revert to 127.0.0.1:PORT pattern and ensure ports are published in
# docker-compose.staging.yml. However, this breaks container architecture.
#
# Last Updated: 2026-01-26
# Refactor: VPC Phase 3 - Strategic CI/CD Alignment
# ============================================================================

# ============================================================================
# Upstream Definitions - Backend Services (Docker Network)
# ============================================================================

# Web Dashboard - Runtime DNS Resolution Pattern (ROOT CAUSE #223 FIX)
# Container: ectropy-web-dashboard(port 3000)
# ENTERPRISE FIX (2026-02-07): ROOT CAUSE #223 - nginx upstream IP cache staleness
# Problem: upstream blocks cache DNS at startup, causing 502 when containers restart with new IPs
# Solution: Runtime DNS resolution via variables (same pattern as ectropy-console)
# Benefits: Auto-recovery from container restarts, no manual nginx reload needed
#
# REMOVED: upstream web_dashboard block (cached DNS at startup)
# NOW: Uses runtime DNS resolution in location / block with $web_backend variable

# ============================================================================
# Runtime DNS Resolution Pattern (Five Why 2026-02-20: Cascading 503 Fix)
# ============================================================================
# BEFORE: Static upstream blocks resolved DNS at nginx startup.
#   If ANY referenced container hadn't started → nginx refuses to start entirely.
#   Combined with docker-compose depends_on chain, this created cascading failures:
#   db-migrate fails → api-gateway blocked → nginx blocked → port 80 closed → LB 503
#
# AFTER: Runtime DNS resolution via set $variable pattern.
#   Nginx starts UNCONDITIONALLY — DNS resolved per-request, not at startup.
#   Benefits:
#     1. nginx always starts (serves /lb-health for LB even if backends are down)
#     2. Individual backend failures return 502 for that route only
#     3. No startup dependency chain — containers start in parallel
#     4. Auto-recovery: when containers come up, nginx finds them on next request
#     5. Same pattern already proven for web-dashboard (line ~550) and console
#
# TRADEOFF: No upstream keepalive connection pooling. Each request opens new TCP
# connection to backend. Acceptable for staging; if needed for production, use
# nginx:alpine with ngx_http_upstream module's resolve parameter (NGINX Plus)
# or an intermediary like envoy proxy.
#
# DNS: Docker embedded DNS (127.0.0.11, main.conf:64) resolves container names.
# Cache: 30s TTL (main.conf:64 valid=30s) — container IP updates within 30s.
# ============================================================================
#
# REMOVED upstream blocks (replaced by set $var in location blocks):
#   api_gateway         → ectropy-api-gateway:4000
#   mcp_server          → ectropy-mcp:3001
#   mcp_health          → ectropy-mcp:3001
#   speckle_server      → ectropy-speckle-server:3000
#   speckle_frontend    → ectropy-speckle-frontend:8080
#   minio_api           → ectropy-minio:9000
#   minio_console       → ectropy-minio:9001
#   ectropy_console     → ectropy-console:3001 (already runtime DNS)

# ============================================================================
# Server Block Configuration
# ============================================================================

# ENTERPRISE FIX: Conditional Connection header for WebSocket support
# Maps Connection header based on Upgrade header presence
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
server {
    listen 80 default_server;
    server_name staging.ectropy.ai;

    # Security headers (Fortune 500: OWASP + PCI DSS 4.0 + NIST SP 800-53)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ========================================================================
    # Load Balancer Health Check Endpoint - LAYER 1 (Independent)
    # ========================================================================
    # Enterprise 4-Layer Health Check Architecture:
    #   Layer 1 (LB):   nginx /lb-health → static response (THIS ENDPOINT)
    #   Layer 2 (App):  MCP /health → comprehensive app health
    #   Layer 3 (Container): Docker healthcheck → MCP /lb-health
    #   Layer 4 (Infra): Prometheus/Grafana → metrics
    #
    # CRITICAL: This endpoint is INDEPENDENT - no backend dependencies
    # DigitalOcean Load Balancer checks this endpoint (port 80)
    # Fast response (<1ms), breaks circular dependency, prevents cascading failures
    # ========================================================================
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # ========================================================================
    # Application Health Check Endpoint - LAYER 2 (Comprehensive)
    # ========================================================================
    # Full application health including database, Redis, memory checks
    # Used by: monitoring systems, diagnostics, troubleshooting
    # NOT used by: DigitalOcean Load Balancer (use /lb-health instead)
    # Enterprise fix: Uses upstream mcp_health (port 3001)
    # MCP dual-port architecture: 3001=health/stdio, 3002=Express API
    # ========================================================================
    location /health {
        set $mcp_health_backend http://ectropy-mcp:3001;
        proxy_pass $mcp_health_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
    }

    # API Gateway health endpoint — NO rate limiting (industry standard)
    # Health probes must bypass rate limiting to prevent false-negative health
    # status that cascades into LB traffic removal or container restarts.
    # MUST come BEFORE general /api/ location for nginx prefix match specificity.
    location = /api/health {
        set $api_backend http://ectropy-api-gateway:4000;
        proxy_pass $api_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        access_log off;
    }

    # MCP Server Tools API - MUST come BEFORE general /api/ for specificity
    # Routes /api/tools* to MCP server on port 3001
    location /api/tools {
        set $mcp_backend http://ectropy-mcp:3001;
        proxy_pass $mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-API-Key $http_x_api_key;

        # Timeouts for MCP operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SEPPA AI Assistant API - MUST come BEFORE general /api/ for specificity
    # Routes /api/assistant* to MCP Express server (port 3002) where assistant routes live
    # FIX (2026-03-06): Was routing to web-dashboard:3000 (React SPA — no API endpoints)
    # Ground truth: apps/mcp-server/src/routes/assistant.routes.ts defines /chat, /status, /conversations
    # MCP Express API serves on port 3002 (apps/mcp-server/src/config/environment.config.ts)
    location /api/assistant {
        set $mcp_express_backend http://ectropy-mcp:3002;
        proxy_pass $mcp_express_backend/api/assistant;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-API-Key $http_x_api_key;

        # Timeouts for AI operations (longer due to Claude API calls)
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # ENTERPRISE FIX (2025-12-18): ROOT CAUSE #62 PART 3 - MCP Routes via API Gateway
    # OLD: nginx routed /api/mcp/ directly to MCP server (port 3001) - bypassed auth!
    # NEW: /api/mcp/ goes through API Gateway (port 4000) for auth/rate limiting
    # API Gateway proxies to MCP Server via apps/api-gateway/src/routes/mcp-proxy.routes.ts
    # This ensures all /api/* requests go through the same authentication layer
    # MCP Server direct access still available via /mcp/ (for stdio/health only)
    #
    # REMOVED: location /api/mcp/ { proxy_pass http://mcp_server/api/mcp/; }
    # REASON: Bypassed API Gateway authentication and rate limiting
    # IMPACT: MCP chatbot deliverables API now properly authenticated

    # API routes - proxy to API Gateway
    location /api/ {
        # Rate limiting: 30 req/s per IP with burst capacity
        limit_req zone=api burst=20 nodelay;
        limit_conn addr 50;

        set $api_backend http://ectropy-api-gateway:4000;
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Hardcode to https for secure cookie support
        # All external traffic comes through HTTPS load balancer
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Security headers (must be re-added due to nginx add_header inheritance)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # CORS for API - Use correct protocol
        add_header Access-Control-Allow-Origin "https://staging.ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ENTERPRISE FIX (2026-01-09): OAuth Route Consolidation
    # REMOVED: Duplicate /auth/ location block that caused 404 errors
    # REASON: All OAuth routes mounted at /api/auth in Express (main.ts:522)
    # IMPACT: OAuth callbacks now correctly route to /api/auth/google/callback
    #
    # Previous config had two location blocks intercepting auth requests:
    #   1. /auth/ (REMOVED) - Caused 404 by forwarding without /api prefix
    #   2. /api/ (RETAINED) - Correct routing pattern for all API endpoints
    #
    # Benefits of removal:
    #   - Eliminates routing ambiguity
    #   - Follows enterprise pattern: single /api/* prefix for all API routes
    #   - Fixes OAuth 404 errors (callback, /me endpoint, logout)
    #   - Simplifies infrastructure configuration
    #
    # All authentication requests now flow through /api/ location block below

    # MCP Server direct routes (port 3001)
    # Routes /mcp/* to MCP server core endpoints
    # Strips /mcp prefix since MCP server expects /health not /mcp/health
    location /mcp/ {
        # CRITICAL: set must come BEFORE rewrite...break (nginx rewrite phase order)
        # rewrite...break stops rewrite phase processing, so set after it never executes
        set $mcp_direct http://ectropy-mcp:3001;

        # Strip /mcp prefix and proxy to port 3001
        rewrite ^/mcp/(.*) /$1 break;
        proxy_pass $mcp_direct;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # MCP health checks should be fast
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ========================================================================
    # Speckle BIM Integration Routes
    # Enterprise BIM viewer, sharing, and collaboration platform
    # ========================================================================

    # Speckle Server GraphQL API - MUST come before /speckle/ for specificity
    location /speckle/graphql {
        set $speckle_server_backend http://ectropy-speckle-server:3000;
        rewrite ^/speckle/graphql(.*) /graphql$1 break;
        proxy_pass $speckle_server_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # GraphQL can have long-running queries
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Speckle Server REST API endpoints - MUST come before /speckle/ for specificity
    location /speckle/api/ {
        set $speckle_api_backend http://ectropy-speckle-server:3000;
        rewrite ^/speckle/api/(.*) /api/$1 break;
        proxy_pass $speckle_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # Generous timeouts for large file operations
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }

    # ROOT CAUSE FIX (2026-02-24): Speckle Auth via /speckle/ path prefix
    # Problem: CI workflow uses SPECKLE_URL=https://staging.ectropy.ai/speckle
    #          Then POSTs to ${SPECKLE_URL}/auth/local/login
    #          This hits /speckle/auth/* which was matching /speckle/ → frontend (port 8080)
    #          Frontend can't handle auth → login fails
    # Fix: Add explicit /speckle/auth/ location routing to server (port 3000)
    # Must come BEFORE /speckle/ for specificity
    location /speckle/auth/ {
        set $speckle_auth_server http://ectropy-speckle-server:3000;
        rewrite ^/speckle/auth/(.*) /auth/$1 break;
        proxy_pass $speckle_auth_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # Force HTTPS for all auth redirects (SSL terminated at LB)
        proxy_redirect http:// https://;
        # Rewrite redirect paths to include /speckle prefix
        proxy_redirect /authn/ /speckle/authn/;
        proxy_redirect /auth/ /speckle/auth/;

        # Standard timeouts for auth operations
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # ENTERPRISE FIX (2026-01-10): Speckle Auth Endpoints
    # Frontend makes auth requests to /auth/* which need to be proxied to Speckle server
    # Must come BEFORE /speckle/ for specificity
    location /auth/ {
        set $speckle_auth_backend http://ectropy-speckle-server:3000;
        proxy_pass $speckle_auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # TRUE CORE SOLUTION (ROOT CAUSE #233): Force HTTPS for all auth redirects
        # SSL terminated at load balancer, but upstream may generate HTTP redirects
        # Simple string replacement - nginx interprets this as protocol scheme replacement
        # Proven solution: github.com/nginx-proxy/nginx-proxy#187 (production deployments)
        proxy_redirect http:// https://;
        proxy_redirect / /speckle/;

        # Standard timeouts for auth operations
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # ENTERPRISE FIX (2026-01-10): Speckle Nuxt.js Static Assets
    # Nuxt generates asset paths like /_nuxt/* which need to be proxied to Speckle frontend
    # Must come BEFORE /speckle/ location for specificity
    location /_nuxt/ {
        set $speckle_nuxt_backend http://ectropy-speckle-frontend:8080;
        proxy_pass $speckle_nuxt_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # ENTERPRISE FIX (2026-01-10): Disable buffering for large files (4.85MB bundles)
        # ERR_CONTENT_LENGTH_MISMATCH fix - stream large assets without buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # Increase timeouts for large file transfers
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache static assets aggressively
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Speckle Frontend (Nuxt.js UI)
    location /speckle/ {
        set $speckle_fe_backend http://ectropy-speckle-frontend:8080;
        rewrite ^/speckle/(.*) /$1 break;
        proxy_pass $speckle_fe_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # ROOT CAUSE #233 TRUE FIX (2026-02-09): Disable absolute redirect conversion
        # Problem: nginx converts relative redirects to absolute using proxy request scheme (HTTP from LB)
        # Upstream returns: location: /authn/login (relative redirect)
        # nginx converts to: location: http://staging.ectropy.ai/speckle/authn/login (using HTTP scheme from LB)
        # Solution: absolute_redirect off prevents nginx from converting relative→absolute
        # Browser handles relative redirect correctly, maintaining HTTPS scheme from original request
        # Industry Pattern: Standard solution for SSL termination at load balancer with relative redirects
        # Reference: nginx.org/en/docs/http/ngx_http_core_module.html#absolute_redirect (nginx 1.11.8+)
        # Reference: serverfault.com/questions/885046 (AWS ELB SSL termination)
        absolute_redirect off;

        # ENTERPRISE FIX (2025-12-18): ROOT CAUSE #62 PHASE 4 - Speckle Frontend Routing
        # ROOT CAUSE #233 FIX (2026-02-08): Force HTTPS protocol in redirects - FINAL SOLUTION
        # Problem: Speckle frontend redirects to /authn/login instead of /speckle/authn/login
        # Problem: Redirects use HTTP protocol causing mixed content browser errors
        # Evidence: curl -I /speckle/ → Location: http://staging.ectropy.ai/speckle/authn/login
        # Solution: Rewrite Location headers to include /speckle prefix AND force HTTPS
        # Architecture: Load balancer terminates SSL, all external traffic is HTTPS
        # Industry Pattern: OWASP A05:2021, PCI DSS 4.0 Req 4.2.1 (HTTPS everywhere)
        # TRUE CORE SOLUTION: Replace protocol scheme directly (nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_redirect)
        # Simple string replacement - nginx interprets this as protocol scheme replacement
        # Proven solution: github.com/nginx-proxy/nginx-proxy#187 (production deployments)
        proxy_redirect http:// https://;  # Force ALL HTTP → HTTPS (simple string)
        proxy_redirect / /speckle/;  # Add /speckle/ prefix for relative URLs

        # SSR can take time
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # MinIO S3-Compatible Object Storage
    # Used by Speckle for large BIM file storage
    # ========================================================================

    # MinIO S3 API
    location /minio/ {
        set $minio_api_backend http://ectropy-minio:9000;
        rewrite ^/minio/(.*) /$1 break;
        proxy_pass $minio_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Large file uploads (IFC files can be 100s of MB)
        client_max_body_size 2000M;
        proxy_request_buffering off;

        # S3 operations can be slow
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }

    # MinIO Admin Console
    location /minio-console/ {
        set $minio_console_backend http://ectropy-minio:9001;
        rewrite ^/minio-console/(.*) /$1 break;
        proxy_pass $minio_console_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # ========================================================================
    # Ectropy Console - Platform Administration Interface
    # Employee-only console for tenant/user management (restricted access)
    # ========================================================================
    location /console/ {
        # Runtime DNS resolution (prevents nginx startup failures)
        set $console_backend http://ectropy-console:3001;

        # ROOT CAUSE FIX (2026-02-25): Strip /console/ prefix before proxying
        # PROBLEM: Variable-based proxy_pass does NOT perform URI prefix stripping
        # (unlike literal proxy_pass http://host/). Without this rewrite, the backend
        # receives /console/assets/vendor.js instead of /assets/vendor.js, causing
        # serve to look at console/console/assets/ (double-prefixed, doesn't exist)
        # and fall back to index.html (text/html MIME type instead of application/javascript).
        # Reference: FIVE_WHY_STAGING_CONSOLE_ISSUES_2026-02-25.json
        rewrite ^/console/(.*) /$1 break;
        proxy_pass $console_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # ========================================================================
    # VoxelStream WebSocket - Proxy to API Gateway
    # Frontend connects to /ws/voxel-stream, must route to api-gateway (port 4000)
    # MUST come BEFORE catch-all location / (which routes to web-dashboard)
    # ========================================================================
    location /ws/ {
        # Fortune 500: Rate limit WebSocket connection attempts (10/min per IP, burst 5)
        limit_req zone=ws_connect burst=5 nodelay;

        set $api_ws_backend http://ectropy-api-gateway:4000;
        proxy_pass $api_ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket - Voxel Stream (SEPPA)
    # WS FIX 2026-03-14: Route /ws/ to api-gateway (was falling through to web-dashboard)
    location /ws/ {
        set $ws_backend http://ectropy-api-gateway:4000;
        proxy_pass $ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }

    # ========================================================================
    # Web Dashboard - Runtime DNS Resolution Pattern (ROOT CAUSE #223 FIX)
    # Enterprise Architecture: nginx → web-dashboard container via Docker network
    # Pattern: Load Balancer → nginx container → web-dashboard container:3000
    # Benefits: Container-native, Kubernetes-ready, GitOps-driven, env parity, auto-recovery
    #
    # ENTERPRISE FIX (2026-02-07): ROOT CAUSE #223 - nginx upstream IP cache staleness
    # Problem: upstream blocks cache DNS at nginx startup, causing 502 after container restarts
    # Solution: Runtime DNS resolution via variables (prevents stale IP caching)
    # Pattern: Same as ectropy-console (lines 500-502) - proven reliable in production
    # ========================================================================
    location / {
        # Runtime DNS resolution (prevents nginx startup failures and stale IP caching)
        set $web_backend http://ectropy-web-dashboard:3000;
        proxy_pass $web_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Container timeouts for serve package
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}

# ============================================================================
# Console Server Block - console.staging.ectropy.ai
# Platform administration interface for Ectropy staff (staging environment)
# ENTERPRISE FIX (2026-01-30): Subdomain-based routing for console
# ============================================================================
server {
    listen 80;
    server_name console.staging.ectropy.ai;

    # Security headers (Fortune 500: OWASP + PCI DSS 4.0 + NIST SP 800-53)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Load Balancer Health Check
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Application Health Check
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # API proxy - route /api/* to API Gateway for OAuth and backend calls
    location /api/ {
        set $api_backend http://ectropy-api-gateway:4000;
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;

        # CORS for Console API calls
        add_header Access-Control-Allow-Origin "https://console.staging.ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Console SPA - all routes handled by React Router
    location / {
        # Runtime DNS resolution (prevents nginx startup failures)
        set $console_backend http://ectropy-console:3001;
        proxy_pass $console_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}

# ============================================================================
# Multi-Tenant Subdomain Server Block
# Pattern: {tenant-slug}--staging.ectropy.ai
# ============================================================================
# Captures tenant slug from flat subdomain and injects X-Tenant-Slug header
# for backend resolution. Uses regex server_name — exact matches
# (staging.ectropy.ai, console.staging.ectropy.ai) always take priority.
# SSL: Covered by existing *.ectropy.ai wildcard cert on DO LB
# ============================================================================
server {
    listen 80;
    server_name ~^(?<tenant_slug>[a-z0-9][a-z0-9-]+)--staging\.ectropy\.ai$;

    # Security headers (Fortune 500: OWASP + PCI DSS 4.0 + NIST SP 800-53)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Load Balancer Health Check
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Application Health Check
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # API proxy - route /api/* to API Gateway with tenant slug injected
    location /api/ {
        set $api_backend http://ectropy-api-gateway:4000;
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;

        # Inject tenant slug extracted from subdomain
        proxy_set_header X-Tenant-Slug $tenant_slug;

        # Dynamic CORS for tenant subdomains
        set $cors_origin "https://${tenant_slug}--staging.ectropy.ai";
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto, X-Tenant-Slug" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Web dashboard - all routes handled by React Router with tenant context
    location / {
        # Runtime DNS resolution (prevents nginx startup failures)
        set $web_backend http://ectropy-web-dashboard:3000;
        proxy_pass $web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;

        # Inject tenant slug for frontend context
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}

# ============================================================================
# Speckle Subdomain Server Block - speckle.staging.ectropy.ai
# Exposes Speckle Server publicly for BIM viewer SDK (Speckle.js ObjectLoader)
# SSL: Covered by *.ectropy.ai wildcard cert on DO Load Balancer
# ============================================================================
server {
    listen 80;
    server_name speckle.staging.ectropy.ai;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Load Balancer Health Check
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # GraphQL API (Speckle Server)
    location /graphql {
        set $speckle_backend http://ectropy-speckle-server:3000;
        proxy_pass $speckle_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # CORS for BIM viewer cross-origin requests
        add_header Access-Control-Allow-Origin "https://staging.ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Objects API (Speckle Server - used by ObjectLoader SDK)
    location /objects/ {
        set $speckle_backend http://ectropy-speckle-server:3000;
        proxy_pass $speckle_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;

        # CORS for BIM viewer cross-origin requests
        add_header Access-Control-Allow-Origin "https://staging.ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # REST API endpoints
    location /api/ {
        set $speckle_backend http://ectropy-speckle-server:3000;
        proxy_pass $speckle_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
    }

    # Auth endpoints
    location /auth/ {
        set $speckle_backend http://ectropy-speckle-server:3000;
        proxy_pass $speckle_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
        proxy_read_timeout 60s;
    }

    # Catch-all to Speckle Server
    location / {
        set $speckle_backend http://ectropy-speckle-server:3000;
        proxy_pass $speckle_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}
