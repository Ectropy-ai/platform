# Nginx Configuration - Development Environment
# Ectropy Platform - Three-Layer Architecture
# Generated: 2025-11-16

# Upstream service definitions
upstream web_dashboard {
    server web-dashboard:3000;
    keepalive 16;
}

upstream api_gateway {
    server api-gateway:4000;
    keepalive 32;
}

upstream mcp_server {
    server mcp-server:3002;  # Express API port (NOT stdio port 3001)
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client body size limits
    client_max_body_size 100M;
    client_body_buffer_size 1m;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Health check endpoint (static response - needs CORS since not proxied)
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        return 200 "healthy\n";
    }

    # Frontend - Web Dashboard
    location / {
        proxy_pass http://web_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API Gateway - OAuth routes (rate limited)
    # CORS handled by Express middleware (apps/api-gateway/src/main.ts)
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;

        # OPTIONS requests handled by Express CORS middleware
        # Removed nginx CORS headers to prevent duplicates

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Cookie handling for OAuth
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # API Gateway - General API routes
    # CORS handled by Express middleware (apps/api-gateway/src/main.ts)
    # CRITICAL FIX: Added cookie forwarding for session-based auth on all API routes
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        # OPTIONS requests handled by Express CORS middleware
        # Removed nginx CORS headers to prevent duplicates

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # CRITICAL: Forward session cookies for OAuth authentication
        # Without this, /api/speckle/* and other protected routes fail with 403
        # Fixes: Session cookie stripping that prevented auth on non-auth API routes
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # MCP Server - Deliverable API (ENTERPRISE ROUTING)
    # Direct proxy to MCP Server, bypassing API Gateway
    # CORS handled by MCP Server Express middleware
    location /api/mcp/ {
        # OPTIONS requests handled by MCP Server CORS middleware
        # Removed nginx CORS headers to prevent duplicates

        proxy_pass http://mcp_server/api/mcp/;
        proxy_http_version 1.1;

        # WebSocket support for real-time updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # MCP-specific timeouts (longer for agent operations)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Error handling
        proxy_intercept_errors off;
    }

    # Dashboard routes - proxy to React SPA for client-side routing
    # All /dashboard/* routes handled by React Router
    location /dashboard {
        proxy_pass http://web_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://web_dashboard;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
