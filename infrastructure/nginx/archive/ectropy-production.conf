# ============================================================================
# Ectropy Production Server Block
# This file contains BOTH upstream definitions AND server block configuration
# Deployed to: /etc/nginx/sites-enabled/ectropy-production
#
# IMPORTANT: Self-contained production configuration
# All upstreams defined here for deployment validation and runtime resolution
# ============================================================================

# ============================================================================
# Upstream Definitions - Backend Services
# ============================================================================

# API Gateway - Primary backend API
# FIXED: Use Docker network name instead of 127.0.0.1
upstream api_gateway {
    least_conn;
    server ectropy-api-gateway:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MCP Server Native - Stdio/Health endpoints (port 3001)
# FIXED: Use Docker network name instead of 127.0.0.1
upstream mcp_server {
    least_conn;
    server ectropy-mcp-server:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MCP Express API - HTTP REST API endpoints (port 3002)
# FIXED: Use Docker network name instead of 127.0.0.1
upstream mcp_express {
    least_conn;
    server ectropy-mcp-server:3002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MCP Health - Dedicated health check endpoint
# FIXED: Use Docker network name instead of 127.0.0.1
upstream mcp_health {
    least_conn;
    server ectropy-mcp-server:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Speckle BIM Server - GraphQL API and REST endpoints
# NOTE: Speckle not in current docker-compose - keeping 127.0.0.1 for future use
upstream speckle_server {
    least_conn;
    server 127.0.0.1:3100 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Speckle Frontend - Nuxt.js UI
# NOTE: Speckle not in current docker-compose - keeping 127.0.0.1 for future use
upstream speckle_frontend {
    least_conn;
    server 127.0.0.1:3101 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MinIO S3 API - Object storage
# NOTE: MinIO not in current docker-compose - keeping 127.0.0.1 for future use
upstream minio_api {
    least_conn;
    server 127.0.0.1:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MinIO Console - Admin interface
# NOTE: MinIO not in current docker-compose - keeping 127.0.0.1 for future use
upstream minio_console {
    least_conn;
    server 127.0.0.1:9001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Web Dashboard - Vite Preview Server (port 3002)
# FIXED (ROOT CAUSE #37): Use Docker network name for containerized Vite server
upstream web_dashboard {
    least_conn;
    server ectropy-web-dashboard:3002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ============================================================================
# Server Block Configuration
# UPDATED FOR NEW LOAD BALANCER ARCHITECTURE (2025-12-05)
# Load balancer handles SSL termination and routes to port 3000
# ============================================================================
server {
    listen 3000 default_server;
    server_name ectropy.ai www.ectropy.ai api.ectropy.ai;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================================================================
    # Load Balancer Health Check Endpoint - LAYER 1 (Independent)
    # ========================================================================
    # Enterprise 4-Layer Health Check Architecture:
    #   Layer 1 (LB):   nginx /lb-health → static response (THIS ENDPOINT)
    #   Layer 2 (App):  MCP /health → comprehensive app health
    #   Layer 3 (Container): Docker healthcheck → MCP /lb-health
    #   Layer 4 (Infra): Prometheus/Grafana → metrics
    #
    # CRITICAL: This endpoint is INDEPENDENT - no backend dependencies
    # DigitalOcean Load Balancer checks this endpoint (port 80)
    # Fast response (<1ms), breaks circular dependency, prevents cascading failures
    # ========================================================================
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # ========================================================================
    # Application Health Check Endpoint - LAYER 2 (Comprehensive)
    # ========================================================================
    # Full application health including database, Redis, memory checks
    # Used by: monitoring systems, diagnostics, troubleshooting
    # NOT used by: DigitalOcean Load Balancer (use /lb-health instead)
    # Enterprise fix: Uses upstream mcp_health (port 3001)
    # MCP dual-port architecture: 3001=health/stdio, 3002=Express API
    # ========================================================================
    location /health {
        proxy_pass http://mcp_health/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
    }

    # MCP Server Tools API - MUST come BEFORE general /api/ for specificity
    # Routes /api/tools* to MCP server on port 3001
    location /api/tools {
        proxy_pass http://mcp_server/api/tools;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-API-Key $http_x_api_key;

        # Timeouts for MCP operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # MCP Server routes - MUST come BEFORE /api/ for route specificity
    # Routes to MCP server on port 3001
    # MCP Express HTTP API - Port 3002
    # Routes /api/mcp/* to MCP Express server (NOT native stdio server on 3001)
    location /api/mcp/ {
        proxy_pass http://mcp_express/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }

    # API routes - proxy to API Gateway
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Hardcode to https for secure cookie support
        # All external traffic comes through HTTPS load balancer
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # CORS for API - Use correct protocol
        add_header Access-Control-Allow-Origin "https://ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Auth routes - proxy to API Gateway
    # CRITICAL: These settings ensure session cookies are properly forwarded
    location /auth/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Hardcode to https for secure cookie support
        # All external traffic comes through HTTPS load balancer
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # CRITICAL: Forward cookies from client to API Gateway
        proxy_pass_header Set-Cookie;
        proxy_cookie_domain localhost $host;
        proxy_cookie_path / /;

        # CORS headers for auth endpoints - Use correct protocol
        add_header Access-Control-Allow-Origin "https://ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # MCP Server direct routes (port 3001)
    # Routes /mcp/* to MCP server core endpoints
    # Strips /mcp prefix since MCP server expects /health not /mcp/health
    location /mcp/ {
        # Strip /mcp prefix and proxy to port 3001
        rewrite ^/mcp/(.*) /$1 break;

        proxy_pass http://mcp_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # MCP health checks should be fast
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ========================================================================
    # Speckle BIM Integration Routes
    # Enterprise BIM viewer, sharing, and collaboration platform
    # ========================================================================

    # Speckle Server GraphQL API - MUST come before /speckle/ for specificity
    location /speckle/graphql {
        proxy_pass http://speckle_server/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # GraphQL can have long-running queries
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Speckle Server REST API endpoints - MUST come before /speckle/ for specificity
    location /speckle/api/ {
        proxy_pass http://speckle_server/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # Generous timeouts for large file operations
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }

    # Speckle Frontend (Nuxt.js UI)
    location /speckle/ {
        proxy_pass http://speckle_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # SSR can take time
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # MinIO S3-Compatible Object Storage
    # Used by Speckle for large BIM file storage
    # ========================================================================

    # MinIO S3 API
    location /minio/ {
        proxy_pass http://minio_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Large file uploads (IFC files can be 100s of MB)
        client_max_body_size 2000M;
        proxy_request_buffering off;

        # S3 operations can be slow
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }

    # MinIO Admin Console
    location /minio-console/ {
        proxy_pass http://minio_console/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    # ========================================================================
    # Web Dashboard - Vite Preview Server (ROOT CAUSE #37 FIX)
    # Proxy to containerized Vite server instead of serving static files
    # ========================================================================
    location / {
        proxy_pass http://web_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # Always HTTPS from Load Balancer
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Vite HMR and development server support
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}
