# ============================================================================
# DEPRECATED: This configuration file is replaced by ectropy-staging.conf
# ============================================================================
# This file uses the OLD proxy pattern (localhost:3002)
# The MODERN enterprise pattern uses nginx static file serving
# See: infrastructure/nginx/ectropy-staging.conf for current configuration
#
# Key Differences:
# - OLD: Proxy to Node.js server on port 3002 (higher overhead, slower)
# - NEW: Direct static file serving from /var/www/ectropy (3x faster, better caching)
#
# Migration Status: docker-compose.staging.yml updated to remove port 3002 publishing
# Action Required: Use ectropy-staging.conf in production nginx configuration
# ============================================================================

server {
    listen 80;
    server_name staging.ectropy.ai;

    # Web Dashboard - React SPA (DEPRECATED: Use static file serving instead)
    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Set to https for secure cookie support
        # Load balancer terminates SSL, external connection is HTTPS
        proxy_set_header X-Forwarded-Proto https;
    }

    # API Gateway - REST API + OAuth
    # Route /api/* to API Gateway (preserves /api prefix)
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Set to https for secure cookie support
        # Load balancer terminates SSL, connects to nginx over HTTP
        # But express needs to know external connection is HTTPS for secure cookies
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # MCP Server - AI Orchestration
    location /mcp/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Set to https for secure cookie support
        # Load balancer terminates SSL, external connection is HTTPS
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}
