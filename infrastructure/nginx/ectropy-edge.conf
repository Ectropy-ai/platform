# ============================================================================
# Ectropy Edge Server Block - Construction Jobsite Deployment
# Target: OnLogic Karbon 521 behind Starlink + Peplink 5G
# Domain: pilot.jsc.ai (or local IP for offline LAN access)
# ============================================================================

# ============================================================================
# Upstream Definitions - Edge Services
# ============================================================================

upstream api_gateway {
    least_conn;
    server ectropy-api-gateway:4000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream mcp_server {
    least_conn;
    server ectropy-mcp:3001 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream web_dashboard {
    least_conn;
    server ectropy-web-dashboard:3002 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream edge_server {
    least_conn;
    server ectropy-edge-server:3004 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================================================
# Server Block - HTTP (port 80)
# Serves LAN clients via UniFi U7 Pro WiFi AP and wired connections
# ============================================================================
server {
    listen 80;
    server_name pilot.jsc.ai *.pilot.jsc.ai localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================================================================
    # Health Check Endpoints
    # ========================================================================

    # Layer 1: LB/monitoring health (ultra-lightweight)
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Layer 2: Application health (comprehensive)
    location /health {
        proxy_pass http://mcp_server/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }

    # ========================================================================
    # Edge Server Endpoints (IoT status, sensor data)
    # ========================================================================

    # Edge server health & status
    location /edge/ {
        proxy_pass http://edge_server/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ========================================================================
    # MCP Server Tools API
    # ========================================================================
    location /api/tools {
        limit_req zone=api burst=30 nodelay;

        proxy_pass http://mcp_server/api/tools;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-Key $http_x_api_key;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # MCP Server routes
    location /api/mcp/ {
        limit_req zone=api burst=30 nodelay;

        proxy_pass http://mcp_server/api/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # API Gateway Routes
    # ========================================================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # CORS for edge LAN access
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Authentication routes
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # Static Assets with Aggressive Caching (save bandwidth)
    # ========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";

        proxy_pass http://web_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ========================================================================
    # Web Dashboard - Catch-all
    # ========================================================================
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://web_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Block common attack patterns
    location ~* /(wp-admin|wp-login|phpmyadmin|admin|config|\.env) {
        return 404;
    }

    # Enable gzip (critical for satellite/cellular bandwidth)
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 512;
}
