# ============================================================================
# Ectropy HTTP-Level Configuration
# This file contains directives that must be in http context
# Deployed to: /etc/nginx/conf.d/ectropy-http-config.conf
# Loaded by: include /etc/nginx/conf.d/*.conf; (in main nginx.conf http block)
#
# IMPORTANT: Upstream definitions removed to prevent duplicates
# The main nginx.conf already defines upstreams at line 75
# This file only contains real_ip and map directives
# ============================================================================

# ============================================================================
# Real IP Configuration - DigitalOcean Load Balancer
# ============================================================================
# Trust X-Forwarded headers from DigitalOcean private network
set_real_ip_from 10.124.0.0/16;  # DigitalOcean private network range
set_real_ip_from 10.48.0.0/16;   # Additional DO network range
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# ============================================================================
# Protocol Forwarding Map
# ============================================================================
# Map to determine if request came through load balancer
# This ensures backend services receive correct protocol information
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https https;
    http http;
}
