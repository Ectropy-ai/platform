# ============================================================================
# Ectropy Production Server Block
# This file contains BOTH upstream definitions AND server block configuration
# Deployed to: /etc/nginx/sites-enabled/ectropy-production
#
# IMPORTANT: Self-contained production configuration
# All upstreams defined here for deployment validation and runtime resolution
# ============================================================================

# ============================================================================
# Upstream Definitions - Backend Services
# ============================================================================
# ENTERPRISE FIX (Chain-10): Dynamic DNS resolution with `resolve` parameter
# Without `resolve`, nginx resolves hostnames ONCE at startup — if any container
# is unavailable (not on network), nginx crashes with [emerg] "host not found"
# and takes down the ENTIRE reverse proxy (single point of failure).
#
# The `resolve` parameter (nginx 1.27.3+, open-sourced from NGINX Plus):
#   - Defers DNS resolution to runtime via the `resolver` directive
#   - nginx starts even if upstream containers are unavailable
#   - Periodically re-resolves using resolver 127.0.0.11 (Docker DNS)
#   - Unavailable upstreams get 502 errors, not a full platform outage
#
# The `zone` directive is MANDATORY when using `resolve` — creates shared memory
# so worker processes can share dynamically resolved addresses.
# ============================================================================

# API Gateway - Primary backend API
upstream api_gateway {
    zone api_gateway_zone 64k;
    least_conn;
    server ectropy-api-gateway:4000 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MCP Server Native - Stdio/Health endpoints (port 3001)
upstream mcp_server {
    zone mcp_server_zone 64k;
    least_conn;
    server ectropy-mcp:3001 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MCP Express API - HTTP REST API endpoints (port 3002)
upstream mcp_express {
    zone mcp_express_zone 64k;
    least_conn;
    server ectropy-mcp:3002 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# MCP Health - Dedicated health check endpoint
upstream mcp_health {
    zone mcp_health_zone 64k;
    least_conn;
    server ectropy-mcp:3001 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Web Dashboard - Vite Preview Server (port 3002)
upstream web_dashboard {
    zone web_dashboard_zone 64k;
    least_conn;
    server ectropy-web-dashboard:3002 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Ectropy Console - Platform Administration (port 3001)
upstream ectropy_console {
    zone ectropy_console_zone 64k;
    least_conn;
    server ectropy-console:3001 resolve max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================================================
# Server Block Configuration
# ENTERPRISE FIX (2025-12-19): P0 ROOT CAUSE #13 - Port Alignment with Load Balancer
# Architecture: DigitalOcean Load Balancer → Backend servers
# - LB receives HTTPS on port 443 (public)
# - LB terminates SSL and forwards HTTP to backend port 80 (private network)
# - Backend nginx listens on port 80 (this server block)
# - Docker exposes: 80:80, 443:443 (for direct access if needed)
# ============================================================================
server {
    listen 80;
    server_name ectropy.ai www.ectropy.ai api.ectropy.ai;

    # Security headers (Fortune 500: OWASP + PCI DSS 4.0 + NIST SP 800-53)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ========================================================================
    # Load Balancer Health Check Endpoint - LAYER 1 (Independent)
    # ========================================================================
    # Enterprise 4-Layer Health Check Architecture:
    #   Layer 1 (LB):   nginx /lb-health → static response (THIS ENDPOINT)
    #   Layer 2 (App):  MCP /health → comprehensive app health
    #   Layer 3 (Container): Docker healthcheck → MCP /lb-health
    #   Layer 4 (Infra): Prometheus/Grafana → metrics
    #
    # CRITICAL: This endpoint is INDEPENDENT - no backend dependencies
    # DigitalOcean Load Balancer checks this endpoint (port 80)
    # Fast response (<1ms), breaks circular dependency, prevents cascading failures
    # ========================================================================
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # ========================================================================
    # Application Health Check Endpoint - LAYER 2 (Comprehensive)
    # ========================================================================
    # Full application health including database, Redis, memory checks
    # Used by: monitoring systems, diagnostics, troubleshooting
    # NOT used by: DigitalOcean Load Balancer (use /lb-health instead)
    # Enterprise fix: Uses upstream mcp_health (port 3001)
    # MCP dual-port architecture: 3001=health/stdio, 3002=Express API
    # ========================================================================
    location /health {
        proxy_pass http://mcp_health/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
    }

    # MCP Server Tools API - MUST come BEFORE general /api/ for specificity
    # Routes /api/tools* to MCP Express server on port 3002
    location /api/tools {
        proxy_pass http://mcp_server/api/tools;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-API-Key $http_x_api_key;

        # Timeouts for MCP operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # MCP Server routes - MUST come BEFORE /api/ for route specificity
    # Routes to MCP Express server on port 3002
    # MCP Express HTTP API - Port 3002
    # Routes /api/mcp/* to MCP Express server (NOT native stdio server on 3001)
    location /api/mcp/ {
        proxy_pass http://mcp_express/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }

    # SEPPA AI Assistant API - MUST come BEFORE general /api/ for specificity
    # Routes /api/assistant* to MCP Express server on port 3002 (Claude-powered assistant)
    # FIX (2026-03-06): Was routing to web_dashboard (wrong backend — React SPA, not API)
    # Ground truth: apps/mcp-server/src/routes/assistant.routes.ts on ectropy-mcp:3002
    location /api/assistant {
        proxy_pass http://mcp_express/api/assistant;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-API-Key $http_x_api_key;

        # Timeouts for AI operations (longer due to Claude API calls)
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # API routes - proxy to API Gateway
    location /api/ {
        # Rate limiting: 30 req/s per IP with burst capacity
        limit_req zone=api burst=20 nodelay;
        limit_conn addr 50;

        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL FIX: Hardcode to https for secure cookie support
        # All external traffic comes through HTTPS load balancer
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Security headers (must be re-added due to nginx add_header inheritance)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # CORS for API - Use correct protocol
        add_header Access-Control-Allow-Origin "https://ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ENTERPRISE FIX (2026-01-09): OAuth Route Consolidation
    # REMOVED: Duplicate /auth/ location block that caused 404 errors
    # REASON: All OAuth routes mounted at /api/auth in Express (main.ts:522)
    # IMPACT: OAuth callbacks now correctly route to /api/auth/google/callback
    #
    # Previous config had two location blocks intercepting auth requests:
    #   1. /auth/ (REMOVED) - Caused 404 by forwarding without /api prefix
    #   2. /api/ (RETAINED) - Correct routing pattern for all API endpoints
    #
    # Benefits of removal:
    #   - Eliminates routing ambiguity
    #   - Follows enterprise pattern: single /api/* prefix for all API routes
    #   - Fixes OAuth 404 errors (callback, /me endpoint, logout)
    #   - Simplifies infrastructure configuration
    #
    # All authentication requests now flow through /api/ location block above

    # MCP Server direct routes (port 3001)
    # Routes /mcp/* to MCP server core endpoints
    # Strips /mcp prefix since MCP server expects /health not /mcp/health
    location /mcp/ {
        # Strip /mcp prefix and proxy to port 3001
        rewrite ^/mcp/(.*) /$1 break;

        proxy_pass http://mcp_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # MCP health checks should be fast
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ========================================================================
    # Web Dashboard - Vite Preview Server (ROOT CAUSE #37 FIX)
    # Proxy to containerized Vite server instead of serving static files
    # ========================================================================
    location / {
        proxy_pass http://web_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # Always HTTPS from Load Balancer
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Vite HMR and development server support
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}

# ============================================================================
# Console Server Block - console.ectropy.ai
# Platform administration interface for Ectropy staff
# ENTERPRISE FIX (2026-01-30): Subdomain-based routing for console
# ============================================================================
server {
    listen 80;
    server_name console.ectropy.ai;

    # Security headers (Fortune 500: OWASP + PCI DSS 4.0 + NIST SP 800-53)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Load Balancer Health Check
    location /lb-health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Application Health Check
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # API proxy - route /api/* to API Gateway for OAuth and backend calls
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;

        # CORS for Console API calls
        add_header Access-Control-Allow-Origin "https://console.ectropy.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Forwarded-Proto" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Console SPA - all routes handled by React Router
    location / {
        proxy_pass http://ectropy_console;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
}
