# ============================================================================
# Ectropy Platform - Main Nginx Configuration (Modular Architecture)
# ============================================================================
# Purpose: Minimal main nginx.conf for staging/production environments
# Architecture: Modular approach using sites-available/sites-enabled pattern
# Deployment: This file goes to /etc/nginx/nginx.conf on servers
#
# Site-specific configurations are in:
#   - infrastructure/nginx/ectropy-staging.conf (staging environment)
#   - infrastructure/nginx/ectropy-production.conf (production environment)
#
# Enterprise Pattern Benefits:
#   1. Separation of concerns (main config vs site configs)
#   2. Easy multi-site management
#   3. Clear deployment boundaries
#   4. Follows nginx best practices
#
# GitOps Validation: 2026-02-03
# This change validates the complete terraform GitOps pipeline after
# ROOT CAUSE #159-160 fixes (workflow triggers + terraform CI bugs)
# ============================================================================

user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Optimize for high load
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ========================================================================
    # Basic Settings
    # ========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ========================================================================
    # Docker DNS Resolution (Enterprise Pattern)
    # ========================================================================
    # CRITICAL FIX (ROOT CAUSE #29): Enable dynamic DNS resolution for Docker container names
    # Docker's internal DNS server at 127.0.0.11 resolves container names to IPs
    # Without this, Nginx crashes if upstream containers are unavailable at startup
    # Industry Pattern: RFC 1035 (DNS), Docker Embedded DNS Server
    # Parameters:
    #   - 127.0.0.11: Docker's internal DNS server IP
    #   - valid=30s: Cache DNS results for 30 seconds (balance between performance and updates)
    #   - ipv6=off: Disable IPv6 lookups (Docker bridge network is IPv4 only)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ========================================================================
    # Protocol Detection Map (Enterprise Pattern)
    # ========================================================================
    # ROOT CAUSE #233: Force HTTPS protocol for all requests
    # Architecture: ALL external traffic comes through HTTPS load balancer
    # Load balancer forwards as HTTP internally, but clients connect via HTTPS
    # Industry pattern: Trust load balancer SSL termination
    map $http_x_forwarded_proto $forwarded_proto {
        default https;  # All external traffic via HTTPS LB (SSL terminated at LB)
    }

    # ========================================================================
    # Performance Optimizations
    # ========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ========================================================================
    # Gzip Compression
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # ========================================================================
    # Rate Limiting Zones
    # ========================================================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ========================================================================
    # Security Headers (Global Defaults)
    # ========================================================================
    # Note: Site-specific configs can override these
    # IMPORTANT: Any location block with its own add_header MUST re-declare
    # these headers (nginx inheritance is broken by local add_header)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Fortune 500 Security Headers (OWASP, PCI DSS 4.0, NIST SP 800-53)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Rate limiting: Return 429 Too Many Requests (not default 503)
    limit_req_status 429;
    limit_conn_status 429;

    # ========================================================================
    # CRITICAL: Include Site-Specific Configurations
    # ========================================================================
    # This is where staging.conf, production.conf, etc. are loaded
    # Each site config defines its own server blocks and upstreams
    include /etc/nginx/sites-enabled/*;
}
