services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
      args:
        - NODE_ENV=development
    container_name: ectropy-codespaces-dev
    working_dir: /workspace
    env_file:
      - .env.dev
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
      - ectropy-pnpm-store:/home/vscode/.local/share/pnpm-store
      - ectropy-pnpm-cache:/home/vscode/.cache/pnpm
      - cypress-cache:/usr/local/share/cypress-cache
      - playwright-browsers:/ms-playwright
    environment:
      - NODE_ENV=development
      - PNPM_HOME=/home/vscode/.local/share/pnpm
      - PNPM_STORE_DIR=/home/vscode/.local/share/pnpm-store
      - PNPM_CACHE_DIR=/home/vscode/.cache/pnpm
      - NODE_OPTIONS=--max-old-space-size=4096
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ectropy-network

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_secure_postgres_2024}
      POSTGRES_DB: ${DATABASE_NAME:-construction_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-construction_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ectropy-network

  redis:
    image: redis:7-alpine
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-dev_secure_redis_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    sysctls:
      - net.core.somaxconn=1024
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_secure_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ectropy-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6334"
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6334
      - QDRANT__SERVICE__GRPC_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - ectropy-network

networks:
  ectropy-network:
    driver: bridge
    name: ectropy-dev-network

volumes:
  postgres_data:
  qdrant_data:
  node_modules:
  ectropy-pnpm-store:
  ectropy-pnpm-cache:
  cypress-cache:
  playwright-browsers:
