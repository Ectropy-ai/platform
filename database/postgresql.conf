# ====================================
# ECTROPY POSTGRESQL PRODUCTION CONFIGURATION
# Optimized for BIM workloads and spatial data
# ====================================

# CONNECTIONS AND AUTHENTICATION
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# RESOURCE USAGE
shared_buffers = 256MB                  # 25% of available memory (adjust for your system)
effective_cache_size = 1GB              # Estimate of available OS cache
work_mem = 16MB                         # Per-operation memory for sorts/hashes
maintenance_work_mem = 64MB             # Memory for maintenance operations
dynamic_shared_memory_type = posix

# WRITE AHEAD LOG (WAL)
wal_level = replica
wal_buffers = 16MB
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
archive_mode = on
archive_command = '/bin/true'           # Disable archiving in development

# REPLICATION
max_wal_senders = 3
max_replication_slots = 3

# QUERY TUNING
random_page_cost = 1.1                  # SSD optimization
effective_io_concurrency = 200          # Number of concurrent I/O operations
default_statistics_target = 100

# BIM/GIS SPECIFIC OPTIMIZATIONS
shared_preload_libraries = 'postgis-3'
max_locks_per_transaction = 256         # For complex spatial operations
temp_file_limit = 5GB                  # Limit for temporary files

# LOGGING
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000      # Log slow queries (1 second)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 10MB

# SECURITY
ssl = off                               # Enable in production with proper certificates
password_encryption = md5
row_security = on

# VACUUM AND ANALYZE
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1

# CLIENT CONNECTION DEFAULTS
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# PERFORMANCE MONITORING
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl
stats_temp_directory = 'pg_stat_tmp'

# SPATIAL DATA OPTIMIZATION (PostGIS)
postgis.gdal_enabled_drivers = 'ENABLE_ALL'
postgis.enable_outdb_rasters = true
