# ============================================================================
# Ectropy Edge Deployment - Construction Jobsite Configuration
# Created: 2026-02-20
# Target Hardware: OnLogic Karbon 521 (Intel Core Ultra, 16 cores, 16-96GB DDR5)
# Network: Starlink Gen 3 (primary) + Peplink BR1 Pro 5G (failover)
# Architecture: Full offline-capable stack with cloud sync
#
# Resource Budget (Karbon 521 w/ Core Ultra 5 125H, 16GB DDR5):
#   Available: 14 cores, 16 GB RAM
#   Reserved:  ~5.5 cores, ~5.3 GB RAM (34% CPU, 33% RAM)
#   Headroom:  ~8.5 cores, ~10.7 GB for OS, IoT, future services
# ============================================================================

services:
  # ==========================================================================
  # Nginx Reverse Proxy - Port 80 (Edge LAN Gateway)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: ectropy-nginx
    ports:
      - '80:80'       # LAN access for jobsite workers via WiFi AP
      - '443:443'     # HTTPS with local self-signed or Let's Encrypt cert
    volumes:
      - ./infrastructure/nginx/ectropy-edge.conf:/etc/nginx/sites-enabled/ectropy-edge:ro
      - ./infrastructure/nginx/main-edge.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      api-gateway:
        condition: service_started
      web-dashboard:
        condition: service_started
      edge-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:80/lb-health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ==========================================================================
  # API Gateway - Port 4000 (Internal)
  # Reduced resource limits for edge (fewer concurrent users on-site)
  # ==========================================================================
  api-gateway:
    image: ${DOCKER_REGISTRY:-ghcr.io/luhtech/ectropy}/api-gateway:${IMAGE_TAG:-latest}
    container_name: ectropy-api-gateway
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME:-ectropy_edge}
      - DATABASE_USER=${DATABASE_USER:-ectropy}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_URL=postgresql://${DATABASE_USER:-ectropy}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-ectropy_edge}?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL}
      - FRONTEND_URL=https://${EDGE_DOMAIN:-pilot.jsc.ai}
      - CORS_ORIGIN=https://${EDGE_DOMAIN:-pilot.jsc.ai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ==========================================================================
  # Web Dashboard - Port 3002 (Internal - Vite Production Server)
  # ==========================================================================
  web-dashboard:
    image: ${DOCKER_REGISTRY:-ghcr.io/luhtech/ectropy}/web-dashboard:${IMAGE_TAG:-latest}
    container_name: ectropy-web-dashboard
    environment:
      - NODE_ENV=production
      - PORT=3002
      - VITE_API_URL=https://${EDGE_DOMAIN:-pilot.jsc.ai}/api
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ==========================================================================
  # MCP Server - Port 3001 (Internal - AI Orchestration)
  # VALIDATION_ONLY=true for edge (no external AI API calls)
  # ==========================================================================
  mcp-server:
    image: ${DOCKER_REGISTRY:-ghcr.io/luhtech/ectropy}/mcp-server:${IMAGE_TAG:-latest}
    container_name: ectropy-mcp
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MCP_HOST=0.0.0.0
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME:-ectropy_edge}
      - DATABASE_USER=${DATABASE_USER:-ectropy}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_URL=postgresql://${DATABASE_USER:-ectropy}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-ectropy_edge}?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL}
      - VALIDATION_ONLY=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ==========================================================================
  # Ollama - Port 11434 (Local AI Inference for SEPPA)
  # Runs Qwen 2.5 7B locally — fully air-gapped, data never leaves jobsite.
  # Required by edge-server when SEPPA_PROVIDER=ollama.
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ectropy-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 6144M
        reservations:
          cpus: '2.0'
          memory: 4096M
    labels:
      - "com.luhtech.service=ollama"
      - "com.luhtech.venture=jobsitecontrol"
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ==========================================================================
  # Edge Server - Port 3004 (IoT Integration & Offline Sync)
  # Core edge service: MQTT client, connectivity monitor, data queue
  # ==========================================================================
  edge-server:
    image: ${DOCKER_REGISTRY:-ghcr.io/luhtech/ectropy}/edge-server:${IMAGE_TAG:-latest}
    container_name: ectropy-edge-server
    environment:
      - NODE_ENV=production
      - EDGE_PORT=3004
      - EDGE_HOSTNAME=0.0.0.0
      - MQTT_BROKER_URL=mqtt://mqtt-broker:1883
      - MQTT_TOPICS=sensors/#,alerts/#,equipment/#
      - CLOUD_API_URL=https://ectropy.ai/api
      - SYNC_INTERVAL_MS=30000
      - HEALTH_CHECK_INTERVAL_MS=10000
      - SITE_ID=${SITE_ID:-pilot-canadian-plant}
      - SITE_NAME=${SITE_NAME:-Canadian Plant Facility}
      - OFFLINE_QUEUE_MAX_SIZE=10000
      # SEPPA AI Provider — routed to local Ollama on edge
      - SEPPA_PROVIDER=${SEPPA_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct-q4_K_M}
    depends_on:
      mqtt-broker:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3004/health']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ==========================================================================
  # MQTT Broker - Ports 1883/9001 (IoT Sensor Hub)
  # Eclipse Mosquitto for construction site IoT devices
  # ==========================================================================
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: ectropy-mqtt-broker
    ports:
      - '1883:1883'    # MQTT protocol (wired sensors, equipment)
      - '9001:9001'    # WebSocket (browser-based dashboards)
    volumes:
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '2'

  # ==========================================================================
  # PostgreSQL - Port 5432 (Local Database for Offline Capability)
  # Local instance — no dependency on cloud-managed DB when offline
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ectropy-postgres
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-ectropy_edge}
      - POSTGRES_USER=${DATABASE_USER:-ectropy}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-ectropy} -d ${DATABASE_NAME:-ectropy_edge}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ==========================================================================
  # Redis - Port 6379 (Session & Cache Store)
  # Reduced memory for edge (256MB vs 1GB production)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ectropy-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ectropy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '2'

# ==========================================================================
# Networks
# ==========================================================================
networks:
  ectropy-network:
    driver: bridge

# ==========================================================================
# Volumes - Persistent data on Karbon 521 NVMe storage
# ==========================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  mqtt-data:
    driver: local
  mqtt-logs:
    driver: local
  nginx-logs:
    driver: local
  ollama_models:
    driver: local

# ==========================================================================
# Edge Deployment Resource Summary (Karbon 521: 14 cores, 16GB RAM)
# ==========================================================================
# Service           CPU Limit  Mem Limit  CPU Res  Mem Res
# nginx             0.25       128M       0.1      64M
# api-gateway       1.0        1024M      0.5      512M
# web-dashboard     0.25       256M       0.1      128M
# mcp-server        0.5        256M       0.25     128M
# edge-server       0.5        256M       0.25     128M
# ollama            4.0        6144M      2.0      4096M
# mqtt-broker       0.25       128M       0.1      64M
# postgres          1.0        1024M      0.5      512M
# redis             0.25       384M       0.1      128M
# ---------------------------------------------------------
# TOTAL             8.0        9.6GB      3.9      5.8GB
# HEADROOM          6 cores    6.4GB      10.1     10.2GB
