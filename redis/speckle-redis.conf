# ====================================
# SPECKLE REDIS CONFIGURATION
# Optimized for BIM data caching and session management
# ====================================

# NETWORK
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# GENERAL
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# SNAPSHOTTING (More frequent for BIM session data)
save 900 1      # Save if at least 1 key changed in 900 seconds
save 300 10     # Save if at least 10 keys changed in 300 seconds
save 60 100     # Save if at least 100 keys changed in 60 seconds (more frequent)

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename speckle-dump.rdb
dir /data

# SECURITY
protected-mode yes
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "SPECKLE_CONFIG_a9f2d8e1c4b7"

# MEMORY MANAGEMENT (Lower limit for BIM-specific cache)
maxmemory 256mb
maxmemory-policy volatile-lru  # Evict keys with expiry first
maxmemory-samples 5

# APPEND ONLY FILE (AOF) - Important for BIM session persistence
appendonly yes
appendfilename "speckle-appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 32mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# BIM-SPECIFIC OPTIMIZATIONS
# Larger hash entries for BIM object metadata
hash-max-ziplist-entries 1024
hash-max-ziplist-value 128

# Stream configuration for real-time BIM updates
stream-node-max-bytes 8192
stream-node-max-entries 200

# SLOW LOG (More sensitive for BIM operations)
slowlog-log-slower-than 5000
slowlog-max-len 256

# CLIENT OUTPUT BUFFER (Optimized for BIM data transfers)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 128mb 32mb 60
client-output-buffer-limit pubsub 64mb 16mb 60

# FREQUENCY
hz 10

# LATENCY MONITORING
latency-monitor-threshold 50

# ACTIVE REHASHING
activerehashing yes
