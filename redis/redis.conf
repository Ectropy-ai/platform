# ====================================
# ECTROPY REDIS PRODUCTION CONFIGURATION
# Optimized for session management and caching
# ====================================

# NETWORK
# SECURITY FIX: Bind only to localhost (127.0.0.1) to prevent external access
# Redis should ONLY be accessible from within Docker network or localhost
# Production/Staging: Use docker-compose command args (already secure)
# Development: If using this config file, bind to localhost only
bind 127.0.0.1
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# GENERAL
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# SNAPSHOTTING
# Save snapshots based on data changes
save 900 1      # Save if at least 1 key changed in 900 seconds
save 300 10     # Save if at least 10 keys changed in 300 seconds  
save 60 10000   # Save if at least 10000 keys changed in 60 seconds

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# REPLICATION
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# SECURITY
# Password will be set via command line --requirepass
protected-mode yes
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CONFIG_b835b9c4f5f8429b8b7e"

# MEMORY MANAGEMENT
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# APPEND ONLY FILE (AOF)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# LUA SCRIPTING
lua-time-limit 5000

# SLOW LOG
slowlog-log-slower-than 10000
slowlog-max-len 128

# LATENCY MONITORING
latency-monitor-threshold 100

# EVENT NOTIFICATION
notify-keyspace-events ""

# ADVANCED CONFIG
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# ACTIVE REHASHING
activerehashing yes

# CLIENT OUTPUT BUFFER LIMITS
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# CLIENT QUERY BUFFER
client-query-buffer-limit 1gb
proto-max-bulk-len 512mb

# FREQUENCY
hz 10

# AOF REWRITE INCREMENTAL FSYNC
aof-rewrite-incremental-fsync yes

# RDB SAVE INCREMENTAL FSYNC
rdb-save-incremental-fsync yes
