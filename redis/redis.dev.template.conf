# ====================================
# ECTROPY REDIS DEVELOPMENT CONFIGURATION TEMPLATE
# Safe configuration for development environments
# ====================================

# NETWORK
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# GENERAL
daemonize no
supervised no
loglevel notice
databases 16

# SNAPSHOTTING
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# SECURITY
# NOTE: Password should be set via command line --requirepass option
# Example: redis-server --requirepass ${REDIS_DEV_PASSWORD} --appendonly yes
# DO NOT set requirepass in this config file to avoid parsing errors
protected-mode yes

# Disable dangerous commands in development
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CONFIG_dev_safe"

# MEMORY MANAGEMENT
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# APPEND ONLY FILE (AOF)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 32mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# PERFORMANCE
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# MONITORING
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100

# CLIENT LIMITS
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# FREQUENCY
hz 10
