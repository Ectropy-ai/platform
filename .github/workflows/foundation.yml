name: Foundation Health
on:
  push:
    branches: [main]
    paths:
      - 'apps/**/*.ts'
      - 'apps/**/*.tsx'
      - 'libs/**/*.ts'
      - 'libs/**/*.tsx'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - 'apps/**/*.ts'
      - 'apps/**/*.tsx'
      - 'libs/**/*.ts'
      - 'libs/**/*.tsx'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch: # Enable manual trigger for on-demand health checks

jobs:
  # ENTERPRISE OPTIMIZATION: Removed disk-health-check job
  # RATIONALE: GitHub-hosted runners are ephemeral VMs with 80% baseline usage (normal)
  # The 75% critical threshold was designed for self-hosted runners with persistent storage
  # Disk monitoring preserved in runner-disk-health.yml for self-hosted runners
  # BENEFIT: Eliminates false positive failures, faster workflow startup
  # DECISION: Documented in enterprise-ci-cd-transformation-status.json Phase 3

  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        app: [mcp-server, api-gateway, web-dashboard]
    runs-on: ubuntu-latest # HYBRID STRATEGY: GitHub-hosted for builds
    environment: staging # Changed from 'develop' to access OAuth secrets consistently
    timeout-minutes: 15 # Reduced: Faster on GitHub-hosted
    permissions:
      contents: read
    env:
      # Core Environment
      NODE_ENV: test
      CI: true

      # Database Configuration
      DATABASE_HOST: ${{ vars.DATABASE_HOST }}
      DATABASE_PORT: ${{ vars.DATABASE_PORT }}
      DATABASE_NAME: ${{ vars.DATABASE_NAME }}
      DATABASE_USER: ${{ vars.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DATABASE_URL: postgresql://${{ vars.DATABASE_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DATABASE_HOST }}:${{ vars.DATABASE_PORT }}/${{ vars.DATABASE_NAME }}

      # Redis Configuration
      REDIS_HOST: ${{ vars.REDIS_HOST || 'redis' }}
      REDIS_PORT: ${{ vars.REDIS_PORT || '6379' }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      # Application Ports
      API_GATEWAY_PORT: 4000
      MCP_PORT: 3001
      WEB_PORT: 3000

      # Authentication Secrets
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      # OAuth Configuration (for E2E tests)
      # Enterprise Standard: environment-scoped secrets use environment-suffixed names for clarity and safety
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
      TEST_GOOGLE_EMAIL: ${{ secrets.TEST_GOOGLE_EMAIL }}
      TEST_GOOGLE_PASSWORD: ${{ secrets.TEST_GOOGLE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pre-flight OAuth validation - fails fast (<5s) with clear error messages
      - name: Validate OAuth Secrets
        uses: ./.github/actions/validate-oauth-secrets
        with:
          google-client-id: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          test-google-email: ${{ secrets.TEST_GOOGLE_EMAIL }}
          test-google-password: ${{ secrets.TEST_GOOGLE_PASSWORD }}
          environment-name: 'staging'
          fail-on-missing: 'true'

      - name: Validate Secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          SPECKLE_POSTGRES_PASSWORD: ${{ secrets.SPECKLE_POSTGRES_PASSWORD }}
          SPECKLE_REDIS_PASSWORD: ${{ secrets.SPECKLE_REDIS_PASSWORD }}
          SPECKLE_SESSION_SECRET: ${{ secrets.SPECKLE_SESSION_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          bash scripts/ci/validate-secrets.sh test

      - name: Validate Environment Variables
        run: bash scripts/core/validate-env.sh ci
        continue-on-error: false

      - name: Validate Build Scripts Exist
        run: |
          echo "🔍 Validating build script dependencies..."

          MISSING=0

          # Check MCP Server scripts
          if [[ ! -f "scripts/mcp/prepare-mcp-dist.mjs" ]]; then
            echo "❌ Missing: scripts/mcp/prepare-mcp-dist.mjs"
            MISSING=1
          fi

          # Check API Gateway scripts
          if [[ ! -f "scripts/ci/prepare-api-gateway-dist.mjs" ]]; then
            echo "❌ Missing: scripts/ci/prepare-api-gateway-dist.mjs"
            MISSING=1
          fi

          # Check CI validation scripts
          if [[ ! -f "scripts/ci/validate-workflow-scripts.sh" ]]; then
            echo "❌ Missing: scripts/ci/validate-workflow-scripts.sh"
            MISSING=1
          fi

          if [[ $MISSING -eq 1 ]]; then
            echo "❌ Build script validation FAILED"
            exit 1
          fi

          echo "✅ All build scripts exist"

      # HYBRID STRATEGY: GitHub-hosted runners use standard cache paths
      # No need for runner-specific directories or cleanup on ephemeral VMs
      - name: Setup pnpm cache
        id: cache-pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            .nx/cache
          key: ${{ runner.os }}-pnpm-build-v1-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-build-v1-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Install pnpm
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version
          echo "✅ pnpm configured with default GitHub Actions cache"

      - name: Install dependencies with retry
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "🔄 Dependency installation attempt $attempt of $max_attempts"
            if timeout 600 pnpm install --frozen-lockfile; then
              echo "✅ Dependencies installed successfully on attempt $attempt"
              break
            else
              echo "❌ Attempt $attempt failed"
              if [ $attempt -eq $max_attempts ]; then
                echo "🚨 All dependency installation attempts failed"
                exit 1
              fi
              echo "⏳ Waiting 30s before retry..."
              sleep 30
              ((attempt++))
            fi
          done

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Build diagnostics
        run: |
          echo "Memory before build:"
          free -h
          echo "Disk space:"
          df -h
          echo "NX version:"
          NX_DAEMON=false pnpm nx --version

      - name: Build ${{ matrix.app }}
        env:
          NX_DAEMON: false
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          echo "Starting build of ${{ matrix.app }}..."
          pnpm nx build ${{ matrix.app }} --verbose
          echo "✅ Build completed successfully"

      - name: Verify Build Output Exists
        run: |
          echo "🔍 Checking build output..."
          BUILD_DIR="dist/apps/${{ matrix.app }}"
          if [ ! -d "$BUILD_DIR" ] || [ -z "$(ls -A $BUILD_DIR)" ]; then
            echo "🚨 Build directory empty or missing: $BUILD_DIR"
            echo "Contents of dist/apps/:"
            ls -la dist/apps/ || echo "dist/apps/ does not exist"
            exit 1
          fi
          echo "✅ Build output present in $BUILD_DIR"
          echo "Files generated:"
          ls -lh "$BUILD_DIR"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: dist/apps/${{ matrix.app }}
          retention-days: 2
          if-no-files-found: error

      - name: 📊 Build Diagnostic Output on Failure
        if: failure()
        run: |
          echo "=== Build Failure Diagnostic Report for ${{ matrix.app }} ==="
          echo ""
          echo "📊 System Resources:"
          echo "Memory:"
          free -h
          echo ""
          echo "Disk:"
          df -h
          echo ""

          echo "📦 Build Directory Status:"
          BUILD_DIR="dist/apps/${{ matrix.app }}"
          if [ -d "$BUILD_DIR" ]; then
            echo "  ✅ Directory exists but may be incomplete"
            echo "  Contents:"
            ls -laR "$BUILD_DIR" | head -50
          else
            echo "  ❌ Directory does not exist"
            echo "  Checking parent directories:"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            ls -la dist/apps/ 2>/dev/null || echo "dist/apps/ does not exist"
          fi
          echo ""

          echo "🔍 Environment Variables:"
          echo "NODE_ENV: ${NODE_ENV:-not set}"
          echo "NODE_OPTIONS: ${NODE_OPTIONS:-not set}"
          echo "NX_DAEMON: ${NX_DAEMON:-not set}"
          echo ""

          echo "📋 NX Build Output (if available):"
          if [ -f ".nx/workspace-data/daemon.log" ]; then
            echo "Last 30 lines of NX daemon log:"
            tail -30 .nx/workspace-data/daemon.log
          fi
          echo ""

          echo "=== End Diagnostic Report ==="

      # HYBRID STRATEGY: No cleanup needed on GitHub-hosted (ephemeral VMs)

  # =============================================================================
  # VALIDATION JOB
  # =============================================================================
  # CRITICAL: This job MUST run AFTER build-matrix completes successfully.
  # The 'needs: build-matrix' dependency ensures proper execution order:
  #   1. build-matrix builds all apps (mcp-server, api-gateway, web-dashboard)
  #   2. build-matrix uploads artifacts to GitHub Actions artifact storage
  #   3. validate job starts ONLY after build-matrix completes
  #   4. validate downloads artifacts from GitHub Actions artifact storage
  #   5. validate runs production-readiness.sh and other validation checks
  #
  # Without this dependency, validate would run in parallel with build-matrix,
  # causing validation failures due to missing build artifacts.
  # =============================================================================
  validate:
    needs: build-matrix
    runs-on: ubuntu-latest # HYBRID STRATEGY: GitHub-hosted for validation
    environment: staging # Changed from 'develop' to access OAuth secrets (GOOGLE_CLIENT_ID, etc.)
    timeout-minutes: 15 # Reduced: Faster on GitHub-hosted
    env:
      # Core Environment
      NODE_ENV: test
      CI: true

      # Database Configuration
      DATABASE_HOST: ${{ vars.DATABASE_HOST }}
      DATABASE_PORT: ${{ vars.DATABASE_PORT }}
      DATABASE_NAME: ${{ vars.DATABASE_NAME }}
      DATABASE_USER: ${{ vars.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DATABASE_URL: postgresql://${{ vars.DATABASE_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DATABASE_HOST }}:${{ vars.DATABASE_PORT }}/${{ vars.DATABASE_NAME }}

      # Redis Configuration
      REDIS_HOST: ${{ vars.REDIS_HOST || 'redis' }}
      REDIS_PORT: ${{ vars.REDIS_PORT || '6379' }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      # Application Ports
      API_GATEWAY_PORT: 4000
      MCP_PORT: 3001
      WEB_PORT: 3000

      # Authentication Secrets
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      # OAuth Configuration (for E2E tests)
      # Enterprise Standard: environment-scoped secrets use environment-suffixed names for clarity and safety
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
      TEST_GOOGLE_EMAIL: ${{ secrets.TEST_GOOGLE_EMAIL }}
      TEST_GOOGLE_PASSWORD: ${{ secrets.TEST_GOOGLE_PASSWORD }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pre-flight OAuth validation - fails fast (<5s) with clear error messages
      - name: Validate OAuth Secrets
        uses: ./.github/actions/validate-oauth-secrets
        with:
          google-client-id: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          test-google-email: ${{ secrets.TEST_GOOGLE_EMAIL }}
          test-google-password: ${{ secrets.TEST_GOOGLE_PASSWORD }}
          environment-name: 'staging'
          fail-on-missing: 'true'

      - name: Validate Environment Variables
        run: bash scripts/core/validate-env.sh ci
        continue-on-error: false

      # Download build artifacts from build-matrix job
      # These artifacts are uploaded by build-matrix and must be downloaded
      # before running validation checks (especially production-readiness.sh)
      - name: Download Web Dashboard Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-web-dashboard
          path: dist/apps/web-dashboard

      - name: Download API Gateway Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-api-gateway
          path: dist/apps/api-gateway

      - name: Download MCP Server Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-mcp-server
          path: dist/apps/mcp-server

      - name: Validate Workflow Scripts Exist
        run: |
          echo "🔍 Validating all workflow-referenced scripts exist..."
          bash scripts/ci/validate-workflow-scripts.sh
          echo "✅ All workflow scripts validated"

      # HYBRID STRATEGY: GitHub-hosted runners use standard cache paths
      - name: Setup pnpm cache
        id: cache-pnpm-validate
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            .nx/cache
          key: ${{ runner.os }}-pnpm-validate-v1-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-validate-v1-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Install pnpm
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version
          echo "✅ pnpm configured with default GitHub Actions cache"

      # Install dependencies with retry logic using existing robust script
      - name: Install dependencies with retry
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "🔄 Dependency installation attempt $attempt of $max_attempts"
            if timeout 600 pnpm install --frozen-lockfile; then
              echo "✅ Dependencies installed successfully on attempt $attempt"
              break
            else
              echo "❌ Attempt $attempt failed"
              if [ $attempt -eq $max_attempts ]; then
                echo "🚨 All dependency installation attempts failed"
                exit 1
              fi
              echo "⏳ Waiting 30s before retry..."
              sleep 30
              ((attempt++))
            fi
          done

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Check system resources
        run: |
          echo "Memory: $(free -h)"
          echo "Disk: $(df -h)"
          echo "CPU: $(nproc)"
          # Check available memory and clean if needed
          available_memory=$(free | grep Mem | awk '{print ($7/$2)*100}')
          echo "Available memory: ${available_memory}%"
          if (( $(echo "$available_memory < 20" | bc -l) )); then
            echo "⚠️ Low memory warning - cleaning caches"
            pnpm store prune || true
            npm cache clean --force || true
            # Additional cleanup for CI environments
            rm -rf .nx/cache || true
            rm -rf node_modules/.cache || true
            echo "🧹 Cache cleanup completed"
          fi

          # Check disk space
          disk_usage=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
          echo "Disk usage: ${disk_usage}%"
          if [ "$disk_usage" -gt 85 ]; then
            echo "⚠️ High disk usage - attempting cleanup"
            # Clean various caches and temporary files
            rm -rf /tmp/* 2>/dev/null || true
            docker system prune -f 2>/dev/null || true
            echo "🧹 Disk cleanup completed"
          fi

      # CRITICAL: Dependency Declaration Validation
      - name: Validate App Dependencies
        run: |
          echo "🔍 Validating all apps declare their dependencies..."
          node scripts/ci/validate-dependencies.mjs
          if [ $? -eq 0 ]; then
            echo "✅ All apps have properly declared dependencies"
          else
            echo "❌ Some apps have undeclared dependencies"
            echo "This will cause MODULE_NOT_FOUND errors in Docker containers"
            exit 1
          fi

          echo ""
          echo "🧪 Testing prepare-dist scripts..."
          node scripts/ci/test-prepare-scripts.mjs
          if [ $? -eq 0 ]; then
            echo "✅ All prepare scripts generate valid package.json files"
          else
            echo "❌ Some prepare scripts have issues"
            exit 1
          fi

      # Evidence Schema Validation
      - name: Validate Evidence Schema
        env:
          EVIDENCE_VALIDATION_STRICT: 'false' # Allow schema warnings, fail only on critical errors
        run: |
          echo "🔍 Validating evidence files against schema..."
          node scripts/validation/validate-evidence.cjs
          if [ $? -eq 0 ]; then
            echo "✅ All evidence files pass schema validation"
          else
            echo "❌ Evidence schema validation failed"
            echo "Fix violations before merging"
            exit 1
          fi

      # Verify Build Artifacts (must run before Security Validation)
      - name: Verify Build Artifacts
        run: |
          echo "🔍 Verifying build artifacts from build-matrix job..."

          missing_artifacts=false

          # Check MCP Server artifacts
          if [ ! -d "dist/apps/mcp-server" ] || [ -z "$(ls -A dist/apps/mcp-server)" ]; then
            echo "❌ MCP Server: Build artifacts missing or empty"
            missing_artifacts=true
          else
            echo "✅ MCP Server: Artifacts found"
            echo "  Files: $(ls -1 dist/apps/mcp-server | wc -l)"
          fi

          # Check API Gateway artifacts
          if [ ! -d "dist/apps/api-gateway" ] || [ -z "$(ls -A dist/apps/api-gateway)" ]; then
            echo "❌ API Gateway: Build artifacts missing or empty"
            missing_artifacts=true
          else
            echo "✅ API Gateway: Artifacts found"
            echo "  Files: $(ls -1 dist/apps/api-gateway | wc -l)"
          fi

          # Check Web Dashboard artifacts
          if [ ! -d "dist/apps/web-dashboard" ] || [ -z "$(ls -A dist/apps/web-dashboard)" ]; then
            echo "❌ Web Dashboard: Build artifacts missing or empty"
            missing_artifacts=true
          else
            echo "✅ Web Dashboard: Artifacts found"
            echo "  Files: $(ls -1 dist/apps/web-dashboard | wc -l)"
          fi

          if [ "$missing_artifacts" = true ]; then
            echo ""
            echo "🚨 FAILURE: Build artifacts missing from build-matrix job"
            echo "The validate job requires successful completion of build-matrix"
            exit 1
          fi

          echo ""
          echo "✅ SUCCESS: All build artifacts verified"
          echo "Build-matrix job completed successfully, proceeding with validation"

      # CRITICAL SECURITY: Security Validation
      - name: Security Validation (BLOCKING)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          echo "🔒 Running security validation..."

          # OAuth secrets already validated by composite action above
          # Setting fallback values for production-readiness.sh if needed
          if [ -z "$GOOGLE_CLIENT_ID" ] || [ "$GOOGLE_CLIENT_ID" = "dummy-for-validation" ]; then
            export GOOGLE_CLIENT_ID="dummy-for-validation"
          fi

          if [ -z "$GOOGLE_CLIENT_SECRET" ] || [ "$GOOGLE_CLIENT_SECRET" = "dummy-for-validation" ]; then
            export GOOGLE_CLIENT_SECRET="dummy-for-validation"
          fi

          if [ -z "$SESSION_SECRET" ] || [ "$SESSION_SECRET" = "dummy-for-validation" ]; then
            export SESSION_SECRET="dummy-for-validation"
          fi

          chmod +x scripts/core/production-readiness.sh

          # Run security validation
          if ! bash scripts/core/production-readiness.sh; then
            echo "🚨 SECURITY VALIDATION FAILED"
            echo "This build is BLOCKED from deployment"
            exit 1
          fi

      - name: Truth baseline
        run: |
          bash scripts/core/truth-baseline.sh || echo "Truth script not found"

      # Add health score validation as per requirements
      - name: Health Score Validation (CRITICAL)
        run: |
          echo "🏥 Validating system health score..."

          # Try to start MCP server for health check
          if [ -f "apps/mcp-server/dist/main.js" ]; then
            echo "✅ MCP server build artifacts found"
            # Check if we can calculate health score using existing scripts
            if [ -f "scripts/core/calculate-health-score.js" ]; then
              echo "📊 Calculating health score..."
              health_score=$(timeout 30 node scripts/core/calculate-health-score.js 2>/dev/null || echo "0")
              echo "Health Score: $health_score"
              
              if [ "$health_score" -ge 95 ] 2>/dev/null; then
                echo "✅ Health score >= 95: PASS"
              else
                echo "⚠️ Health score < 95 or unable to calculate"
                echo "🔍 Running diagnostic checks..."
                echo "Build status summary:"
                echo "- Web Dashboard: $([ -d "dist/apps/web-dashboard" ] && echo "✅" || echo "❌")"
                echo "- API Gateway: $([ -d "dist/apps/api-gateway" ] && echo "✅" || echo "❌")"  
                echo "- MCP Server: $([ -d "apps/mcp-server/dist" ] && echo "✅" || echo "❌")"
              fi
            else
              echo "⚠️ Health score calculator not available"
            fi
          else
            echo "⚠️ MCP server build not found, cannot validate health score"
          fi

      - name: 📊 Diagnostic Output on Failure
        if: failure()
        run: |
          echo "=== Foundation Health Diagnostic Report ==="
          echo ""
          echo "📊 System Resources:"
          echo "Memory:"
          free -h
          echo ""
          echo "Disk:"
          df -h
          echo ""
          echo "CPU Load:"
          uptime
          echo ""

          echo "📦 Build Artifacts Status:"
          echo "API Gateway:"
          if [ -d "dist/apps/api-gateway" ]; then
            echo "  ✅ Directory exists"
            echo "  Files: $(ls -1 dist/apps/api-gateway 2>/dev/null | wc -l)"
            ls -lh dist/apps/api-gateway | head -20
          else
            echo "  ❌ Directory missing"
          fi
          echo ""

          echo "MCP Server:"
          if [ -d "dist/apps/mcp-server" ]; then
            echo "  ✅ Directory exists"
            echo "  Files: $(ls -1 dist/apps/mcp-server 2>/dev/null | wc -l)"
            ls -lh dist/apps/mcp-server | head -20
          else
            echo "  ❌ Directory missing"
          fi
          echo ""

          echo "Web Dashboard:"
          if [ -d "dist/apps/web-dashboard" ]; then
            echo "  ✅ Directory exists"
            echo "  Files: $(ls -1 dist/apps/web-dashboard 2>/dev/null | wc -l)"
            ls -lh dist/apps/web-dashboard | head -20
          else
            echo "  ❌ Directory missing"
          fi
          echo ""

          echo "🔍 Environment Validation:"
          echo "NODE_ENV: ${NODE_ENV:-not set}"
          echo "CI: ${CI:-not set}"
          echo "DATABASE_HOST: ${DATABASE_HOST:-not set}"
          echo "REDIS_HOST: ${REDIS_HOST:-not set}"
          echo ""

          echo "📋 Recent Build Logs (if available):"
          if [ -f "build.log" ]; then
            echo "Last 50 lines of build.log:"
            tail -50 build.log
          else
            echo "No build.log found"
          fi
          echo ""

          echo "🔍 pnpm Status:"
          pnpm config list 2>/dev/null || echo "pnpm config not available"
          echo ""

          echo "📊 Runner Cache Status:"
          if [ -d "/opt/runner-cache/${RUNNER_NAME}/.pnpm-store" ]; then
            echo "  ✅ pnpm store exists"
            du -sh "/opt/runner-cache/${RUNNER_NAME}/.pnpm-store" 2>/dev/null || echo "  Cannot check size"
          else
            echo "  ❌ pnpm store missing"
          fi
          echo ""

          echo "=== End Diagnostic Report ==="

      - name: Notify Slack on Foundation Failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          workflow-name: ${{ github.workflow }}
          custom-message: '🏗️ *Foundation health check failed* - Build or validation failures detected. Review before merging.'

      # HYBRID STRATEGY: No cleanup needed on GitHub-hosted (ephemeral VMs)
