name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Enterprise Security: Explicit least-privilege permissions
# WRITE + PR: Dependency updates creates PRs with updated packages
permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Check and Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Install pnpm
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/project.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nx-

      - name: Configure Git
        run: |
          git config --global user.name "Ectropy Bot"
          git config --global user.email "bot@ectropy.ai"

      - name: Check for outdated dependencies
        id: outdated
        run: |
          echo "📦 Checking for outdated dependencies..."
          pnpm outdated --format json > outdated.json || true

          if [ -s outdated.json ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            cat outdated.json | jq '.'
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ All dependencies are up to date"
          fi

      - name: Update patch and minor versions
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          echo "🔄 Updating patch and minor versions..."
          pnpm update --latest --interactive false || true
          pnpm install

      - name: Run security audit
        id: audit
        continue-on-error: true
        run: |
          echo "🔒 Running security audit..."
          pnpm audit --prod --audit-level=moderate --json > audit.json || true

          CRITICAL=$(jq '[.vulnerabilities[] | select(.severity=="critical")] | length' audit.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.vulnerabilities[] | select(.severity=="high")] | length' audit.json 2>/dev/null || echo 0)

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          echo "🔴 Critical: $CRITICAL"
          echo "🟠 High: $HIGH"

      - name: Fix security vulnerabilities
        if: steps.audit.outputs.critical > 0 || steps.audit.outputs.high > 0
        run: |
          echo "🔧 Attempting to fix security vulnerabilities..."
          pnpm audit fix || echo "Some vulnerabilities require manual fixes"

      - name: Run tests
        run: |
          echo "🧪 Running test suite..."
          pnpm test --run || echo "Some tests failed, will be noted in PR"

      - name: Create or update PR
        if: steps.outdated.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="dependencies/update-$(date +%Y-%m-%d)"

          # Create branch
          git checkout -b $BRANCH_NAME || git checkout $BRANCH_NAME

          # Stage changes
          git add pnpm-lock.yaml package.json packages/*/package.json apps/*/package.json

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No dependency changes to commit"
            exit 0
          fi

          # Commit changes
          git commit -m "chore: update dependencies (automated)

          - Update patch and minor versions
          - Fix security vulnerabilities
          - Critical vulnerabilities: ${{ steps.audit.outputs.critical }}
          - High vulnerabilities: ${{ steps.audit.outputs.high }}

          Generated by dependency-updates workflow"

          # Push changes
          git push origin $BRANCH_NAME --force

          # Create PR if it doesn't exist
          gh pr create \
            --title "chore: automated dependency updates" \
            --body "## Automated Dependency Updates

          This PR contains automated dependency updates from the weekly dependency check.

          ### Summary
          - 🔄 Updated patch and minor versions
          - 🔒 Security vulnerabilities fixed
            - Critical: ${{ steps.audit.outputs.critical }}
            - High: ${{ steps.audit.outputs.high }}

          ### Review Checklist
          - [ ] Review breaking changes in updated packages
          - [ ] Verify all tests pass
          - [ ] Check for any new security vulnerabilities
          - [ ] Review pnpm-lock.yaml changes

          **Generated by:** dependency-updates workflow
          **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --base main \
            --head $BRANCH_NAME \
            --label "dependencies" \
            --label "automated" \
            || echo "PR already exists"

      - name: Generate report
        if: always()
        run: |
          echo "## 📦 Dependency Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.outdated.outputs.has_updates }}" == "true" ]; then
            echo "### Updates Available" >> $GITHUB_STEP_SUMMARY
            echo "✅ Dependency updates created in PR" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No Updates" >> $GITHUB_STEP_SUMMARY
            echo "✅ All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Status" >> $GITHUB_STEP_SUMMARY
          echo "- 🔴 Critical: ${{ steps.audit.outputs.critical }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🟠 High: ${{ steps.audit.outputs.high }}" >> $GITHUB_STEP_SUMMARY
