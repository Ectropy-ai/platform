name: Align SpeckleStream to Canonical Project

on:
  workflow_dispatch:

jobs:
  align:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall
        id: fw
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          doctl compute firewall add-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          sleep 5

      - name: Add host keys
        run: |
          sleep 5
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Align stream 9a5215cc88 to canonical project dc1eaa5b
        run: |
          ssh root@${{ vars.PROD_BLUE_IP }} bash -s <<'ENDSSH'
          set -euo pipefail
          GATEWAY=$(docker ps --filter name=api-gateway --format "{{.Names}}" | head -1)
          echo "GATEWAY: $GATEWAY"

          echo "=== STEP 1: Delete stale stream 13e978e0e5 (for dc1eaa5b) ==="
          docker exec "$GATEWAY" node -e "
          const { PrismaClient } = require('@prisma/client');
          const p = new PrismaClient();
          p.speckleStream.deleteMany({ where: { stream_id: '13e978e0e5' } })
            .then(r => console.log('DELETED:', r.count, 'stream(s)'))
            .catch(e => console.error('DELETE_FAILED:', e.message))
            .finally(() => p.\$disconnect());
          " 2>&1

          echo ""
          echo "=== STEP 2: Update stream 9a5215cc88 → dc1eaa5b ==="
          docker exec "$GATEWAY" node -e "
          const { PrismaClient } = require('@prisma/client');
          const p = new PrismaClient();
          p.speckleStream.update({
            where: { stream_id: '9a5215cc88' },
            data: { construction_project_id: 'dc1eaa5b-7553-46ec-92a5-e20762a60c71' }
          })
            .then(r => console.log('UPDATED:', JSON.stringify({ id: r.id, stream_id: r.stream_id, construction_project_id: r.construction_project_id })))
            .catch(e => console.error('UPDATE_FAILED:', e.message))
            .finally(() => p.\$disconnect());
          " 2>&1

          echo ""
          echo "=== STEP 3: Verify final state ==="
          docker exec "$GATEWAY" node -e "
          const { PrismaClient } = require('@prisma/client');
          const p = new PrismaClient();
          p.speckleStream.findMany()
            .then(r => console.log(JSON.stringify(r, null, 2)))
            .catch(e => console.error('VERIFY_FAILED:', e.message))
            .finally(() => p.\$disconnect());
          " 2>&1
          ENDSSH

      - name: Remove runner IP from firewall
        if: always()
        run: |
          doctl compute firewall remove-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:${{ steps.fw.outputs.runner_ip }}/32"
