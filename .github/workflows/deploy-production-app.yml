name: Deploy Production App
# DEC-032 Day 2 v2 Stream 4B — container image pipeline, zero-SSH
# Tag format: {semver}-{short-sha} (e.g., 1.3.0-a59f22e)
# Flow: confirm → canary → compute-tag → build+push DOCR →
#   targeted TF apply (IMAGE_TAG) → config-sync picks up → health → canary
# Not runnable until Stream 6 installs config-sync on nodes.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PRODUCTION to confirm'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional, logged to summary)'
        required: false
        type: string
        default: ''
      feature_ids:
        description: 'Feature IDs being shipped (optional, comma-separated)'
        required: false
        type: string
        default: ''

concurrency:
  group: production-app
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VERSION: "1.14.0"
  TF_WORKING_DIR: "./infrastructure/terraform/environments/production"
  REGISTRY: registry.digitalocean.com/ectropy-registry

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Gate: typed confirmation
  # ──────────────────────────────────────────────────────────────────
  confirm-check:
    name: Verify Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Assert PRODUCTION confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "PRODUCTION" ]; then
            echo "ERROR: must type PRODUCTION to confirm"
            exit 1
          fi
          echo "Confirmation received."

  # ──────────────────────────────────────────────────────────────────
  # Gate: n8n canary (pre-deploy)
  # ──────────────────────────────────────────────────────────────────
  canary-pre:
    name: Canary Pre-Deploy
    needs: confirm-check
    runs-on: ubuntu-latest
    steps:
      - name: n8n canary
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST https://n8n.luh.tech/webhook/lead-capture)
          if [ "$code" != "200" ]; then
            echo "ERROR: n8n canary returned $code (expected 200)"
            exit 1
          fi
          echo "n8n canary: 200"

  # ──────────────────────────────────────────────────────────────────
  # Compute image tag from root package.json semver + commit SHA
  # ──────────────────────────────────────────────────────────────────
  compute-tag:
    name: Compute Image Tag
    needs: canary-pre
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      semver: ${{ steps.tag.outputs.semver }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          SEMVER=$(python3 -c "import json; print(json.load(open('package.json')).get('version','0.0.0'))")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SEMVER}-${SHORT_SHA}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "## Image Tag: \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────
  # Build and push 3 service images to DOCR
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: compute-tag
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: true
      matrix:
        service: [api-gateway, mcp-server, web-dashboard]
    env:
      IMAGE_TAG: ${{ needs.compute-tag.outputs.image_tag }}
      SEMVER: ${{ needs.compute-tag.outputs.semver }}
      SHORT_SHA: ${{ needs.compute-tag.outputs.short_sha }}
      LUHTECH_PKG_READ: ${{ secrets.LUHTECH_PKG_READ }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Install pnpm
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        timeout-minutes: 10

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Build ${{ matrix.service }}
        run: pnpm nx build ${{ matrix.service }} --configuration=production
        timeout-minutes: 20
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NX_DAEMON: false

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: DOCR login
        run: doctl registry login --expiry-seconds 3600

      - name: Build Docker image
        run: |
          docker build \
            -f apps/${{ matrix.service }}/Dockerfile \
            -t ${{ matrix.service }}:latest \
            --build-arg NODE_ENV=production \
            --build-arg BUILD_SHA=${{ github.sha }} \
            --build-arg LUHTECH_PKG_READ=${{ secrets.LUHTECH_PKG_READ }} \
            .

      - name: Tag and push
        run: |
          for tag in latest ${{ github.sha }} ${SHORT_SHA} ${SEMVER} ${IMAGE_TAG}; do
            docker tag ${{ matrix.service }}:latest ${{ env.REGISTRY }}/${{ matrix.service }}:${tag}
            docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${tag}
          done
          echo "Pushed 5 tags for ${{ matrix.service }}"

  # ──────────────────────────────────────────────────────────────────
  # Targeted TF apply: update IMAGE_TAG in Spaces .env
  # ──────────────────────────────────────────────────────────────────
  terraform-apply-image-tag:
    name: TF Apply (IMAGE_TAG)
    needs: [compute-tag, build-and-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terraform Variables
        uses: ./.github/actions/setup-terraform-vars
        with:
          environment: production
          digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}
          ssl-certificate-name: ectropy-production-cert
          app-version: ${{ github.sha }}
          image-tag: ${{ needs.compute-tag.outputs.image_tag }}
          api-url: ${{ vars.API_URL }}
          frontend-url: ${{ vars.FRONTEND_URL }}
          database-url: ${{ secrets.DATABASE_URL }}
          database-host: ${{ vars.DATABASE_HOST }}
          database-password: ${{ secrets.DB_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          jwt-refresh-secret: ${{ secrets.JWT_REFRESH_SECRET }}
          session-secret: ${{ secrets.SESSION_SECRET }}
          encryption-key: ${{ secrets.ENCRYPTION_KEY }}
          google-client-id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          mcp-api-key: ${{ secrets.MCP_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          speckle-server-token: ${{ secrets.SPECKLE_SERVER_TOKEN }}
          speckle-admin-password: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          speckle-session-secret: ${{ secrets.SPECKLE_SESSION_SECRET }}
          minio-access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio-secret-key: ${{ secrets.MINIO_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
          spaces-access-key-id: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          spaces-secret-access-key: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          docr-config-json: ${{ secrets.DOCR_CONFIG_JSON }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          platform-database-url: ${{ secrets.PLATFORM_DATABASE_URL }}
          shared-database-url: ${{ secrets.SHARED_DATABASE_URL }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          viewer-token-secret: ${{ secrets.VIEWER_TOKEN_SECRET }}
          crm-api-key: ${{ secrets.CRM_API_KEY }}
          crm-webhook-secret: ${{ secrets.CRM_WEBHOOK_SECRET }}
          db-admin-password: ${{ secrets.DB_ADMIN_PASSWORD }}
          qdrant-api-key: ${{ secrets.QDRANT_API_KEY }}
          speckle-admin-email: ${{ vars.SPECKLE_ADMIN_EMAIL || 'speckle-admin@ectropy.ai' }}
          speckle-server-url: ${{ vars.SPECKLE_SERVER_URL || 'http://ectropy-speckle-server:3000' }}
          minio-public-url: ${{ vars.MINIO_PUBLIC_URL || 'https://ectropy.ai/minio' }}
          resend-from-email: ${{ vars.RESEND_FROM_EMAIL || 'noreply@ectropy.ai' }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: terraform init -backend=true -input=false

      - name: Terraform Apply (targeted — IMAGE_TAG only)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          terraform apply -auto-approve \
            -target=local_file.production_env \
            -target=module.production_env_upload \
            -input=false

  # ──────────────────────────────────────────────────────────────────
  # Wait for config-sync to pick up new .env from Spaces
  # ──────────────────────────────────────────────────────────────────
  wait-for-config-sync:
    name: Wait for Config-Sync
    needs: terraform-apply-image-tag
    runs-on: ubuntu-latest
    steps:
      - name: Wait for convergence
        run: |
          echo "Waiting 90s for config-sync on nodes to poll Spaces..."
          echo "(pre-Stream-6: config-sync not yet installed — wait is harmless)"
          sleep 90

  # ──────────────────────────────────────────────────────────────────
  # Health validation
  # ──────────────────────────────────────────────────────────────────
  health-validation:
    name: Health Validation
    needs: [compute-tag, wait-for-config-sync]
    runs-on: ubuntu-latest
    env:
      EXPECTED_SHA: ${{ needs.compute-tag.outputs.short_sha }}
    steps:
      - name: LB health check
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              https://ectropy.ai/lb-health)
            if [ "$code" = "200" ]; then
              echo "LB health: 200 (attempt $attempt)"
              exit 0
            fi
            echo "LB health: $code (attempt $attempt) — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: LB health did not return 200 after 3 attempts"
          exit 1

      - name: API health + buildSha verification
        run: |
          response=$(curl -s https://ectropy.ai/api/health)
          echo "$response"
          echo "$response" | python3 -c "
          import json, sys, os
          d = json.load(sys.stdin)
          if d.get('status') != 'healthy':
              print(f'ERROR: status = {d.get(\"status\")}')
              sys.exit(1)
          build = d.get('buildSha', '')
          expected = os.environ.get('EXPECTED_SHA', '')
          if expected and not build.startswith(expected):
              print(f'WARN: buildSha {build[:8]} != expected {expected}')
              print('(config-sync may not have picked up yet)')
              # Pre-Stream-6: do not fail — config-sync not installed
              # TODO Stream 7: flip to exit 1 after convergence proven
          print(f'API: {d[\"status\"]}, buildSha: {build[:8]}')
          "

  # ──────────────────────────────────────────────────────────────────
  # Log release metadata (greenfield hooks for future consumers)
  # ──────────────────────────────────────────────────────────────────
  log-release-metadata:
    name: Log Release
    needs: [compute-tag, health-validation]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize release
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<SUMMARY
          ## Release Complete
          - **Image tag**: \`${{ needs.compute-tag.outputs.image_tag }}\`
          - **Semver**: ${{ needs.compute-tag.outputs.semver }}
          - **SHA**: ${{ needs.compute-tag.outputs.short_sha }}
          - **Release notes**: ${{ inputs.release_notes || '(none)' }}
          - **Feature IDs**: ${{ inputs.feature_ids || '(none)' }}
          - **Commit**: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          SUMMARY

  # ──────────────────────────────────────────────────────────────────
  # Gate: n8n canary (post-deploy)
  # ──────────────────────────────────────────────────────────────────
  canary-post:
    name: Canary Post-Deploy
    needs: log-release-metadata
    runs-on: ubuntu-latest
    steps:
      - name: n8n canary
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST https://n8n.luh.tech/webhook/lead-capture)
          if [ "$code" != "200" ]; then
            echo "ERROR: n8n canary post returned $code"
            exit 1
          fi
          echo "n8n canary: 200"

      - name: Workflow complete
        run: |
          echo '## Deploy Production App — SUCCESS' >> $GITHUB_STEP_SUMMARY
          echo 'All gates passed.' >> $GITHUB_STEP_SUMMARY
