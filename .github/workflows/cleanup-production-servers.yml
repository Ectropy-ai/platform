name: Cleanup Production Servers

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target server(s) to clean'
        required: true
        type: choice
        options:
          - blue
          - green
          - both

env:
  PROD_BLUE_IP: ${{ vars.PROD_BLUE_IP }}
  PROD_GREEN_IP: ${{ vars.PROD_GREEN_IP }}

jobs:
  cleanup-blue:
    name: Cleanup Blue Production Server
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'blue' || inputs.target == 'both' }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: fw
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          doctl compute firewall add-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: ssh-keyscan -H ${{ env.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Run cleanup on blue server
        run: |
          echo "=== Cleaning Blue Production Server ==="
          ssh root@${{ env.PROD_BLUE_IP }} "docker system prune -af --volumes && df -h"

      - name: Remove runner IP from firewall (cleanup)
        if: always()
        run: |
          doctl compute firewall remove-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:${{ steps.fw.outputs.runner_ip }}/32"

  cleanup-green:
    name: Cleanup Green Production Server
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'green' || inputs.target == 'both' }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: fw
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          doctl compute firewall add-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: ssh-keyscan -H ${{ env.PROD_GREEN_IP }} >> ~/.ssh/known_hosts

      - name: Run cleanup on green server
        run: |
          echo "=== Cleaning Green Production Server ==="
          ssh root@${{ env.PROD_GREEN_IP }} "docker system prune -af --volumes && df -h"

      - name: Remove runner IP from firewall (cleanup)
        if: always()
        run: |
          doctl compute firewall remove-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:${{ steps.fw.outputs.runner_ip }}/32"

  summary:
    name: Cleanup Summary
    runs-on: ubuntu-latest
    needs: [cleanup-blue, cleanup-green]
    if: always()
    steps:
      - name: Display summary
        run: |
          echo "Target: ${{ inputs.target }}"
          echo "Blue: ${{ needs.cleanup-blue.result }}"
          echo "Green: ${{ needs.cleanup-green.result }}"
