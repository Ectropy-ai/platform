name: Cleanup Production Servers

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target server(s) to clean'
        required: true
        type: choice
        options:
          - blue
          - green
          - both

env:
  PROD_BLUE_IP: ${{ vars.PROD_BLUE_IP }}
  PROD_GREEN_IP: ${{ vars.PROD_GREEN_IP }}
  PROD_BLUE_DROPLET_ID: ${{ vars.PROD_BLUE_DROPLET_ID }}
  PROD_GREEN_DROPLET_ID: ${{ vars.PROD_GREEN_DROPLET_ID }}

jobs:
  cleanup-blue:
    name: Cleanup Blue Production Server
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'blue' || inputs.target == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          CURRENT_RULES=$(doctl compute firewall get "$FIREWALL_ID" --format InboundRules --no-header)
          CURRENT_SSH_IPS=$(echo "$CURRENT_RULES" | grep -oP 'address:\K[0-9./]+' | grep -v "$RUNNER_IP" | sort -u | paste -sd',' -)
          NEW_SSH_IPS="${CURRENT_SSH_IPS},${RUNNER_IP}/32"
          doctl compute firewall update "$FIREWALL_ID" \
            --name "ectropy-production-tf-managed" \
            --inbound-rules "protocol:tcp,ports:22,address:${NEW_SSH_IPS} protocol:tcp,ports:80,address:0.0.0.0/0 protocol:tcp,ports:443,address:0.0.0.0/0" \
            --outbound-rules "protocol:tcp,ports:all,address:0.0.0.0/0 protocol:udp,ports:all,address:0.0.0.0/0 protocol:icmp,address:0.0.0.0/0" \
            --droplet-ids "${{ env.PROD_BLUE_DROPLET_ID }},${{ env.PROD_GREEN_DROPLET_ID }}"
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ env.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Run cleanup on blue server
        run: |
          echo "========================================="
          echo "Cleaning up Blue Production Server"
          echo "========================================="
          ssh root@${{ env.PROD_BLUE_IP }} "docker system prune -af --volumes && df -h"

      - name: Remove runner IP from firewall (cleanup)
        if: always()
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          CURRENT_RULES=$(doctl compute firewall get "$FIREWALL_ID" --format InboundRules --no-header)
          REMAINING_IPS=$(echo "$CURRENT_RULES" | grep -oP 'address:\K[0-9./]+' | grep -v "$RUNNER_IP" | sort -u | paste -sd',' -)
          doctl compute firewall update "$FIREWALL_ID" \
            --name "ectropy-production-tf-managed" \
            --inbound-rules "protocol:tcp,ports:22,address:${REMAINING_IPS} protocol:tcp,ports:80,address:0.0.0.0/0 protocol:tcp,ports:443,address:0.0.0.0/0" \
            --outbound-rules "protocol:tcp,ports:all,address:0.0.0.0/0 protocol:udp,ports:all,address:0.0.0.0/0 protocol:icmp,address:0.0.0.0/0" \
            --droplet-ids "${{ env.PROD_BLUE_DROPLET_ID }},${{ env.PROD_GREEN_DROPLET_ID }}"

  cleanup-green:
    name: Cleanup Green Production Server
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'green' || inputs.target == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          CURRENT_RULES=$(doctl compute firewall get "$FIREWALL_ID" --format InboundRules --no-header)
          CURRENT_SSH_IPS=$(echo "$CURRENT_RULES" | grep -oP 'address:\K[0-9./]+' | grep -v "$RUNNER_IP" | sort -u | paste -sd',' -)
          NEW_SSH_IPS="${CURRENT_SSH_IPS},${RUNNER_IP}/32"
          doctl compute firewall update "$FIREWALL_ID" \
            --name "ectropy-production-tf-managed" \
            --inbound-rules "protocol:tcp,ports:22,address:${NEW_SSH_IPS} protocol:tcp,ports:80,address:0.0.0.0/0 protocol:tcp,ports:443,address:0.0.0.0/0" \
            --outbound-rules "protocol:tcp,ports:all,address:0.0.0.0/0 protocol:udp,ports:all,address:0.0.0.0/0 protocol:icmp,address:0.0.0.0/0" \
            --droplet-ids "${{ env.PROD_BLUE_DROPLET_ID }},${{ env.PROD_GREEN_DROPLET_ID }}"
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ env.PROD_GREEN_IP }} >> ~/.ssh/known_hosts

      - name: Run cleanup on green server
        run: |
          echo "========================================="
          echo "Cleaning up Green Production Server"
          echo "========================================="
          ssh root@${{ env.PROD_GREEN_IP }} "docker system prune -af --volumes && df -h"

      - name: Remove runner IP from firewall (cleanup)
        if: always()
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          CURRENT_RULES=$(doctl compute firewall get "$FIREWALL_ID" --format InboundRules --no-header)
          REMAINING_IPS=$(echo "$CURRENT_RULES" | grep -oP 'address:\K[0-9./]+' | grep -v "$RUNNER_IP" | sort -u | paste -sd',' -)
          doctl compute firewall update "$FIREWALL_ID" \
            --name "ectropy-production-tf-managed" \
            --inbound-rules "protocol:tcp,ports:22,address:${REMAINING_IPS} protocol:tcp,ports:80,address:0.0.0.0/0 protocol:tcp,ports:443,address:0.0.0.0/0" \
            --outbound-rules "protocol:tcp,ports:all,address:0.0.0.0/0 protocol:udp,ports:all,address:0.0.0.0/0 protocol:icmp,address:0.0.0.0/0" \
            --droplet-ids "${{ env.PROD_BLUE_DROPLET_ID }},${{ env.PROD_GREEN_DROPLET_ID }}"

  summary:
    name: Cleanup Summary
    runs-on: ubuntu-latest
    needs: [cleanup-blue, cleanup-green]
    if: always()

    steps:
      - name: Display summary
        run: |
          echo "========================================="
          echo "PRODUCTION SERVER CLEANUP COMPLETE"
          echo "========================================="
          echo ""
          echo "Target: ${{ inputs.target }}"
          echo ""
          if [ "${{ needs.cleanup-blue.result }}" == "success" ]; then
            echo "✅ Blue server cleanup: SUCCESS"
          elif [ "${{ needs.cleanup-blue.result }}" == "skipped" ]; then
            echo "⏭️  Blue server cleanup: SKIPPED"
          else
            echo "❌ Blue server cleanup: FAILED"
          fi

          if [ "${{ needs.cleanup-green.result }}" == "success" ]; then
            echo "✅ Green server cleanup: SUCCESS"
          elif [ "${{ needs.cleanup-green.result }}" == "skipped" ]; then
            echo "⏭️  Green server cleanup: SKIPPED"
          else
            echo "❌ Green server cleanup: FAILED"
          fi
          echo ""
          echo "Next step: Retry production deployment"
