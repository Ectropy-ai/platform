name: Terraform Plan/Apply

# PHASE 5 UPDATE (2026-02-04): Multi-environment terraform plan/apply support
# Supports development, staging, and production environments with isolated states

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-plan-apply.yml'
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-plan-apply.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to target'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: '1.14.0' # Standardized across all Terraform workflows (aligned with local development)
  AWS_REGION: 'us-east-1' # Required for S3 backend, not used by Spaces

# Prevent concurrent terraform operations on same environment (state lock contention)
concurrency:
  group: terraform-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

# Enterprise Security: Explicit least-privilege permissions
# READ + DEPLOY: Terraform apply needs read IaC and deploy infrastructure
permissions:
  contents: read
  deployments: write

jobs:
  terraform-plan:
    name: Terraform Plan - ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Environment
        id: set-env
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "working_dir=infrastructure/terraform/environments/$ENV" >> $GITHUB_OUTPUT

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        run: |
          echo "📝 Checking Terraform formatting for ${{ steps.set-env.outputs.environment }}..."
          terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Init
        id: init
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔧 Initializing Terraform for ${{ steps.set-env.outputs.environment }}..."
          terraform init -input=false

      - name: Terraform Validate
        id: validate
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        run: |
          echo "✅ Validating Terraform configuration for ${{ steps.set-env.outputs.environment }}..."
          terraform validate -no-color

      # Resolve environment-specific GitHub vars/secrets to generic TF_VAR names
      # ROOT CAUSE: Variables were hardcoded for staging (STAGING_APP_VERSION, GOOGLE_CLIENT_ID_STAGING)
      # FIX: Select the correct GitHub var/secret based on target environment
      - name: Resolve Environment Variables
        id: env-vars
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          echo "Resolving variables for environment: $ENV"

          if [ "$ENV" = "production" ]; then
            echo "app_version=${{ vars.PRODUCTION_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.PRODUCTION_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.PRODUCTION_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "development" ]; then
            echo "app_version=${{ vars.DEVELOPMENT_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.DEVELOPMENT_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.DEVELOPMENT_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          else
            echo "app_version=${{ vars.STAGING_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.STAGING_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.STAGING_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform Variables
        uses: ./.github/actions/setup-terraform-vars
        with:
          environment: ${{ steps.set-env.outputs.environment }}
          digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          ssh-private-key: ${{ secrets.TERRAFORM_DEPLOY_PRIVATE_KEY }}
          ssl-certificate-name: ${{ vars.SSL_CERTIFICATE_NAME }}
          ssl-cert-private-key: ${{ secrets.CF_ORIGIN_KEY }}
          ssl-cert-leaf: ${{ secrets.CF_ORIGIN_CERT }}
          app-version: ${{ steps.env-vars.outputs.app_version }}
          api-url: ${{ steps.env-vars.outputs.api_url }}
          frontend-url: ${{ steps.env-vars.outputs.frontend_url }}
          database-url: ${{ secrets.DATABASE_URL }}
          database-host: ${{ vars.DATABASE_HOST }}
          database-password: ${{ secrets.DB_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          jwt-refresh-secret: ${{ secrets.JWT_REFRESH_SECRET }}
          session-secret: ${{ secrets.SESSION_SECRET }}
          encryption-key: ${{ secrets.ENCRYPTION_KEY }}
          google-client-id: ${{ steps.set-env.outputs.environment == 'production' && secrets.GOOGLE_CLIENT_ID_PRODUCTION || secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ steps.set-env.outputs.environment == 'production' && secrets.GOOGLE_CLIENT_SECRET_PRODUCTION || secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          mcp-api-key: ${{ secrets.MCP_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          speckle-server-token: ${{ secrets.SPECKLE_SERVER_TOKEN }}
          speckle-admin-password: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          speckle-session-secret: ${{ secrets.SPECKLE_SESSION_SECRET }}
          minio-access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio-secret-key: ${{ secrets.MINIO_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
          watchtower-http-api-token: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
          spaces-access-key-id: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          spaces-secret-access-key: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          docr-config-json: ${{ secrets.DOCR_CONFIG_JSON }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          platform-database-url: ${{ secrets.PLATFORM_DATABASE_URL }}
          shared-database-url: ${{ secrets.SHARED_DATABASE_URL }}

      - name: Terraform Plan
        id: plan
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "Running Terraform plan for ${{ steps.set-env.outputs.environment }}..."
          # Each environment has isolated state and variables
          # Secrets/variables passed via environment variables (TF_VAR_* pattern)
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Save Plan Output
        id: plan-output
        if: always()
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        run: |
          PLAN_OUTPUT=$(cat plan_output.txt 2>/dev/null || echo "No plan output available")
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.set-env.outputs.environment }}-${{ github.sha }}
          path: ${{ steps.set-env.outputs.working_dir }}/tfplan
          retention-days: 30

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan-output.outputs.plan }}
        with:
          script: |
            const output = `### 🏗️ Terraform Plan Results - **${{ steps.set-env.outputs.environment }}** environment

            #### Terraform Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            **Environment**: ${{ steps.set-env.outputs.environment }}
            **Pusher**: @${{ github.actor }}
            **Action**: \`${{ github.event_name }}\`
            **Working Directory**: \`${{ steps.set-env.outputs.working_dir }}\`
            **PHASE 5**: Multi-environment support (isolated states)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: |
          echo "❌ Terraform plan failed"
          exit 1

  terraform-apply:
    name: Terraform Apply - ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: https://${{ github.event.inputs.environment == 'staging' && 'staging.' || github.event.inputs.environment == 'development' && 'development.' || '' }}ectropy.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Environment
        id: set-env
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "working_dir=infrastructure/terraform/environments/$ENV" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔧 Initializing Terraform for ${{ steps.set-env.outputs.environment }}..."
          terraform init -input=false

      - name: Resolve Environment Variables
        id: env-vars
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          if [ "$ENV" = "production" ]; then
            echo "app_version=${{ vars.PRODUCTION_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.PRODUCTION_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.PRODUCTION_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "development" ]; then
            echo "app_version=${{ vars.DEVELOPMENT_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.DEVELOPMENT_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.DEVELOPMENT_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          else
            echo "app_version=${{ vars.STAGING_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.STAGING_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.STAGING_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform Variables
        uses: ./.github/actions/setup-terraform-vars
        with:
          environment: ${{ steps.set-env.outputs.environment }}
          digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          ssh-private-key: ${{ secrets.TERRAFORM_DEPLOY_PRIVATE_KEY }}
          ssl-certificate-name: ${{ vars.SSL_CERTIFICATE_NAME }}
          ssl-cert-private-key: ${{ secrets.CF_ORIGIN_KEY }}
          ssl-cert-leaf: ${{ secrets.CF_ORIGIN_CERT }}
          app-version: ${{ steps.env-vars.outputs.app_version }}
          api-url: ${{ steps.env-vars.outputs.api_url }}
          frontend-url: ${{ steps.env-vars.outputs.frontend_url }}
          database-url: ${{ secrets.DATABASE_URL }}
          database-host: ${{ vars.DATABASE_HOST }}
          database-password: ${{ secrets.DB_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          jwt-refresh-secret: ${{ secrets.JWT_REFRESH_SECRET }}
          session-secret: ${{ secrets.SESSION_SECRET }}
          encryption-key: ${{ secrets.ENCRYPTION_KEY }}
          google-client-id: ${{ steps.set-env.outputs.environment == 'production' && secrets.GOOGLE_CLIENT_ID_PRODUCTION || secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ steps.set-env.outputs.environment == 'production' && secrets.GOOGLE_CLIENT_SECRET_PRODUCTION || secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          mcp-api-key: ${{ secrets.MCP_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          speckle-server-token: ${{ secrets.SPECKLE_SERVER_TOKEN }}
          speckle-admin-password: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          speckle-session-secret: ${{ secrets.SPECKLE_SESSION_SECRET }}
          minio-access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio-secret-key: ${{ secrets.MINIO_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
          watchtower-http-api-token: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
          spaces-access-key-id: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          spaces-secret-access-key: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          docr-config-json: ${{ secrets.DOCR_CONFIG_JSON }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          platform-database-url: ${{ secrets.PLATFORM_DATABASE_URL }}
          shared-database-url: ${{ secrets.SHARED_DATABASE_URL }}

      - name: Terraform Apply
        id: apply
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          set -o pipefail
          echo "Applying Terraform changes for ${{ steps.set-env.outputs.environment }}..."
          terraform apply -auto-approve -input=false | tee apply_output.txt

      - name: Upload Apply Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-log-${{ steps.set-env.outputs.environment }}-${{ github.sha }}
          path: ${{ steps.set-env.outputs.working_dir }}/apply_output.txt
          retention-days: 90

      - name: Get Terraform Outputs
        id: outputs
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "📊 Retrieving infrastructure outputs for ${{ steps.set-env.outputs.environment }}..."
          ENV="${{ steps.set-env.outputs.environment }}"

          # Environment-aware output names (staging vs production vs development)
          if [ "$ENV" = "staging" ]; then
            LB_IP=$(terraform output -raw staging_lb_ip 2>/dev/null || echo "")
            LB_ID=$(terraform output -raw staging_lb_id 2>/dev/null || echo "")
          elif [ "$ENV" = "production" ]; then
            LB_IP=$(terraform output -raw load_balancer_ip 2>/dev/null || echo "")
            LB_ID=$(terraform output -raw load_balancer_id 2>/dev/null || echo "")
          else
            LB_IP=""
            LB_ID=""
          fi

          echo "loadbalancer_ip=${LB_IP:-not-available}" >> $GITHUB_OUTPUT
          echo "loadbalancer_status=${LB_ID:-unknown}" >> $GITHUB_OUTPUT

      - name: Smoke Tests
        id: smoke-tests
        env:
          LOADBALANCER_IP: ${{ steps.outputs.outputs.loadbalancer_ip }}
        run: |
          echo "🧪 Running post-deployment smoke tests..."

          # Test 1: Load Balancer Health
          if [ "$LOADBALANCER_IP" != "not-available" ]; then
            echo "Testing Load Balancer at $LOADBALANCER_IP..."
            
            # Wait for LB to be ready (up to 2 minutes)
            for i in {1..24}; do
              if curl -f -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$LOADBALANCER_IP/health" 2>/dev/null | grep -q "200\|301\|302"; then
                echo "✅ Load Balancer is responding"
                break
              fi
              echo "⏳ Waiting for Load Balancer to be ready... ($i/24)"
              sleep 5
            done
          else
            echo "⚠️ Load Balancer IP not available, skipping health check"
          fi

          # Test 2: SSL Termination
          echo "Testing SSL termination..."
          if curl -f -s -o /dev/null -w "%{http_code}" --max-time 10 "https://ectropy.ai/" 2>/dev/null | grep -q "200\|301\|302"; then
            echo "✅ SSL termination is working"
          else
            echo "⚠️ SSL endpoint not yet available (DNS propagation may be in progress)"
          fi

          echo "✅ Smoke tests completed"

      - name: Apply Status Summary
        if: always()
        run: |
          echo "## 🏗️ Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ steps.apply.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Load Balancer IP**: ${{ steps.outputs.outputs.loadbalancer_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "**Load Balancer Status**: ${{ steps.outputs.outputs.loadbalancer_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Smoke Tests**: ${{ steps.smoke-tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment completed at $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

  terraform-destroy:
    name: Terraform Destroy - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://${{ github.event.inputs.environment == 'staging' && 'staging.' || github.event.inputs.environment == 'development' && 'development.' || '' }}ectropy.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Environment
        id: set-env
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "working_dir=infrastructure/terraform/environments/$ENV" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔧 Initializing Terraform for ${{ steps.set-env.outputs.environment }}..."
          terraform init -input=false

      - name: Wait for Cooling-off Period
        run: |
          echo "⏸️  Waiting 5 minutes before destroy operation for ${{ steps.set-env.outputs.environment }}..."
          echo "This cooling-off period allows for cancellation if needed."
          sleep 300

      - name: Resolve Environment Variables
        id: env-vars
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          if [ "$ENV" = "production" ]; then
            echo "app_version=${{ vars.PRODUCTION_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.PRODUCTION_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.PRODUCTION_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "development" ]; then
            echo "app_version=${{ vars.DEVELOPMENT_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.DEVELOPMENT_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.DEVELOPMENT_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          else
            echo "app_version=${{ vars.STAGING_APP_VERSION }}" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.STAGING_API_URL }}" >> $GITHUB_OUTPUT
            echo "frontend_url=${{ vars.STAGING_FRONTEND_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform Variables
        uses: ./.github/actions/setup-terraform-vars
        with:
          environment: ${{ steps.set-env.outputs.environment }}
          digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          ssh-private-key: ${{ secrets.TERRAFORM_DEPLOY_PRIVATE_KEY }}
          ssl-certificate-name: ${{ vars.SSL_CERTIFICATE_NAME }}
          ssl-cert-private-key: ${{ secrets.CF_ORIGIN_KEY }}
          ssl-cert-leaf: ${{ secrets.CF_ORIGIN_CERT }}
          app-version: ${{ steps.env-vars.outputs.app_version }}
          api-url: ${{ steps.env-vars.outputs.api_url }}
          frontend-url: ${{ steps.env-vars.outputs.frontend_url }}
          database-url: ${{ secrets.DATABASE_URL }}
          database-host: ${{ vars.DATABASE_HOST }}
          database-password: ${{ secrets.DB_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          jwt-refresh-secret: ${{ secrets.JWT_REFRESH_SECRET }}
          session-secret: ${{ secrets.SESSION_SECRET }}
          encryption-key: ${{ secrets.ENCRYPTION_KEY }}
          google-client-id: ${{ steps.set-env.outputs.environment == 'production' && secrets.GOOGLE_CLIENT_ID_PRODUCTION || secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ steps.set-env.outputs.environment == 'production' && secrets.GOOGLE_CLIENT_SECRET_PRODUCTION || secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          mcp-api-key: ${{ secrets.MCP_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          speckle-server-token: ${{ secrets.SPECKLE_SERVER_TOKEN }}
          speckle-admin-password: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          speckle-session-secret: ${{ secrets.SPECKLE_SESSION_SECRET }}
          minio-access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio-secret-key: ${{ secrets.MINIO_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
          watchtower-http-api-token: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
          spaces-access-key-id: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          spaces-secret-access-key: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          docr-config-json: ${{ secrets.DOCR_CONFIG_JSON }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          platform-database-url: ${{ secrets.PLATFORM_DATABASE_URL }}
          shared-database-url: ${{ secrets.SHARED_DATABASE_URL }}

      - name: Terraform Destroy
        id: destroy
        working-directory: ${{ steps.set-env.outputs.working_dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "Destroying infrastructure for ${{ steps.set-env.outputs.environment }}..."
          terraform destroy -auto-approve -input=false | tee destroy_output.txt

      - name: Upload Destroy Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-log-${{ steps.set-env.outputs.environment }}-${{ github.sha }}
          path: ${{ steps.set-env.outputs.working_dir }}/destroy_output.txt
          retention-days: 90

      - name: Destroy Status Summary
        if: always()
        run: |
          echo "## 💥 Terraform Destroy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ steps.destroy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure destroyed at $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **IMPORTANT**: State file still exists in DigitalOcean Spaces" >> $GITHUB_STEP_SUMMARY
