name: Bootstrap Production API Key
on: workflow_dispatch

# One-time bootstrap: creates tenant + user + API key in empty production DB
# Safe: only works when 0 users exist (refuses to run otherwise)
# Delete this workflow after use

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Add runner IP to firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          doctl compute firewall add-rules ${{ vars.FIREWALL_ID || 'c5a5e529-e7e9-42e5-b154-19da80b498b7' }} \
            --inbound-rules "protocol:tcp,ports:22,address:${RUNNER_IP}/32" || true
          sleep 5
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 143.198.48.156 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Bootstrap API key on blue server
        run: |
          ssh -o StrictHostKeyChecking=no root@143.198.48.156 'docker exec ectropy-api-gateway node -e "
          const { PrismaClient } = require(\"@prisma/client\");
          const bcrypt = require(\"bcrypt\");
          const crypto = require(\"crypto\");

          (async () => {
            const prisma = new PrismaClient();
            try {
              // Safety: refuse if users already exist
              const userCount = await prisma.user.count();
              if (userCount > 0) {
                console.log(\"ABORT: \" + userCount + \" users already exist. Bootstrap not needed.\");
                process.exit(0);
              }

              // 1. Create bootstrap tenant
              const tenant = await prisma.tenant.create({
                data: {
                  name: \"Bootstrap Tenant\",
                  plan: \"TRIAL\",
                  is_active: true,
                }
              });
              console.log(\"Tenant: \" + tenant.id);

              // 2. Create bootstrap admin user
              const passwordHash = await bcrypt.hash(\"bootstrap-temp-pwd\", 12);
              const user = await prisma.user.create({
                data: {
                  email: \"bootstrap-admin@ectropy.ai\",
                  password_hash: passwordHash,
                  name: \"Bootstrap Admin\",
                  role: \"admin\",
                  tenant_id: tenant.id,
                  is_platform_admin: true,
                  provider: \"local\",
                }
              });
              console.log(\"User: \" + user.id);

              // 3. Create API key with wildcard scope
              const rawKey = \"ectropy_api_bootstrap_\" + crypto.randomBytes(24).toString(\"hex\");
              const keyHash = await bcrypt.hash(rawKey, 12);
              await prisma.apiKey.create({
                data: {
                  name: \"bootstrap-key\",
                  key_hash: keyHash,
                  user_id: user.id,
                  scopes: [\"*\"],
                  is_active: true,
                }
              });

              console.log(\"API_KEY=\" + rawKey);
              console.log(\"Bootstrap complete.\");
            } catch(e) {
              console.error(\"ERROR: \" + e.message);
              process.exit(1);
            } finally {
              await prisma.\$disconnect();
            }
          })();
          "'

      - name: Remove runner IP from firewall
        if: always()
        run: |
          doctl compute firewall remove-rules ${{ vars.FIREWALL_ID || 'c5a5e529-e7e9-42e5-b154-19da80b498b7' }} \
            --inbound-rules "protocol:tcp,ports:22,address:${RUNNER_IP}/32" || true
