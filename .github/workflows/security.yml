name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'

# Enterprise Security: Explicit least-privilege permissions
# READ-ONLY: Security scanning requires no write access
permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Install pnpm
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: NPM Security Audit
        id: npm-audit
        continue-on-error: true
        run: |
          pnpm audit --prod --audit-level=moderate --json > audit-results.json || true

          CRITICAL=$(jq '[.vulnerabilities[] | select(.severity=="critical")] | length' audit-results.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.vulnerabilities[] | select(.severity=="high")] | length' audit-results.json 2>/dev/null || echo 0)
          MODERATE=$(jq '[.vulnerabilities[] | select(.severity=="moderate")] | length' audit-results.json 2>/dev/null || echo 0)

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT

          echo "🔴 Critical: $CRITICAL"
          echo "🟠 High: $HIGH"
          echo "🟡 Moderate: $MODERATE"

      - name: Check for Secrets
        run: |
          # Security Scan Philosophy:
          # - Catch actual secrets (e.g., password = "P@ssw0rd123")
          # - Allow legitimate code (SQL queries, param destructuring, config keys)
          # - Minimize false positives while maintaining security posture
          # - Pattern: Matches assignment of literal strings 8+ chars to "password" variable

          # Secret Detection - Hardcoded Credentials Only
          # Excludes: SQL columns, function params, config keys, schema definitions
          if grep -r -E "password\s*=\s*['\"][^'\"]{8,}['\"]" \
             --include="*.ts" \
             --include="*.tsx" \
             --exclude-dir="node_modules" \
             --exclude-dir="dist" \
             --exclude-dir="test" \
             --exclude="*.test.ts" \
             --exclude="*.spec.ts" \
             --exclude="*schema.prisma" \
             --exclude="*config*.ts" \
             --exclude="*database*.ts" \
             apps/ libs/ 2>/dev/null | \
             grep -v -E "password_hash|userData|apiConfig|SELECT|UPDATE|INSERT|FROM users|WHERE|destructuring" | \
             grep -E "=\s*['\"]"; then
            echo "⚠️ Potential hardcoded credentials detected"
            echo "Review matches above - they may be false positives"
            exit 1
          fi
          echo "✅ No secrets in source"

      - name: Generate Report
        if: always()
        run: |
          cat > security-report.md << EOF
          # Security Audit Report
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ## Vulnerabilities
          - Critical: ${{ steps.npm-audit.outputs.critical }}
          - High: ${{ steps.npm-audit.outputs.high }}
          - Moderate: ${{ steps.npm-audit.outputs.moderate }}

          ## Action Required
          $(if [ "${{ steps.npm-audit.outputs.critical }}" != "0" ]; then echo "⚠️ URGENT: Run pnpm audit fix"; else echo "✅ No critical issues"; fi)
          EOF
          cat security-report.md

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_number }}
          path: |
            audit-results.json
            security-report.md
          retention-days: 90

      - name: Fail on Critical
        if: steps.npm-audit.outputs.critical != '0'
        run: |
          echo "::error::Critical vulnerabilities detected"
          exit 1
