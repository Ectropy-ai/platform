name: Seed Production DB (one-shot)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall
        id: fw
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          doctl compute firewall add-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          sleep 5

      - name: Add SSH known hosts
        run: |
          sleep 5
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Checkout code for seed script
        uses: actions/checkout@v4

      - name: Copy seed script to production and run
        run: |
          # Copy seed file to production node
          scp scripts/database/seeds/seed-canadian-pilot-demo.ts \
            root@${{ vars.PROD_BLUE_IP }}:/tmp/seed-canadian-pilot-demo.ts

          ssh root@${{ vars.PROD_BLUE_IP }} bash -s <<'ENDSSH'
          set -euo pipefail

          GATEWAY=$(docker ps --filter name=api-gateway --format "{{.Names}}" | head -1)
          echo "Gateway container: $GATEWAY"

          # Copy seed into container
          docker cp /tmp/seed-canadian-pilot-demo.ts \
            "$GATEWAY":/app/scripts/database/seeds/seed-canadian-pilot-demo.ts

          echo "=== RUNNING SEED ==="
          docker exec "$GATEWAY" npx tsx \
            /app/scripts/database/seeds/seed-canadian-pilot-demo.ts \
            2>&1

          # Cleanup
          rm -f /tmp/seed-canadian-pilot-demo.ts
          ENDSSH

      - name: Remove runner IP from firewall
        if: always()
        run: |
          doctl compute firewall remove-rules ${{ vars.PROD_FIREWALL_ID }} \
            --inbound-rules "protocol:tcp,ports:22,address:${{ steps.fw.outputs.runner_ip }}/32"
