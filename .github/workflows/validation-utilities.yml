# ============================================================================
# Validation Utilities Workflow
# ============================================================================
#
# PURPOSE:
# Consolidated validation utilities for application and infrastructure configuration
# Replaces separate validate-runbooks.yml and validate-terraform-secrets.yml workflows
#
# CONSOLIDATION RATIONALE:
# - Reduces workflow sprawl by unifying validation operations under single interface
# - Provides clearer DevOps UX: validation-utilities covers all validation tasks
# - Maintains all original functionality with mode-based selection
# - Preserves automated scheduling and path-based triggering
#
# MODES:
# 1. runbook-validation: Validates operational runbook JSON files against schema
#    - Triggers: Push/PR to runbook paths
#    - Jobs: Runbook validation, schema validation, architecture alignment
#    - Output: Validation reports, architecture coverage metrics
#
# 2. terraform-secrets-validation: Validates Terraform configuration prerequisites
#    - Triggers: Weekly schedule (Mondays 9 AM UTC), push to terraform paths
#    - Jobs: Secrets/variables validation, health reporting
#    - Output: Configuration validation report, Slack notifications
#
# WORKFLOW MATRIX REFERENCE:
# apps/mcp-server/data/cicd-environment-workflow-matrix.json v1.8.0
#
# ENTERPRISE PATTERNS:
# - Mode-based selection for validation operations
# - Read-only permissions (least privilege)
# - Comprehensive validation reporting
# - Artifact generation for audit trails
# ============================================================================

name: Validation Utilities

on:
  # Runbook validation triggers (path-based)
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'apps/mcp-server/data/runbooks/**/*.json'
      - 'scripts/runbooks/schema/runbook-schema.json'
      - 'scripts/runbooks/validate-runbook.ts'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/mcp-server/data/runbooks/**/*.json'
      - 'scripts/runbooks/schema/runbook-schema.json'
      - 'scripts/runbooks/validate-runbook.ts'

  # Terraform secrets validation - weekly schedule
  schedule:
    # Run weekly on Mondays at 9 AM UTC to ensure secrets are current
    - cron: '0 9 * * 1'

  # Manual trigger with mode selection
  workflow_dispatch:
    inputs:
      validation_mode:
        description: 'Validation operation to perform'
        required: true
        type: choice
        default: 'runbook-validation'
        options:
          - runbook-validation
          - terraform-secrets-validation

# Determine validation mode from trigger context
env:
  VALIDATION_MODE: ${{ github.event.inputs.validation_mode || (github.event.schedule == '0 9 * * 1' && 'terraform-secrets-validation' || 'runbook-validation') }}

# Enterprise Security: Explicit least-privilege permissions
# READ-ONLY: Validation requires no write access
permissions:
  contents: read

jobs:
  # ============================================================================
  # MODE 1: Runbook Validation
  # ============================================================================
  # Validates operational runbook JSON files against schema
  # Ensures runbook data quality and architecture alignment
  # ============================================================================

  validate-runbooks:
    name: Validate Runbook JSON Files
    runs-on: ubuntu-latest
    # ENTERPRISE FIX (2025-12-16): Cannot use env context at job level
    # Run runbook validation unless explicitly set to terraform-secrets-validation
    if: ${{ github.event.inputs.validation_mode != 'terraform-secrets-validation' && github.event.schedule != '0 9 * * 1' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate all runbooks
        run: pnpm tsx scripts/runbooks/validate-runbook.ts --all

      - name: Report validation results
        if: success()
        run: |
          echo "✅ All runbooks passed validation!"
          echo "📊 Validation Summary:"
          echo "- Schema compliance: 100%"
          echo "- Business rules: Enforced"
          echo "- Architecture alignment: Verified"
          echo "- MCP integration: Validated"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: runbook-validation-report
          path: |
            apps/mcp-server/data/runbooks/**/*.json
          retention-days: 30

  validate-runbook-schema:
    name: Validate JSON Schema
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.validation_mode != 'terraform-secrets-validation' && github.event.schedule != '0 9 * * 1' }}
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON Schema syntax
        run: |
          if ! jq empty scripts/runbooks/schema/runbook-schema.json; then
            echo "❌ JSON Schema is invalid"
            exit 1
          fi
          echo "✅ JSON Schema is valid"

      - name: Check schema version
        run: |
          SCHEMA_TITLE=$(jq -r '.title' scripts/runbooks/schema/runbook-schema.json)
          echo "📋 Schema: $SCHEMA_TITLE"

  verify-architecture-alignment:
    name: Verify Architecture Alignment
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.validation_mode != 'terraform-secrets-validation' && github.event.schedule != '0 9 * * 1' }}
    needs: validate-runbooks
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify routing architecture references
        run: |
          echo "🔍 Verifying architecture alignment..."

          # Check if routing-architecture.json exists
          if [ ! -f "apps/mcp-server/data/routing-architecture.json" ]; then
            echo "⚠️  Warning: routing-architecture.json not found"
            exit 0
          fi

          # Count runbooks with architecture alignment
          RUNBOOKS_WITH_ALIGNMENT=$(find apps/mcp-server/data/runbooks -name "*.json" -exec jq -r 'select(.mcpIntegration.architectureAlignment != null) | .metadata.catalogId' {} \; | wc -l)
          TOTAL_RUNBOOKS=$(find apps/mcp-server/data/runbooks -name "*.json" | wc -l)

          echo "📊 Architecture Alignment Coverage:"
          echo "- Runbooks with alignment: $RUNBOOKS_WITH_ALIGNMENT"
          echo "- Total runbooks: $TOTAL_RUNBOOKS"

          if [ $RUNBOOKS_WITH_ALIGNMENT -lt $TOTAL_RUNBOOKS ]; then
            echo "⚠️  Warning: Not all runbooks have architecture alignment defined"
          else
            echo "✅ All runbooks have architecture alignment"
          fi

  runbook-validation-summary:
    name: Runbook Validation Summary
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.validation_mode != 'terraform-secrets-validation' && github.event.schedule != '0 9 * * 1' }}
    needs:
      [
        validate-runbooks,
        validate-runbook-schema,
        verify-architecture-alignment,
      ]
    timeout-minutes: 5

    steps:
      - name: Check validation status
        run: |
          if [ "${{ needs.validate-runbooks.result }}" == "success" ] && \
             [ "${{ needs.validate-runbook-schema.result }}" == "success" ]; then
            echo "✅ All validation checks passed!"
            echo "🎉 Runbooks are production-ready"
          else
            echo "❌ Some validation checks failed"
            exit 1
          fi

      - name: Create summary report
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          # Runbook Validation Summary

          ## Validation Results

          - **Runbook Validation**: ${{ needs.validate-runbooks.result }}
          - **Schema Validation**: ${{ needs.validate-runbook-schema.result }}
          - **Architecture Alignment**: ${{ needs.verify-architecture-alignment.result }}

          ## Status

          Validation completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ---

          *🤖 Automated by validation-utilities.yml (runbook-validation mode)*
          SUMMARY

  # ============================================================================
  # MODE 2: Terraform Secrets Validation
  # ============================================================================
  # Validates Terraform configuration prerequisites (secrets/variables)
  # Ensures infrastructure deployment readiness
  # ============================================================================

  validate-terraform-secrets:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.validation_mode == 'terraform-secrets-validation' || github.event.schedule == '0 9 * * 1' }}
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate all required Terraform secrets and variables
        env:
          # Secrets (passed to validation script)
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}

          # Variables (passed to validation script)
          TF_VAR_SSH_KEY_FINGERPRINT: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_ADMIN_IP: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_SSL_CERTIFICATE_NAME: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME }}
          TF_VAR_ALERT_EMAIL: ${{ vars.TF_VAR_ALERT_EMAIL }}
        run: |
          echo "🔍 Running enterprise Terraform secrets validation..."
          bash scripts/validation/validate-terraform-secrets.sh

      - name: Generate validation report
        if: always()
        run: |
          echo "## Terraform Secrets Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validation Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode**: terraform-secrets-validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $? -eq 0 ]; then
            echo "✅ **Status**: All Terraform secrets and variables validated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Validated Components" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ DigitalOcean Access Token" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Spaces Access Credentials" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ SSH Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Network Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ SSL Certificate Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Monitoring Configuration" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status**: Validation failed - missing secrets or variables" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See job logs for details on missing configuration." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*🤖 Automated by validation-utilities.yml (terraform-secrets-validation mode)*" >> $GITHUB_STEP_SUMMARY

      - name: Notify on validation failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          workflow-name: ${{ github.workflow }}
          custom-message: '🔐 *Terraform secrets validation failed* - Missing or invalid configuration. Check GitHub secrets and variables.'
