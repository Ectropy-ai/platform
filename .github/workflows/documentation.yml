name: Documentation

# ENTERPRISE DOCUMENTATION PATTERN (2025-12-15):
# Repo-first source of truth → External publication (GitHub Pages, etc.)
#
# This workflow PUBLISHES documentation (repo → external systems)
# Complementary workflow: documentation-review.yml (validates repo quality)
#
# Separation Rationale:
#   - documentation.yml: PUBLISH workflow (main branch only, builds + deploys)
#   - documentation-review.yml: AUDIT workflow (weekly, policy enforcement)
#   - Different triggers, different purposes, intentionally separate
#
# Data Flow:
#   1. Validate (documentation-review.yml) → 2. Publish (this workflow)
#   Repository docs/ → GitHub Pages (public)
#
# Enterprise Pattern: Repo-First Documentation
#   - Single source of truth: Repository docs/ folder
#   - Version controlled: Git history tracks all changes
#   - PR-based review: All docs go through approval process
#   - Automated publishing: Main branch auto-deploys to GitHub Pages
#   - Audit trail: Weekly compliance checks (documentation-review.yml)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**.md'
      - 'apps/**/README.md'
      - 'packages/**/README.md'
  pull_request:
    paths:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check markdown formatting
        run: |
          echo "📝 Checking markdown formatting..."

          # Check for common markdown issues
          find . -name "*.md" -not -path "*/node_modules/*" -not -path "*/dist/*" | while read file; do
            echo "Checking $file"
            
            # Check for broken links (relative)
            if grep -E '\]\([^)]*\)' "$file" | grep -v "http" | grep -v "mailto:" > /dev/null; then
              echo "✅ $file has relative links"
            fi
          done

          echo "✅ Markdown validation complete"

      - name: Validate documentation structure
        run: |
          echo "🔍 Validating documentation structure..."

          # Check required documentation files exist
          required_files=(
            "README.md"
            "docs/ARCHITECTURE.md"
            "docs/DEVELOPMENT.md"
            "docs/CURRENT_TRUTH.md"  # Canonical location per 13-File Documentation Policy
          )

          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done

          echo "✅ Documentation structure validated"

      - name: Check for outdated documentation
        run: |
          echo "📅 Checking for outdated documentation..."

          # Find markdown files with "Last Updated" dates
          find . -name "*.md" -not -path "*/node_modules/*" | while read file; do
            if grep -q "Last Updated" "$file"; then
              LAST_UPDATED=$(grep "Last Updated" "$file" | head -1)
              echo "$file: $LAST_UPDATED"
            fi
          done

      - name: Generate documentation summary
        if: always()
        run: |
          echo "## 📚 Documentation Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count documentation files
          MD_COUNT=$(find . -name "*.md" -not -path "*/node_modules/*" -not -path "*/dist/*" | wc -l)
          echo "**Total markdown files:** $MD_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List main documentation
          echo "### Main Documentation" >> $GITHUB_STEP_SUMMARY
          echo "- [x] README.md" >> $GITHUB_STEP_SUMMARY
          echo "- [x] docs/CURRENT_TRUTH.md" >> $GITHUB_STEP_SUMMARY
          echo "- [x] docs/ARCHITECTURE.md" >> $GITHUB_STEP_SUMMARY
          echo "- [x] docs/DEVELOPMENT.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All validation checks passed" >> $GITHUB_STEP_SUMMARY

  generate-api-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and Install pnpm
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate TypeDoc documentation
        run: |
          echo "📖 Generating API documentation..."

          # Generate TypeDoc for main packages
          pnpm exec typedoc \
            --entryPointStrategy packages \
            --out docs/api \
            --exclude "**/*.test.ts" \
            --exclude "**/*.spec.ts" \
            apps/api-gateway/src \
            apps/mcp-server/src \
            apps/web-dashboard/src || echo "TypeDoc generation skipped (not configured)"

          echo "✅ API documentation generated"

      - name: Generate architecture diagrams
        run: |
          echo "🏗️  Generating architecture diagrams..."

          # Generate NX dependency graph
          pnpm nx graph --file=docs/nx-graph.html || echo "NX graph generation skipped"

          echo "✅ Architecture diagrams generated"

      - name: Commit generated documentation
        run: |
          git config --global user.name "Ectropy Bot"
          git config --global user.email "bot@ectropy.ai"

          git add docs/

          if git diff --staged --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "docs: update generated documentation [skip ci]"
            git push
            echo "✅ Documentation committed"
          fi

  publish-docs:
    name: Publish Documentation
    needs: [validate-docs, generate-api-docs]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Build documentation site
        run: |
          echo "🏗️  Building documentation site..."
          mkdir -p public

          # Copy documentation to public directory
          cp -r docs/* public/
          cp README.md public/index.md

          # Create a simple index.html
          cat > public/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Ectropy Documentation</title>
            <style>
              body { font-family: system-ui; max-width: 1200px; margin: 0 auto; padding: 2rem; }
              h1 { color: #333; }
              .docs-list { list-style: none; padding: 0; }
              .docs-list li { padding: 0.5rem 0; }
              .docs-list a { color: #0066cc; text-decoration: none; }
              .docs-list a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Ectropy Documentation</h1>
            <h2>Architecture & Development</h2>
            <ul class="docs-list">
              <li><a href="ARCHITECTURE.md">Architecture Overview</a></li>
              <li><a href="DEVELOPMENT.md">Development Guide</a></li>
              <li><a href="WORKFLOW_INVENTORY.md">Workflow Inventory</a></li>
            </ul>
            <h2>API Documentation</h2>
            <ul class="docs-list">
              <li><a href="api/">API Documentation</a> (if available)</li>
            </ul>
          </body>
          </html>
          HEREDOC

          echo "✅ Documentation site built"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate deployment summary
        run: |
          echo "## 📚 Documentation Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
