name: Deploy Production Infrastructure
# DEC-032 Day 2 v2 Stream 4A + Stream 5 reset
# Replaces: archive/deploy-production-ssh.yml (DEP-032-E01)
# Dispatch: manual workflow_dispatch with typed PRODUCTION confirm
# Pattern: confirm → canary-pre → plan (production env) →
#   manual-approval (production-approval env, reviewer gate) →
#   apply (production env) → health → canary-post
# Two-gate approval: secrets scoped to production, apply gated by reviewer

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PRODUCTION to confirm infrastructure deployment'
        required: true
        type: string

concurrency:
  group: production-infra
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VERSION: "1.14.0"
  TF_WORKING_DIR: "./infrastructure/terraform/environments/production"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Gate: typed confirmation
  # ──────────────────────────────────────────────────────────────────
  confirm-check:
    name: Verify Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Assert PRODUCTION confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "PRODUCTION" ]; then
            echo "ERROR: must type PRODUCTION to confirm"
            exit 1
          fi
          echo "Confirmation received."

  # ──────────────────────────────────────────────────────────────────
  # Gate: n8n canary (pre-deploy)
  # ──────────────────────────────────────────────────────────────────
  canary-pre:
    name: Canary Pre-Deploy
    needs: confirm-check
    runs-on: ubuntu-latest
    steps:
      - name: n8n canary
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST https://n8n.luh.tech/webhook/lead-capture)
          if [ "$code" != "200" ]; then
            echo "ERROR: n8n canary returned $code (expected 200)"
            exit 1
          fi
          echo "n8n canary: 200"

  # ──────────────────────────────────────────────────────────────────
  # Terraform Plan (production env — all secrets available)
  # ──────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    needs: canary-pre
    runs-on: ubuntu-latest
    environment: production

    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terraform Variables
        uses: ./.github/actions/setup-terraform-vars
        with:
          environment: production
          digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}
          ssl-certificate-name: ectropy-production-cert
          app-version: ${{ github.sha }}
          api-url: ${{ vars.API_URL }}
          frontend-url: ${{ vars.FRONTEND_URL }}
          database-url: ${{ secrets.DATABASE_URL }}
          database-host: ${{ vars.DATABASE_HOST }}
          database-host-private: ${{ secrets.DATABASE_HOST_PRIVATE }}
          database-password: ${{ secrets.DB_PASSWORD }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          jwt-refresh-secret: ${{ secrets.JWT_REFRESH_SECRET }}
          session-secret: ${{ secrets.SESSION_SECRET }}
          encryption-key: ${{ secrets.ENCRYPTION_KEY }}
          google-client-id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          redis-password: ${{ secrets.REDIS_PASSWORD }}
          mcp-api-key: ${{ secrets.MCP_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          speckle-server-token: ${{ secrets.SPECKLE_SERVER_TOKEN }}
          speckle-admin-password: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          speckle-session-secret: ${{ secrets.SPECKLE_SESSION_SECRET }}
          minio-access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          minio-secret-key: ${{ secrets.MINIO_SECRET_KEY }}
          resend-api-key: ${{ secrets.RESEND_API_KEY }}
          spaces-access-key-id: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          spaces-secret-access-key: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          docr-config-json: ${{ secrets.DOCR_CONFIG_JSON }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          platform-database-url: ${{ secrets.PLATFORM_DATABASE_URL }}
          shared-database-url: ${{ secrets.SHARED_DATABASE_URL }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          viewer-token-secret: ${{ secrets.VIEWER_TOKEN_SECRET }}
          crm-api-key: ${{ secrets.CRM_API_KEY }}
          crm-webhook-secret: ${{ secrets.CRM_WEBHOOK_SECRET }}
          db-admin-password: ${{ secrets.DB_ADMIN_PASSWORD }}
          qdrant-api-key: ${{ secrets.QDRANT_API_KEY }}
          speckle-admin-email: ${{ vars.SPECKLE_ADMIN_EMAIL || 'speckle-admin@ectropy.ai' }}
          speckle-server-url: ${{ vars.SPECKLE_SERVER_URL || 'http://ectropy-speckle-server:3000' }}
          minio-public-url: ${{ vars.MINIO_PUBLIC_URL || 'https://ectropy.ai/minio' }}
          resend-from-email: ${{ vars.RESEND_FROM_EMAIL || 'noreply@ectropy.ai' }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          terraform init -backend=true -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -detailed-exitcode \
            -out=tfplan \
            -no-color \
            2>&1 | tee plan_output.txt

          EXITCODE=${PIPESTATUS[0]}

          # Detect replacements that return exitcode 0
          if grep -q 'must be replaced' plan_output.txt || \
             grep -Eq 'Plan: [1-9][0-9]* to add|[1-9][0-9]* to change|[1-9][0-9]* to destroy' plan_output.txt; then
            if [ $EXITCODE -eq 0 ]; then
              echo "Replacement or changes detected, overriding exitcode 0 to 2"
              EXITCODE=2
            fi
          fi

          echo "exitcode=$EXITCODE" >> $GITHUB_OUTPUT

          if [ $EXITCODE -eq 0 ]; then
            echo "No changes detected — infrastructure is up to date"
          elif [ $EXITCODE -eq 2 ]; then
            echo "Changes detected — infrastructure will be updated"
          else
            echo "ERROR: terraform plan failed with exit code $EXITCODE"
            exit $EXITCODE
          fi

      - name: Post plan to step summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo '## Terraform Plan Output' >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          head -500 plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────
  # Gate: manual approval after plan review (production-approval env)
  # ──────────────────────────────────────────────────────────────────
  manual-approval:
    name: Review Plan & Approve Apply
    needs: terraform-plan
    if: needs.terraform-plan.outputs.plan_exitcode == '2'
    runs-on: ubuntu-latest
    environment: production-approval
    steps:
      - name: Approval received
        run: |
          echo "Plan approval received."
          echo "Proceeding to apply with reviewed plan."

  # ──────────────────────────────────────────────────────────────────
  # Terraform Apply (production env)
  # ──────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    needs: manual-approval
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ectropy.ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: terraform init -backend=true -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          terraform apply -input=false tfplan

      - name: Post apply summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo '## Terraform Apply Complete' >> $GITHUB_STEP_SUMMARY
          terraform output -json > /tmp/outputs.json 2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────
  # Health Validation (post-apply)
  # ──────────────────────────────────────────────────────────────────
  health-validation:
    name: Health Validation
    needs: terraform-apply
    runs-on: ubuntu-latest
    steps:
      - name: Wait for convergence
        run: |
          echo "Waiting 90s for config-sync convergence..."
          sleep 90

      - name: Check LB health
        run: |
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              https://ectropy.ai/lb-health)
            if [ "$code" = "200" ]; then
              echo "LB health: 200 (attempt $attempt)"
              exit 0
            fi
            echo "LB health: $code (attempt $attempt) — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: LB health did not return 200 after 3 attempts"
          exit 1

      - name: Check API health
        run: |
          response=$(curl -s https://ectropy.ai/api/health)
          echo "$response"
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if d.get('status') != 'healthy':
              print(f'ERROR: status = {d.get(\"status\")}')
              sys.exit(1)
          if not d.get('buildSha'):
              print('ERROR: buildSha missing')
              sys.exit(1)
          print(f'API health: {d[\"status\"]}, buildSha: {d[\"buildSha\"]}')
          "

  # ──────────────────────────────────────────────────────────────────
  # Gate: n8n canary (post-deploy)
  # ──────────────────────────────────────────────────────────────────
  canary-post:
    name: Canary Post-Deploy
    needs: health-validation
    runs-on: ubuntu-latest
    steps:
      - name: n8n canary
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST https://n8n.luh.tech/webhook/lead-capture)
          if [ "$code" != "200" ]; then
            echo "ERROR: n8n canary post returned $code"
            exit 1
          fi
          echo "n8n canary: 200"

      - name: Workflow complete
        run: |
          echo '## Deploy Production Infrastructure — SUCCESS' >> $GITHUB_STEP_SUMMARY
          echo 'Canary-pre: 200' >> $GITHUB_STEP_SUMMARY
          echo 'TF plan: approved and applied' >> $GITHUB_STEP_SUMMARY
          echo 'Health checks: passed' >> $GITHUB_STEP_SUMMARY
          echo 'Canary-post: 200' >> $GITHUB_STEP_SUMMARY
