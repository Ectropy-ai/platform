name: "DB Admin — One-Off (DELETE AFTER USE)"

on:
  workflow_dispatch:

jobs:
  upsert-project-role:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          echo "Adding $RUNNER_IP/32 to firewall $FIREWALL_ID"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Upsert ectropytest project_roles (email-based lookup)
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.PROD_BLUE_IP }} '
            CONTAINER=$(docker ps --filter name=api-gateway --format "{{.ID}}" | head -1)
            echo "Container: $CONTAINER"
            docker exec $CONTAINER node -e "
              const { PrismaClient } = require(\"@prisma/client\");
              const p = new PrismaClient();
              async function main() {
                // Step 1: Find user by email (ID differs between staging and production)
                const user = await p.user.findFirst({
                  where: { email: \"ectropytest@gmail.com\" }
                });
                if (!user) {
                  console.log(\"ERROR: ectropytest@gmail.com not found in production users table\");
                  process.exit(1);
                }
                console.log(\"USER_FOUND: id=\" + user.id + \" email=\" + user.email);

                // Step 2: Find canonical demo project
                const project = await p.project.findFirst({
                  where: { id: \"dc1eaa5b-7553-46ec-92a5-e20762a60c71\" }
                });
                if (!project) {
                  console.log(\"ERROR: project dc1eaa5b not found in production\");
                  process.exit(1);
                }
                console.log(\"PROJECT_FOUND: id=\" + project.id + \" name=\" + project.name);

                // Step 3: Check if role already exists
                const existing = await p.projectRole.findFirst({
                  where: {
                    user_id: user.id,
                    project_id: project.id,
                    role: \"contractor\"
                  }
                });
                if (existing) {
                  console.log(\"ALREADY_EXISTS:\", JSON.stringify({id: existing.id, role: existing.role}));
                  return;
                }

                // Step 4: Create the project_roles row
                const result = await p.projectRole.create({
                  data: {
                    user_id: user.id,
                    project_id: project.id,
                    role: \"contractor\",
                    permissions: [],
                    is_active: true,
                    voting_power: 0
                  }
                });
                console.log(\"UPSERT_RESULT:\", JSON.stringify({id: result.id, user_id: result.user_id, project_id: result.project_id, role: result.role}));
              }
              main()
                .catch(e => { console.error(\"ERROR:\", e.message); process.exit(1); })
                .finally(() => p.\$disconnect());
            "
          '

      - name: Remove runner IP from firewall
        if: always()
        run: |
          RUNNER_IP="${{ steps.firewall.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          if [ -n "$RUNNER_IP" ] && [ -n "$FIREWALL_ID" ]; then
            doctl compute firewall remove-rules $FIREWALL_ID \
              --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
            echo "Firewall rule removed"
          fi
