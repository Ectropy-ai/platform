name: "DB Admin — One-Off (DELETE AFTER USE)"

on:
  workflow_dispatch:

jobs:
  upsert-project-role:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upsert ectropytest project_roles via SSH
        run: |
          ssh -i ~/.ssh/prod_key -o StrictHostKeyChecking=no root@${{ secrets.DO_HOST }} '
            CONTAINER=$(docker ps --filter name=api-gateway --format "{{.ID}}" | head -1)
            if [ -z "$CONTAINER" ]; then
              echo "ERROR: api-gateway container not found"
              exit 1
            fi
            echo "Using container: $CONTAINER"

            docker exec $CONTAINER node -e "
              const { PrismaClient } = require(\"@prisma/client\");
              const p = new PrismaClient();

              async function main() {
                const existing = await p.projectRole.findFirst({
                  where: {
                    user_id: \"d574b84f-dba8-446d-af17-647ec53a8a74\",
                    project_id: \"dc1eaa5b-7553-46ec-92a5-e20762a60c71\",
                    role: \"contractor\"
                  }
                });

                if (existing) {
                  console.log(\"ALREADY_EXISTS:\", JSON.stringify(existing));
                  return;
                }

                const result = await p.projectRole.create({
                  data: {
                    user_id: \"d574b84f-dba8-446d-af17-647ec53a8a74\",
                    project_id: \"dc1eaa5b-7553-46ec-92a5-e20762a60c71\",
                    role: \"contractor\",
                    permissions: [],
                    is_active: true,
                    voting_power: 0
                  }
                });

                console.log(\"UPSERT_RESULT:\", JSON.stringify(result));
              }

              main()
                .catch(e => { console.error(\"ERROR:\", e.message); process.exit(1); })
                .finally(() => p.\$disconnect());
            "
          '

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/prod_key
