name: Test Speckle Objects API — READ ONLY

on:
  workflow_dispatch:

jobs:
  test-objects:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 2a — Test Speckle Objects API directly (no auth)
        run: |
          echo "=== Direct Speckle server (port 3100) — no auth ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          set -euo pipefail

          echo "--- Root object (no auth) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            http://localhost:3100/objects/9a5215cc88/f9da96d1ddea381bb032bff0f12e7322 \
            2>&1 | tail -5

          echo ""
          echo "--- Root object (with token) ---"
          TOKEN=$(cat /var/lib/docker/volumes/ectropy_speckle-tokens/_data/speckle-service-token)
          curl -s -w "\nHTTP:%{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:3100/objects/9a5215cc88/f9da96d1ddea381bb032bff0f12e7322 \
            2>&1 | head -3
          echo "..."
          curl -s -o /dev/null -w "HTTP:%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:3100/objects/9a5215cc88/f9da96d1ddea381bb032bff0f12e7322

          echo ""
          echo ""
          echo "--- Child object 2734f853 (with token) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:3100/objects/9a5215cc88/2734f8533e683356c72e10d47ab9dcc6 \
            2>&1 | tail -5
          REMOTE

      - name: Task 2b — Test BFF proxy endpoint (api-gateway, port 4000)
        run: |
          echo "=== BFF proxy via api-gateway (port 4000) ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          set -euo pipefail

          echo "--- /api/speckle/objects (no session — expect 401) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            http://localhost:4000/api/speckle/objects/9a5215cc88/f9da96d1ddea381bb032bff0f12e7322 \
            2>&1 | tail -5

          echo ""
          echo "--- /api/speckle/config (no session — expect 401) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            http://localhost:4000/api/speckle/config \
            2>&1 | tail -5

          echo ""
          echo "--- /api/speckle/health (public — expect 200) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            http://localhost:4000/api/speckle/health \
            2>&1 | tail -10
          REMOTE

      - name: Task 2c — Check SPECKLE_SERVER_URL in api-gateway
        run: |
          echo "=== SPECKLE_SERVER_URL in api-gateway container ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          API_CONTAINER=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          echo "Container: $API_CONTAINER"

          echo "--- SPECKLE_SERVER_URL ---"
          docker exec "$API_CONTAINER" printenv SPECKLE_SERVER_URL 2>/dev/null || echo "NOT SET"

          echo "--- SPECKLE_SERVER_TOKEN (first 8 chars) ---"
          VAL=$(docker exec "$API_CONTAINER" printenv SPECKLE_SERVER_TOKEN 2>/dev/null || echo "NOT SET")
          if [ "$VAL" != "NOT SET" ]; then
            echo "${VAL:0:8}... (length: ${#VAL})"
          else
            echo "NOT SET"
          fi

          echo "--- Token file in shared-tokens volume ---"
          docker exec "$API_CONTAINER" cat /shared-tokens/speckle-service-token 2>/dev/null | head -c 8 || echo "FILE NOT FOUND"
          echo ""
          REMOTE

      - name: Task 2d — Speckle server container status + health
        run: |
          echo "=== Speckle server status ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'speckle-server|api-gateway|minio'

          echo ""
          echo "--- Speckle server health (port 3100) ---"
          curl -s -w "\nHTTP:%{http_code}\n" http://localhost:3100/api 2>&1 | tail -3

          echo ""
          echo "--- Speckle GraphQL serverInfo ---"
          curl -s http://localhost:3100/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{serverInfo{version}}"}' 2>&1 | head -3
          REMOTE

      - name: Task 3 — Test Speckle getobject API format
        run: |
          echo "=== Task 3: Speckle /api/getobject format ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          TOKEN=$(cat /var/lib/docker/volumes/ectropy_speckle-tokens/_data/speckle-service-token)

          echo "--- /api/getobject (port 3100, with token) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            "http://localhost:3100/api/getobject?streamId=9a5215cc88&objectId=f9da96d1ddea381bb032bff0f12e7322" \
            2>&1 | tail -5

          echo ""
          echo "--- /objects/{stream}/{object} (port 3100, with token) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            "http://localhost:3100/objects/9a5215cc88/f9da96d1ddea381bb032bff0f12e7322" \
            2>&1 | tail -5

          echo ""
          echo "--- /api/stream/9a5215cc88/objects (port 3100, with token) ---"
          curl -s -w "\nHTTP:%{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            "http://localhost:3100/api/stream/9a5215cc88/objects/f9da96d1ddea381bb032bff0f12e7322" \
            2>&1 | tail -5

          echo ""
          echo "--- Speckle frontend port 3101 /api/getobject ---"
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" \
            "http://localhost:3101/api/getobject?stream=9a5215cc88&object=2734f8533e683356c72e10d47ab9dcc6"

          echo ""
          echo "--- Speckle frontend port 3101 /objects ---"
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" \
            "http://localhost:3101/objects/9a5215cc88/f9da96d1ddea381bb032bff0f12e7322"
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
