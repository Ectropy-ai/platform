name: Speckle Server Crashloop Diagnosis — READ ONLY

on:
  workflow_dispatch:

jobs:
  speckle-crash:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 1 — Crash logs
        run: |
          echo "=== TASK 1: speckle-server crash logs (last 80 lines) ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker logs ectropy-speckle-server --tail 80 2>&1
          REMOTE

      - name: Task 2 — Speckle-server env vars
        run: |
          echo "=== TASK 2: speckle-server env vars ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker inspect ectropy-speckle-server \
            --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -iE 'REDIS|POSTGRES|DATABASE|SECRET|ORIGIN|CANONICAL|PORT|HOST|SSL' \
            | sed 's/=.*/=REDACTED/'
          REMOTE

      - name: Task 3 — Redis and Postgres reachability
        run: |
          echo "=== TASK 3: Network reachability from speckle network ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          echo "--- Redis check (ectropy-redis:6379) ---"
          docker exec ectropy-speckle-frontend sh -c 'nc -zv ectropy-redis 6379 2>&1' || echo "nc not available, trying wget..."
          docker exec ectropy-speckle-frontend sh -c 'wget -q --spider --timeout=3 http://ectropy-redis:6379 2>&1 || echo "wget test done"'

          echo ""
          echo "--- Postgres check ---"
          echo "Note: Speckle uses managed DO PostgreSQL, not a local container"
          docker inspect ectropy-speckle-server \
            --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -i 'POSTGRES_URL\|DATABASE_URL' \
            | sed 's|://[^@]*@|://REDACTED@|'
          REMOTE

      - name: Task 3b — Check docker network connectivity
        run: |
          echo "=== TASK 3b: Docker networks for speckle-server ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker inspect ectropy-speckle-server --format '{{json .NetworkSettings.Networks}}' | python3 -m json.tool 2>/dev/null || docker inspect ectropy-speckle-server --format '{{json .NetworkSettings.Networks}}'
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
