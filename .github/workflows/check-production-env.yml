name: OAuth Debug — READ ONLY

on:
  workflow_dispatch:

jobs:
  debug-oauth:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 2 — Client secret first 8 chars in container
        run: |
          echo "=== GOOGLE_CLIENT_SECRET in api-gateway container ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          API=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          echo "Container: $API"

          echo "--- GOOGLE_CLIENT_SECRET (first 8 + last 6) ---"
          VAL=$(docker exec "$API" printenv GOOGLE_CLIENT_SECRET 2>/dev/null || echo "NOT SET")
          if [ "$VAL" != "NOT SET" ]; then
            echo "First 8: ${VAL:0:8}"
            echo "Last 6: ${VAL: -6}"
            echo "Length: ${#VAL}"
          else
            echo "NOT SET"
          fi

          echo ""
          echo "--- GOOGLE_CLIENT_ID (full) ---"
          docker exec "$API" printenv GOOGLE_CLIENT_ID 2>/dev/null || echo "NOT SET"

          echo ""
          echo "--- Recent OAuth logs (last 20 lines with PASSPORT or OAUTH) ---"
          docker logs "$API" 2>&1 | grep -iE 'PASSPORT|OAUTH|oauth_error|server_error|Unauthorized|pending|Not registered' | tail -20
          REMOTE

      - name: Task 3 — ectropytest user in DB
        run: |
          echo "=== ectropytest user record ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          API=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          docker exec "$API" node -e "
            const { PrismaClient } = require('@prisma/client');
            const prisma = new PrismaClient();
            async function main() {
              const user = await prisma.\$queryRawUnsafe(
                \"SELECT id, email, is_authorized, is_platform_admin, tenant_id, role, roles, provider, last_login, created_at FROM users WHERE email = 'ectropytest@gmail.com'\"
              );
              console.log(JSON.stringify(user, null, 2));

              const user2 = await prisma.\$queryRawUnsafe(
                \"SELECT id, email, is_authorized, is_platform_admin, tenant_id, role, roles, provider, last_login, created_at FROM users WHERE email = 'erik@luh.tech'\"
              );
              console.log('--- erik@luh.tech ---');
              console.log(JSON.stringify(user2, null, 2));
            }
            main().catch(console.error).finally(() => prisma.\$disconnect());
          "
          REMOTE

      - name: Task 3b — AUTHORIZED_USERS env var
        run: |
          echo "=== AUTHORIZED_USERS in container ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          API=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          docker exec "$API" printenv AUTHORIZED_USERS 2>/dev/null || echo "NOT SET"

          echo ""
          echo "--- ADMIN_DOMAIN ---"
          docker exec "$API" printenv ADMIN_DOMAIN 2>/dev/null || echo "NOT SET"

          echo ""
          echo "--- FRONTEND_URL ---"
          docker exec "$API" printenv FRONTEND_URL 2>/dev/null || echo "NOT SET"
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
