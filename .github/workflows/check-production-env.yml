name: Audit Google OAuth Secrets (Read-Only)

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ vars.PROD_GREEN_IP }} >> ~/.ssh/known_hosts

      - name: Audit Blue server
        run: |
          echo "=== BLUE (${{ vars.PROD_BLUE_IP }}) ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          set -euo pipefail
          CONTAINER=$(docker ps --format '{{.Names}}' | grep api | head -1)
          echo "Container: $CONTAINER"

          echo "--- All GOOGLE_* env vars in container ---"
          docker exec "$CONTAINER" printenv | grep -i google | sed 's/=.*/=<REDACTED>/' || echo "(none)"

          echo "--- GOOGLE_CLIENT_SECRET last 6 ---"
          docker exec "$CONTAINER" printenv GOOGLE_CLIENT_SECRET 2>/dev/null | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- GOOGLE_CLIENT_ID last 6 ---"
          docker exec "$CONTAINER" printenv GOOGLE_CLIENT_ID 2>/dev/null | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- .env file: all GOOGLE_* keys ---"
          grep -i 'GOOGLE' /opt/ectropy/.env | sed 's/=.*/=<REDACTED>/' || echo "(none in .env)"

          echo "--- .env GOOGLE_CLIENT_SECRET_PRODUCTION last 6 ---"
          grep '^GOOGLE_CLIENT_SECRET_PRODUCTION=' /opt/ectropy/.env | cut -d= -f2 | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- .env GOOGLE_CLIENT_ID_PRODUCTION last 6 ---"
          grep '^GOOGLE_CLIENT_ID_PRODUCTION=' /opt/ectropy/.env | cut -d= -f2 | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- compose file: GOOGLE references ---"
          grep -n 'GOOGLE' /opt/ectropy/docker-compose.yml || echo "(none in compose)"
          REMOTE

      - name: Audit Green server
        run: |
          echo "=== GREEN (${{ vars.PROD_GREEN_IP }}) ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_GREEN_IP }} bash <<'REMOTE'
          set -euo pipefail
          CONTAINER=$(docker ps --format '{{.Names}}' | grep api | head -1)
          echo "Container: $CONTAINER"

          echo "--- All GOOGLE_* env vars in container ---"
          docker exec "$CONTAINER" printenv | grep -i google | sed 's/=.*/=<REDACTED>/' || echo "(none)"

          echo "--- GOOGLE_CLIENT_SECRET last 6 ---"
          docker exec "$CONTAINER" printenv GOOGLE_CLIENT_SECRET 2>/dev/null | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- GOOGLE_CLIENT_ID last 6 ---"
          docker exec "$CONTAINER" printenv GOOGLE_CLIENT_ID 2>/dev/null | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- .env file: all GOOGLE_* keys ---"
          grep -i 'GOOGLE' /opt/ectropy/.env | sed 's/=.*/=<REDACTED>/' || echo "(none in .env)"

          echo "--- .env GOOGLE_CLIENT_SECRET_PRODUCTION last 6 ---"
          grep '^GOOGLE_CLIENT_SECRET_PRODUCTION=' /opt/ectropy/.env | cut -d= -f2 | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- .env GOOGLE_CLIENT_ID_PRODUCTION last 6 ---"
          grep '^GOOGLE_CLIENT_ID_PRODUCTION=' /opt/ectropy/.env | cut -d= -f2 | rev | cut -c1-6 | rev || echo "(not set)"

          echo "--- compose file: GOOGLE references ---"
          grep -n 'GOOGLE' /opt/ectropy/docker-compose.yml || echo "(none in compose)"
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
