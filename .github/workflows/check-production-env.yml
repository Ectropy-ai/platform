name: Fix GOOGLE_CLIENT_ID on production — WRITE

on:
  workflow_dispatch:

jobs:
  fix-oauth:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ vars.PROD_GREEN_IP }} >> ~/.ssh/known_hosts

      - name: Task 2 — Update .env on blue
        run: |
          echo "=== Updating GOOGLE_CLIENT_ID on blue ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          set -euo pipefail
          NEW_ID="167049735635-rvu72sobgcsc1t79d0hjg3a08r4ptavo.apps.googleusercontent.com"

          sed -i "s|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=${NEW_ID}|" /opt/ectropy/.env
          sed -i "s|^GOOGLE_CLIENT_ID_PRODUCTION=.*|GOOGLE_CLIENT_ID_PRODUCTION=${NEW_ID}|" /opt/ectropy/.env

          echo "--- Verify blue .env ---"
          grep 'GOOGLE_CLIENT_ID' /opt/ectropy/.env | grep -v SECRET
          REMOTE

      - name: Task 3 — Update .env on green
        run: |
          echo "=== Updating GOOGLE_CLIENT_ID on green ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_GREEN_IP }} bash <<'REMOTE'
          set -euo pipefail
          NEW_ID="167049735635-rvu72sobgcsc1t79d0hjg3a08r4ptavo.apps.googleusercontent.com"

          sed -i "s|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=${NEW_ID}|" /opt/ectropy/.env
          sed -i "s|^GOOGLE_CLIENT_ID_PRODUCTION=.*|GOOGLE_CLIENT_ID_PRODUCTION=${NEW_ID}|" /opt/ectropy/.env

          echo "--- Verify green .env ---"
          grep 'GOOGLE_CLIENT_ID' /opt/ectropy/.env | grep -v SECRET
          REMOTE

      - name: Task 4 — Restart api-gateway on blue
        run: |
          echo "=== Restarting api-gateway on blue ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          cd /opt/ectropy
          docker compose up -d --no-deps --force-recreate api-gateway
          REMOTE

      - name: Task 4b — Restart api-gateway on green
        run: |
          echo "=== Restarting api-gateway on green ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_GREEN_IP }} bash <<'REMOTE'
          cd /opt/ectropy
          docker compose up -d --no-deps --force-recreate api-gateway
          REMOTE

      - name: Task 4c — Wait and verify containers healthy
        run: |
          echo "Waiting 15 seconds for containers to stabilize..."
          sleep 15

          echo "=== Blue api-gateway status ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} \
            "docker ps --format 'table {{.Names}}\t{{.Status}}' | grep api-gateway"

          echo ""
          echo "=== Green api-gateway status ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_GREEN_IP }} \
            "docker ps --format 'table {{.Names}}\t{{.Status}}' | grep api-gateway"

      - name: Task 5 — Verify correct client ID in running containers
        run: |
          echo "=== Blue — GOOGLE_CLIENT_ID in container ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          API=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          VAL=$(docker exec "$API" printenv GOOGLE_CLIENT_ID 2>/dev/null)
          echo "First 30: ${VAL:0:30}"
          echo "Last 20: ${VAL: -20}"
          REMOTE

          echo ""
          echo "=== Green — GOOGLE_CLIENT_ID in container ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_GREEN_IP }} bash <<'REMOTE'
          API=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          VAL=$(docker exec "$API" printenv GOOGLE_CLIENT_ID 2>/dev/null)
          echo "First 30: ${VAL:0:30}"
          echo "Last 20: ${VAL: -20}"
          REMOTE

      - name: Task 5b — Verify OAuth redirect uses new client ID
        run: |
          echo "=== OAuth redirect from blue ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          curl -s -o /dev/null -D - http://localhost:4000/api/auth/google 2>&1 | grep -i 'location' | head -1
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
