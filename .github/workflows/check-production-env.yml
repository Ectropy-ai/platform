name: Read MinIO Secret Files — READ ONLY

on:
  workflow_dispatch:

jobs:
  minio-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 1 — Read MinIO secret files
        run: |
          echo "=== TASK 1: MinIO secret files ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          set -euo pipefail

          echo "--- /run/secrets/ ---"
          docker exec ectropy-minio ls -la /run/secrets/ 2>&1 || echo "/run/secrets/ not found"

          echo ""
          echo "--- access_key file ---"
          docker exec ectropy-minio cat /run/secrets/access_key 2>/dev/null || echo "access_key file not found in /run/secrets/"

          echo ""
          echo "--- secret_key file ---"
          docker exec ectropy-minio cat /run/secrets/secret_key 2>/dev/null || echo "secret_key file not found in /run/secrets/"

          echo ""
          echo "--- Check docker volumes for minio secrets ---"
          docker inspect ectropy-minio --format '{{json .Mounts}}' | python3 -m json.tool 2>/dev/null || docker inspect ectropy-minio --format '{{json .Mounts}}'
          REMOTE

      - name: Task 2 — Test minioadmin credentials
        run: |
          echo "=== TASK 2: Test minioadmin/minioadmin ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker exec ectropy-minio mc alias set local http://localhost:9000 minioadmin minioadmin 2>&1 && echo "MINIOADMIN_WORKS" || echo "MINIOADMIN_FAILS"
          REMOTE

      - name: Task 3 — List buckets and check speckle-server bucket
        run: |
          echo "=== TASK 3: MinIO buckets ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker exec ectropy-minio mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null
          echo "--- Bucket list ---"
          docker exec ectropy-minio mc ls local/ 2>&1 || echo "mc ls failed"
          echo ""
          echo "--- speckle-server bucket stats ---"
          docker exec ectropy-minio mc stat local/speckle-server 2>&1 || echo "speckle-server bucket not found"
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
