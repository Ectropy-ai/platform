name: Read MinIO Credentials — READ ONLY

on:
  workflow_dispatch:

jobs:
  minio-read:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 1 — MinIO container credentials
        run: |
          echo "=== TASK 1: MinIO container env vars ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          echo "--- docker inspect env vars ---"
          docker inspect ectropy-minio \
            --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E 'MINIO_ROOT|MINIO_ACCESS|MINIO_SECRET'

          echo ""
          echo "--- MinIO compose section from docker-compose.yml ---"
          grep -A 30 'minio:' /opt/ectropy/docker-compose.yml | grep -E 'MINIO_ROOT|MINIO_ACCESS|MINIO_SECRET|image.*minio'
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
