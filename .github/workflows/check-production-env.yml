name: Speckle S3 Fix — Read Before Write

on:
  workflow_dispatch:

jobs:
  s3-read:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 1 — speckle-server compose block
        run: |
          echo "=== TASK 1: speckle-server service block ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          grep -n -A 80 'speckle-server:' /opt/ectropy/docker-compose.yml | head -100
          REMOTE

      - name: Task 2 — MinIO/S3 vars in .env
        run: |
          echo "=== TASK 2: MinIO/S3 vars in .env ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          grep -inE 'minio|s3_|S3 |S3=' /opt/ectropy/.env || echo "No S3/MinIO vars found in .env"
          REMOTE

      - name: Task 3 — MinIO container status
        run: |
          echo "=== TASK 3: MinIO container ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -i minio || echo "No MinIO container found"
          echo ""
          echo "--- All S3-related env vars in speckle-server container ---"
          docker inspect ectropy-speckle-server --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -iE 's3_|minio|bucket' || echo "No S3/MinIO vars in container"
          REMOTE

      - name: Task 3b — Check other speckle containers for S3 vars
        run: |
          echo "=== TASK 3b: S3 vars in other speckle containers ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          for C in ectropy-speckle-fileimport ectropy-speckle-preview ectropy-speckle-webhook; do
            echo "--- $C ---"
            docker inspect "$C" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep -iE 's3_|minio|bucket' || echo "  No S3/MinIO vars"
          done
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
