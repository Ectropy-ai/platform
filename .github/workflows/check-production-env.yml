name: Check OAuth Config — READ ONLY

on:
  workflow_dispatch:

jobs:
  check-oauth:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Task 2 — OAuth-related env vars from .env
        run: |
          echo "=== OAuth/redirect vars from /opt/ectropy/.env ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          grep -iE 'NEXTAUTH|CALLBACK|REDIRECT|OAUTH|GOOGLE|BASE_URL|APP_URL|SITE_URL|NODE_ENV' \
            /opt/ectropy/.env | sed 's/SECRET=.*/SECRET=REDACTED/' | sort
          REMOTE

      - name: Task 2b — Actual callback URL in api-gateway container
        run: |
          echo "=== Callback URL resolved in api-gateway ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          API_CONTAINER=$(docker ps --format '{{.Names}}' | grep api-gateway | head -1)
          echo "Container: $API_CONTAINER"

          echo "--- GOOGLE_CALLBACK_URL ---"
          docker exec "$API_CONTAINER" printenv GOOGLE_CALLBACK_URL 2>/dev/null || echo "NOT SET"

          echo "--- BASE_URL ---"
          docker exec "$API_CONTAINER" printenv BASE_URL 2>/dev/null || echo "NOT SET"

          echo "--- OAUTH_CALLBACK_URL ---"
          docker exec "$API_CONTAINER" printenv OAUTH_CALLBACK_URL 2>/dev/null || echo "NOT SET"

          echo "--- NODE_ENV ---"
          docker exec "$API_CONTAINER" printenv NODE_ENV 2>/dev/null || echo "NOT SET"

          echo "--- GOOGLE_CLIENT_ID (last 20 chars) ---"
          VAL=$(docker exec "$API_CONTAINER" printenv GOOGLE_CLIENT_ID 2>/dev/null || echo "NOT SET")
          echo "...${VAL: -20}"

          echo "--- Startup log showing callback URL ---"
          docker logs "$API_CONTAINER" 2>&1 | grep -i "callback\|OAUTH_CALLBACK" | tail -5
          REMOTE

      - name: Task 2c — Google OAuth consent screen redirect test
        run: |
          echo "=== Test Google OAuth redirect URL ==="
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          echo "--- GET /api/auth/google (follow redirects, capture location) ---"
          curl -s -o /dev/null -D - http://localhost:4000/api/auth/google 2>&1 | grep -iE 'location|redirect_uri'
          REMOTE

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
