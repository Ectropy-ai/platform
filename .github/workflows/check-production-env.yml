name: Update GOOGLE_CLIENT_SECRET on Production

on:
  workflow_dispatch:

jobs:
  update-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add runner IP to firewall (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"
          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H ${{ vars.PROD_BLUE_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ vars.PROD_GREEN_IP }} >> ~/.ssh/known_hosts

      - name: Write secret to temp file
        env:
          NEW_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          echo -n "$NEW_SECRET" > /tmp/gcs_value
          echo "Secret length: $(wc -c < /tmp/gcs_value) bytes"

      # STEP 1 + 2 + 3: Blue server
      - name: Update + restart + verify Blue
        run: |
          echo "=== BLUE (${{ vars.PROD_BLUE_IP }}) ==="
          scp /tmp/gcs_value root@${{ vars.PROD_BLUE_IP }}:/tmp/gcs_value
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_BLUE_IP }} bash <<'REMOTE'
          set -euo pipefail

          SECRET=$(cat /tmp/gcs_value)
          rm -f /tmp/gcs_value

          echo "--- Step 1: Update /opt/ectropy/.env ---"
          echo "Before:"
          grep '^GOOGLE_CLIENT_SECRET=' /opt/ectropy/.env | sed 's/=.*/=<REDACTED>/'
          sed -i "s|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${SECRET}|" /opt/ectropy/.env
          echo "After:"
          grep '^GOOGLE_CLIENT_SECRET=' /opt/ectropy/.env | sed 's/=.*/=<REDACTED>/'
          echo "After last 6:"
          grep '^GOOGLE_CLIENT_SECRET=' /opt/ectropy/.env | rev | cut -c1-6 | rev
          echo "sed complete"

          echo "--- Step 2: Restart api-gateway ---"
          cd /opt/ectropy
          docker compose -f /opt/ectropy/docker-compose.yml up -d --no-deps api-gateway
          echo "Waiting 10s for container startup..."
          sleep 10

          echo "--- Step 3: Verify last 6 chars in container ---"
          CONTAINER=$(docker ps --format '{{.Names}}' | grep api | head -1)
          echo "Container: $CONTAINER"
          LAST6=$(docker exec "$CONTAINER" printenv GOOGLE_CLIENT_SECRET | rev | cut -c1-6 | rev)
          echo "GOOGLE_CLIENT_SECRET last 6 chars: $LAST6"
          REMOTE

      # STEP 1 + 2 + 3: Green server
      - name: Update + restart + verify Green
        run: |
          echo "=== GREEN (${{ vars.PROD_GREEN_IP }}) ==="
          scp /tmp/gcs_value root@${{ vars.PROD_GREEN_IP }}:/tmp/gcs_value
          ssh -o ConnectTimeout=15 root@${{ vars.PROD_GREEN_IP }} bash <<'REMOTE'
          set -euo pipefail

          SECRET=$(cat /tmp/gcs_value)
          rm -f /tmp/gcs_value

          echo "--- Step 1: Update /opt/ectropy/.env ---"
          echo "Before:"
          grep '^GOOGLE_CLIENT_SECRET=' /opt/ectropy/.env | sed 's/=.*/=<REDACTED>/'
          sed -i "s|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${SECRET}|" /opt/ectropy/.env
          echo "After:"
          grep '^GOOGLE_CLIENT_SECRET=' /opt/ectropy/.env | sed 's/=.*/=<REDACTED>/'
          echo "After last 6:"
          grep '^GOOGLE_CLIENT_SECRET=' /opt/ectropy/.env | rev | cut -c1-6 | rev
          echo "sed complete"

          echo "--- Step 2: Restart api-gateway ---"
          cd /opt/ectropy
          docker compose -f /opt/ectropy/docker-compose.yml up -d --no-deps api-gateway
          echo "Waiting 10s for container startup..."
          sleep 10

          echo "--- Step 3: Verify last 6 chars in container ---"
          CONTAINER=$(docker ps --format '{{.Names}}' | grep api | head -1)
          echo "Container: $CONTAINER"
          LAST6=$(docker exec "$CONTAINER" printenv GOOGLE_CLIENT_SECRET | rev | cut -c1-6 | rev)
          echo "GOOGLE_CLIENT_SECRET last 6 chars: $LAST6"
          REMOTE

      # STEP 5: n8n canary
      - name: n8n canary check
        run: |
          echo "--- Step 5: n8n canary ---"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://n8n.luh.tech/webhook/lead-capture)
          echo "n8n canary: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: expected 200, got $HTTP_CODE"
            exit 1
          fi
          echo "PASS: n8n canary returned 200"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gcs_value

      - name: Remove runner IP from firewall (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
