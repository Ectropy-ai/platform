name: Terraform Secrets Extract - Development

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  extract-development-secrets:
    name: Extract Development Secrets to terraform.tfvars
    runs-on: ubuntu-latest
    environment: development # Uses development environment secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate terraform.tfvars from development secrets
        env:
          # Infrastructure Variables
          DEVELOPMENT_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_KEY }}

          # Application URLs (public - no secrets)
          APP_VERSION: 'development'
          API_URL: 'https://dev.ectropy.ai'
          FRONTEND_URL: 'https://dev.ectropy.ai'

          # Database Variables (development environment secrets)
          # DATABASE_URL constructed from components (enterprise pattern)
          DATABASE_HOST: ${{ secrets.DB_HOST }}
          DATABASE_PORT: ${{ secrets.DB_PORT }}
          DATABASE_NAME: ${{ secrets.DB_NAME }}
          DATABASE_USER: ${{ secrets.DB_USER }}
          DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}

          # Auth & Security (development environment secrets)
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_DEVELOPMENT }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_DEVELOPMENT }}

          # Data Layer (development environment secrets)
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

          # External APIs (development environment secrets)
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # Speckle BIM Integration (development - simplified config)
          SPECKLE_TOKEN: ${{ secrets.SPECKLE_TOKEN }}
          SPECKLE_STREAM_ID: ${{ secrets.SPECKLE_STREAM_ID }}

        run: |
          cat > terraform.tfvars <<TFVARS_EOF
          # ============================================================================
          # Development Terraform Variables - Generated from GitHub Secrets
          # ============================================================================
          # Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          # Source: GitHub Actions development environment secrets
          # Workflow: terraform-secrets-extract-development.yml
          # ============================================================================

          # Infrastructure Variables
          development_ssh_private_key = """$DEVELOPMENT_SSH_PRIVATE_KEY"""

          # Application Variables
          app_version = "$APP_VERSION"

          # Database Variables (DATABASE_URL constructed from components - enterprise pattern)
          database_url = "postgresql://$DATABASE_USER:$DATABASE_PASSWORD@$DATABASE_HOST:$DATABASE_PORT/$DATABASE_NAME?sslmode=require"
          database_host = "$DATABASE_HOST"
          database_port = "$DATABASE_PORT"
          database_name = "$DATABASE_NAME"
          database_user = "$DATABASE_USER"
          database_password = "$DATABASE_PASSWORD"

          # Auth & Security
          jwt_secret = "$JWT_SECRET"
          jwt_refresh_secret = "$JWT_REFRESH_SECRET"
          session_secret = "$SESSION_SECRET"
          google_client_id = "$GOOGLE_CLIENT_ID"
          google_client_secret = "$GOOGLE_CLIENT_SECRET"

          # Data Layer
          redis_password = "$REDIS_PASSWORD"
          encryption_key = "$ENCRYPTION_KEY"

          # External APIs
          mcp_api_key = "$MCP_API_KEY"
          openai_api_key = "$OPENAI_API_KEY"

          # Speckle BIM Integration (Development - Simplified)
          speckle_token = "$SPECKLE_TOKEN"
          speckle_stream_id = "$SPECKLE_STREAM_ID"

          # ============================================================================
          # VALIDATION: All 21 variables populated from development environment secrets
          # Pattern: Environment secrets (development) → terraform.tfvars → Terraform
          # Security: File gitignored, artifact encrypted
          # ============================================================================
          TFVARS_EOF

          echo "✅ terraform.tfvars generated successfully"
          wc -l terraform.tfvars
          echo ""
          echo "Validating required variables are non-empty..."

          # Validation: Check no placeholder values remain
          if grep -q "placeholder" terraform.tfvars; then
            echo "❌ ERROR: Placeholder values found in terraform.tfvars"
            exit 1
          fi

          # Validation: Check all 21 variables are present
          variable_count=$(grep -c '^[a-z_]* = ' terraform.tfvars)
          if [ "$variable_count" -ne 21 ]; then
            echo "❌ ERROR: Expected 21 variables, found $variable_count"
            exit 1
          fi

          echo "✅ Validation passed: 21 variables, no placeholders"

      - name: Upload terraform.tfvars as encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: development-terraform-tfvars-${{ github.run_number }}
          path: terraform.tfvars
          retention-days: 1 # Auto-delete after 1 day for security
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## ✅ Development terraform.tfvars Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`development-terraform-tfvars-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Variables:** 21" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** 1 day (auto-delete for security)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifact from workflow run" >> $GITHUB_STEP_SUMMARY
          echo "2. Move to \`infrastructure/terraform/environments/development/terraform.tfvars\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Validate: \`terraform validate\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Deploy: \`terraform apply\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pattern:** GitHub development environment secrets → terraform.tfvars → Terraform GitOps" >> $GITHUB_STEP_SUMMARY
