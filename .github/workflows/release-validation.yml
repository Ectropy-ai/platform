# Release Version Validation Workflow
#
# Triggers:
#   - Push to release/v* branches
#   - Pull requests to main FROM release/v* branches
# Purpose: Validates version format and readiness before release deployment
#
# IMPORTANT: This workflow validates ONLY release branches:
# - Branch name MUST match pattern: release/vX.Y.Z (e.g., release/v1.2.3)
# - For other branches, the workflow will skip gracefully
#
# Correct usage:
#   1. Create release branch: git checkout -b release/v1.2.3
#   2. Update package.json version to match (1.2.3)
#   3. Update CHANGELOG.md with version entry
#   4. Push branch: git push origin release/v1.2.3
#   5. Create PR to main for final approval
#
# Validation includes:
# - Version format and consistency checks
# - Changelog updates
# - Full test suite (unit, integration, E2E)
# - Security scans
# - Production readiness checks
# - Manual approval gate

name: Release Validation

on:
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - main

# Enterprise Security: Explicit least-privilege permissions
# WRITE + DEPLOY: Release validation creates tags and deploys
permissions:
  contents: write
  deployments: write

jobs:
  # Early check to prevent workflow from running on non-release branches
  # This prevents the approval-gate from blocking non-release PRs
  check-release-branch:
    name: Check Release Branch
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - name: Check if release branch
        id: check
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH_NAME" =~ ^release/ ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "✅ Release branch detected: $BRANCH_NAME"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Not a release branch: $BRANCH_NAME"
            echo "This workflow only validates release branches (release/*)"
          fi

  version-check:
    name: Validate Version
    runs-on: ubuntu-latest
    needs: check-release-branch
    timeout-minutes: 5
    # Only run on release branches - rely on the check-release-branch job output
    if: needs.check-release-branch.outputs.is_release == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_valid: ${{ steps.validate.outputs.is_valid }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: version
        run: |
          # For push events, use ref_name; for PRs, use head_ref
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH_NAME" =~ ^release/v(.*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "📦 Release version: v$VERSION"
          else
            echo "❌ Invalid release branch name: $BRANCH_NAME"
            echo "Expected format: release/vX.Y.Z"
            exit 1
          fi

      - name: Validate package.json version
        id: validate
        run: |
          BRANCH_VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_VERSION=$(jq -r .version package.json)

          if [ "$BRANCH_VERSION" == "$PACKAGE_VERSION" ]; then
            echo "✅ Version match: v$PACKAGE_VERSION"
            echo "is_valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Version mismatch!"
            echo "  Branch: v$BRANCH_VERSION"
            echo "  package.json: v$PACKAGE_VERSION"
            echo "is_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  changelog-check:
    name: Validate Changelog
    runs-on: ubuntu-latest
    needs: [check-release-branch, version-check]
    if: needs.check-release-branch.outputs.is_release == 'true'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CHANGELOG.md updated
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"

          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "✅ CHANGELOG.md updated for v$VERSION"
          else
            echo "❌ CHANGELOG.md not updated for v$VERSION"
            echo ""
            echo "Please add a section for this release:"
            echo ""
            echo "## [$VERSION] - $(date +%Y-%m-%d)"
            echo ""
            echo "### Added"
            echo "- New features"
            echo ""
            echo "### Changed"
            echo "- Changes"
            echo ""
            echo "### Fixed"
            echo "- Bug fixes"
            exit 1
          fi

      - name: Validate changelog format
        run: |
          # Check for proper Keep a Changelog format
          if ! grep -q "# Changelog" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing header"
            exit 1
          fi

          if ! grep -q "The format is based on \[Keep a Changelog\]" CHANGELOG.md; then
            echo "⚠️  Warning: CHANGELOG.md should reference Keep a Changelog format"
          fi

          echo "✅ CHANGELOG.md format valid"

  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [check-release-branch, version-check, changelog-check]
    if: needs.check-release-branch.outputs.is_release == 'true'
    timeout-minutes: 30
    environment: staging # Required for OAuth secrets used in E2E tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pre-flight OAuth validation - fails fast (<5s) with clear error messages
      - name: Validate OAuth Secrets
        uses: ./.github/actions/validate-oauth-secrets
        with:
          google-client-id: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          test-google-email: ${{ secrets.TEST_GOOGLE_EMAIL }}
          test-google-password: ${{ secrets.TEST_GOOGLE_PASSWORD }}
          environment-name: 'staging'
          fail-on-missing: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all unit tests with coverage
        run: pnpm nx run-many --target=test --all --coverage --parallel=3 || pnpm test:coverage

      - name: Run all integration tests
        run: pnpm nx run-many --target=test:integration --all || echo "⚠️ Integration tests not available"
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://${{ vars.DATABASE_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DATABASE_HOST }}:${{ vars.DATABASE_PORT }}/${{ vars.DATABASE_NAME }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e:ci || echo "⚠️ E2E tests not available"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 30

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [check-release-branch, version-check]
    if: needs.check-release-branch.outputs.is_release == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: 'ectropy'
          path: '.'
          format: 'HTML'

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: security-reports
          path: reports/

  production-readiness:
    name: Production Readiness Check
    runs-on: ubuntu-latest
    needs:
      [
        check-release-branch,
        version-check,
        changelog-check,
        full-test-suite,
        security-scan,
      ]
    if: needs.check-release-branch.outputs.is_release == 'true'
    timeout-minutes: 10
    environment: staging # Required for OAuth secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Pre-flight OAuth validation - fails fast (<5s) with clear error messages
      - name: Validate OAuth Secrets
        uses: ./.github/actions/validate-oauth-secrets
        with:
          google-client-id: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          google-client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          test-google-email: ${{ secrets.TEST_GOOGLE_EMAIL }}
          test-google-password: ${{ secrets.TEST_GOOGLE_PASSWORD }}
          environment-name: 'staging'
          fail-on-missing: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production readiness script
        run: bash scripts/core/production-readiness.sh
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Build for production
        run: pnpm nx run-many --target=build --all --configuration=production || pnpm nx run-many --target=build --all

      - name: Verify production configuration
        run: |
          echo "Checking production configurations..."

          # Check docker-compose.production.yml
          if [ -f docker-compose.production.yml ]; then
            echo "✅ docker-compose.production.yml exists"
          else
            echo "❌ docker-compose.production.yml missing"
            exit 1
          fi

          # Check nginx production config
          if [ -f infrastructure/nginx/ectropy-production.conf ]; then
            echo "✅ Nginx production config exists"
          else
            echo "❌ Nginx production config missing"
            exit 1
          fi

          # Check .env.production.example or template
          if [ -f .env.production.example ] || [ -f .env.production.template ]; then
            echo "✅ Production environment template exists"
          else
            echo "⚠️  .env.production template missing"
          fi

  approval-gate:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs:
      [
        check-release-branch,
        version-check,
        changelog-check,
        full-test-suite,
        security-scan,
        production-readiness,
      ]
    if: needs.check-release-branch.outputs.is_release == 'true'
    environment:
      name: production-approval

    steps:
      - name: Require Manual Approval
        run: |
          echo "🚦 Manual approval required before merging to main"
          echo "📦 Version: v${{ needs.version-check.outputs.version }}"
          echo "🔍 Review release notes in CHANGELOG.md"
          echo "✅ All automated checks passed"

  summary:
    name: Release Validation Summary
    runs-on: ubuntu-latest
    needs:
      [
        check-release-branch,
        version-check,
        changelog-check,
        full-test-suite,
        security-scan,
        production-readiness,
        approval-gate,
      ]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Release Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if this is a release branch
          if [ "${{ needs.check-release-branch.outputs.is_release }}" != "true" ]; then
            echo "ℹ️ **Workflow skipped** - Not a release branch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This workflow only validates release branches (release/*)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Current branch:** ${{ github.head_ref || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "For regular PR validation, see the PR Validation workflow." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "**Version:** v${{ needs.version-check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version Check: ${{ needs.version-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changelog Check: ${{ needs.changelog-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Full Test Suite: ${{ needs.full-test-suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Production Readiness: ${{ needs.production-readiness.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Approval Gate: ${{ needs.approval-gate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ALL_SUCCESS=true
          for result in "${{ needs.version-check.result }}" \
                        "${{ needs.changelog-check.result }}" \
                        "${{ needs.full-test-suite.result }}" \
                        "${{ needs.security-scan.result }}" \
                        "${{ needs.production-readiness.result }}" \
                        "${{ needs.approval-gate.result }}"; do
            if [ "$result" != "success" ]; then
              ALL_SUCCESS=false
              break
            fi
          done

          if [ "$ALL_SUCCESS" = true ]; then
            echo "✅ **All validations passed! Ready to merge to main.**" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ **Some validations failed. Please review and fix issues.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
