name: Terraform Utilities

# ============================================================================
# Enterprise Terraform Utilities - Consolidated Diagnostic & Maintenance
# ============================================================================
#
# Purpose: Unified interface for Terraform diagnostic and maintenance operations
# Consolidates: terraform-import.yml + terraform-state-fix.yml + terraform-backend-check.yml
#
# Session 5 Consolidation: Reduces workflow sprawl by combining three infrequently-used
# utility workflows into single interface with operation mode selection
#
# Operations:
#   - backend-health-check: Monitor DigitalOcean Spaces backend health
#   - import-resources: Import existing infrastructure into Terraform state
#   - state-recovery: Emergency Terraform state fixes and recovery
#
# Reference: apps/mcp-server/data/cicd-environment-workflow-matrix.json v1.6.0
#
# PHASE 5 UPDATE REQUIRED: This workflow needs updating for multi-environment structure
#   - Resource IDs reference OLD pre-VPC-isolation infrastructure
#   - Need to add environment selection input parameter
#   - Need to update resource IDs for current blue-green production droplets
# ============================================================================

on:
  schedule:
    # Backend health check runs every 12 hours (00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'

  workflow_dispatch:
    inputs:
      utility_mode:
        description: 'Utility operation to perform'
        required: true
        type: choice
        default: 'backend-health-check'
        options:
          - backend-health-check
          - import-resources
          - state-recovery

      # Parameters for import-resources mode
      resources:
        description: 'Resources to import (import mode only: droplet,database,loadbalancer,domain or all)'
        required: false
        default: 'all'
        type: string

      # Parameters for state-recovery mode
      recovery_action:
        description: 'Recovery action (state-recovery mode only)'
        required: false
        type: choice
        default: 'verify-state'
        options:
          - verify-state
          - remove-wrong-droplet
          - import-correct-droplet
          - full-cleanup-and-import

env:
  TF_VERSION: '1.14.0'
  TF_WORKING_DIR: './infrastructure/terraform/environments/production' # PHASE 5: Updated for isolated state structure
  AWS_REGION: 'us-east-1' # Required for S3 backend, not used by Spaces
  DO_SPACES_REGION: 'sfo3' # DigitalOcean Spaces region - must match backend.tf

# Enterprise Security: Explicit least-privilege permissions
permissions:
  contents: read
  deployments: write # Required for state-recovery mode

jobs:
  # ==========================================================================
  # Backend Health Check Job
  # Replaces: terraform-backend-check.yml
  # ==========================================================================
  backend-health-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.utility_mode == 'backend-health-check'
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure DigitalOcean Spaces Credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔑 Configuring DigitalOcean Spaces credentials..."

          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "❌ ERROR: AWS_ACCESS_KEY_ID secret is not configured"
            exit 1
          fi

          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "❌ ERROR: AWS_SECRET_ACCESS_KEY secret is not configured"
            exit 1
          fi

          echo "✅ DigitalOcean Spaces credentials configured"

      - name: Verify DigitalOcean Spaces Connectivity
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔍 Verifying DigitalOcean Spaces connectivity..."

          if aws s3 ls --endpoint-url https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com &>/dev/null; then
            echo "✅ DigitalOcean Spaces is accessible"
            echo "   Endpoint: https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com"
          else
            echo "❌ ERROR: Cannot connect to DigitalOcean Spaces"
            exit 1
          fi

      - name: Validate Bucket Exists and Initialize if Needed
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          echo "🪣 Validating bucket accessibility..."

          MAX_RETRIES=3
          RETRY_COUNT=0
          BUCKET_ACCESSIBLE=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if aws s3 ls s3://ectropy-terraform-state \
              --endpoint-url https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com &>/dev/null; then
              echo "✅ Bucket accessible on attempt $((RETRY_COUNT + 1))"
              BUCKET_ACCESSIBLE=true
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "⚠️  Attempt $RETRY_COUNT failed, retrying in 5s..."
              sleep 5
            fi
          done

          if [ "$BUCKET_ACCESSIBLE" = false ]; then
            echo "⚠️  Bucket not accessible after $MAX_RETRIES attempts"
            echo "🚀 Running initialization script..."
            bash scripts/terraform/init-digitalocean-backend.sh
          else
            echo "✅ Bucket validation complete"
          fi

      - name: Validate Backend Configuration
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔍 Running DigitalOcean Spaces backend validation..."
          bash scripts/terraform/validate-digitalocean-backend.sh

          if [ $? -eq 0 ]; then
            echo "✅ Backend validation completed successfully"
          else
            echo "❌ Backend validation failed"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate Terraform Configuration
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "🔍 Validating Terraform configuration..."
          terraform init -backend=false
          terraform validate
          echo "✅ Terraform configuration is valid"

      - name: Test Backend Connectivity
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔍 Testing backend connectivity..."
          if terraform init -upgrade 2>&1 | tee /tmp/terraform-init.log; then
            echo "✅ Backend connectivity test: PASSED"
          else
            echo "⚠️  Backend connectivity test: FAILED"
            cat /tmp/terraform-init.log
          fi

      - name: Generate Health Report
        if: always()
        run: |
          echo "📊 Generating backend health report..."

          cat > /tmp/backend-health-report.txt <<EOF
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Terraform Backend Health Report
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Workflow Run: ${{ github.run_number }}
          Triggered By: ${{ github.event_name }}

          Configuration:
            Backend Type: DigitalOcean Spaces (S3-compatible)
            Bucket: ectropy-terraform-state
            Endpoint: https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com
            Region: ${{ env.DO_SPACES_REGION }}
            State Path: environments/production/terraform.tfstate

          Validation Status: Check logs above

          Next Steps:
            - Review validation logs above for detailed status
            - If failures occurred, check DigitalOcean Spaces credentials
            - Verify bucket exists in DigitalOcean console
            - Run manual validation: bash scripts/terraform/validate-digitalocean-backend.sh

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          EOF

          cat /tmp/backend-health-report.txt

      - name: Upload Health Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-health-report-${{ github.run_number }}
          path: /tmp/backend-health-report.txt
          retention-days: 30

  # ==========================================================================
  # Import Resources Job
  # Replaces: terraform-import.yml
  # ==========================================================================
  import-resources:
    name: Import Existing Resources
    runs-on: ubuntu-latest
    if: github.event.inputs.utility_mode == 'import-resources'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔧 Initializing Terraform..."
          terraform init -input=false

      - name: Import Production Droplet
        if: contains(github.event.inputs.resources, 'droplet') || github.event.inputs.resources == 'all'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          # PHASE 5 TODO: Update for blue-green production droplets
          # Current IDs: 548830664 (blue-isolated), 548830665 (green-isolated)
          # OLD ID (deprecated): 525145389
          echo "⚠️ WARNING: This step needs updating for current blue-green infrastructure"
          echo "📥 Importing production droplet (ID: 525145389, sfo3) - DEPRECATED ID..."
          terraform import digitalocean_droplet.production 525145389 || echo "⚠️ Droplet already imported or import failed"

      - name: Import Production Database
        if: contains(github.event.inputs.resources, 'database') || github.event.inputs.resources == 'all'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "📥 Importing production database (ID: afac7c67-bd14-424c-a7e0-72ce480cfecb)..."
          terraform import digitalocean_database_cluster.production afac7c67-bd14-424c-a7e0-72ce480cfecb || echo "⚠️ Database already imported or import failed"

      - name: Import Production Load Balancer
        if: contains(github.event.inputs.resources, 'loadbalancer') || github.event.inputs.resources == 'all'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          # PHASE 5 TODO: Update for NEW VPC-isolated load balancer
          # Current ID: 051530f8-c736-4358-aaef-6e273484c9fe (ectropy-production-lb-v2, VPC 6e8e5cbf)
          # OLD ID (deprecated): f8dfd1f2-4fd3-42ad-9ad2-33783bfc7e87
          echo "⚠️ WARNING: This step needs updating for current VPC-isolated LB"
          echo "📥 Importing production load balancer (ID: f8dfd1f2-4fd3-42ad-9ad2-33783bfc7e87) - DEPRECATED ID..."
          terraform import digitalocean_loadbalancer.production f8dfd1f2-4fd3-42ad-9ad2-33783bfc7e87 || echo "⚠️ Load balancer already imported or import failed"

      - name: Import Production Domain
        if: contains(github.event.inputs.resources, 'domain') || github.event.inputs.resources.resources == 'all'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "📥 Importing production domain (ectropy.ai)..."
          terraform import digitalocean_domain.production ectropy.ai || echo "⚠️ Domain already imported or import failed"

      - name: Verify Import - Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "🔍 Running terraform plan to verify imported resources..."
          # PHASE 5: No longer needs -var-file since we're in the environment directory
          # ENTERPRISE FIX (2026-01-02): Terraform loads terraform.tfvars automatically from working directory
          terraform plan -no-color -input=false | tee plan_output.txt

      - name: Upload Plan Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-import-plan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 30

      - name: Import Summary
        if: always()
        run: |
          echo "## 📥 Terraform Import Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Resources Requested**: ${{ github.event.inputs.resources }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Imported Resources:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | ID | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----|---------" >> $GITHUB_STEP_SUMMARY
          echo "| Droplet | 525145389 | ✅ Imported |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | afac7c67-bd14-424c-a7e0-72ce480cfecb | ✅ Imported |" >> $GITHUB_STEP_SUMMARY
          echo "| Load Balancer | f8dfd1f2-4fd3-42ad-9ad2-33783bfc7e87 | ✅ Imported |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | ectropy.ai | ✅ Imported |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the Terraform plan output to verify imported resources match configuration" >> $GITHUB_STEP_SUMMARY
          echo "2. If plan shows no changes for imported resources, import was successful" >> $GITHUB_STEP_SUMMARY
          echo "3. Run terraform-plan-apply.yml with action=apply to create remaining resources" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # State Recovery Job
  # Replaces: terraform-state-fix.yml
  # ==========================================================================
  state-recovery:
    name: Terraform State Recovery
    runs-on: ubuntu-latest
    if: github.event.inputs.utility_mode == 'state-recovery'
    environment:
      name: production-infrastructure
      url: https://ectropy.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          echo "🔧 Initializing Terraform..."
          terraform init -input=false

      - name: Show Current State
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "📋 Current Terraform State Resources:"
          terraform state list || echo "No resources in state"

      - name: Remove Wrong Droplet from State
        if: github.event.inputs.recovery_action == 'remove-wrong-droplet' || github.event.inputs.recovery_action == 'full-cleanup-and-import'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "🗑️ Removing incorrect droplet from state..."
          terraform state rm digitalocean_droplet.production || echo "⚠️ Droplet not in state or already removed"

      - name: Import Correct sfo3 Droplet
        if: github.event.inputs.recovery_action == 'import-correct-droplet' || github.event.inputs.recovery_action == 'full-cleanup-and-import'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          # PHASE 5 TODO: Update for blue-green droplets (548830664, 548830665)
          echo "⚠️ WARNING: Using deprecated droplet ID - needs updating for blue-green infrastructure"
          echo "📥 Importing correct sfo3 production droplet (ID: 525145389) - DEPRECATED ID..."
          terraform import digitalocean_droplet.production 525145389

      - name: Import Database (if needed)
        if: github.event.inputs.recovery_action == 'full-cleanup-and-import'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "📥 Importing production database (ID: afac7c67-bd14-424c-a7e0-72ce480cfecb)..."
          terraform import digitalocean_database_cluster.production afac7c67-bd14-424c-a7e0-72ce480cfecb || echo "⚠️ Database already imported"

      - name: Import Load Balancer (if needed)
        if: github.event.inputs.recovery_action == 'full-cleanup-and-import'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          # PHASE 5 TODO: Update to current VPC-isolated LB (051530f8)
          echo "⚠️ WARNING: Using deprecated LB ID - needs updating for VPC-isolated infrastructure"
          echo "📥 Importing production load balancer (ID: f8dfd1f2-4fd3-42ad-9ad2-33783bfc7e87) - DEPRECATED ID..."
          terraform import digitalocean_loadbalancer.production f8dfd1f2-4fd3-42ad-9ad2-33783bfc7e87 || echo "⚠️ Load balancer already imported"

      - name: Verify State After Recovery
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprint: ${{ vars.TF_VAR_SSH_KEY_FINGERPRINT }}
          TF_VAR_admin_ip: ${{ vars.TF_VAR_ADMIN_IP }}
          TF_VAR_ssl_certificate_name: ${{ vars.TF_VAR_SSL_CERTIFICATE_NAME || 'ectropy-production-cert' }}
          TF_VAR_alert_email: ${{ vars.TF_VAR_ALERT_EMAIL || 'alerts@ectropy.ai' }}
        run: |
          echo "🔍 Verifying Terraform state..."
          echo ""
          echo "Resources in state:"
          terraform state list
          echo ""
          echo "Running terraform plan to check for drift..."
          # PHASE 5: No longer needs -var-file since we're in the environment directory
          # ENTERPRISE FIX (2026-01-02): Terraform loads terraform.tfvars automatically from working directory
          terraform plan -no-color -input=false | tee plan_output.txt

      - name: Upload Plan Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-recovery-plan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 30

      - name: State Recovery Summary
        if: always()
        run: |
          echo "## 🔧 Terraform State Recovery Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recovery Action**: ${{ github.event.inputs.recovery_action }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Expected State:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **PHASE 5 TODO**: Resource IDs need updating for current infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | OLD ID (deprecated) | Current ID (Phase 4) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|----------|----------" >> $GITHUB_STEP_SUMMARY
          echo "| Droplet Blue | 525145389 | 548830664 | ⚠️ Needs update |" >> $GITHUB_STEP_SUMMARY
          echo "| Droplet Green | N/A | 548830665 | ⚠️ Needs update |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | afac7c67 | afac7c67 | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Load Balancer | f8dfd1f2 | 051530f8 | ⚠️ Needs update |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the plan output artifact to verify the state is correct." >> $GITHUB_STEP_SUMMARY
