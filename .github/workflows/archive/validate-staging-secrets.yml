# ============================================================================
# Validate Staging Secrets & Token Diagnostics
# ============================================================================
# Five Why diagnostic workflow (2026-02-23):
# Validates that all critical GitHub Secrets are configured and that the
# Speckle admin credentials can authenticate with the Speckle server.
#
# Auth pattern (Five Why 2026-02-23): Credential-based ephemeral token.
# SPECKLE_ADMIN_EMAIL + SPECKLE_ADMIN_PASSWORD → ephemeral JWT → test calls.
# Static SPECKLE_SERVER_TOKEN is no longer required by the seed workflow.
#
# Trigger: Manual only (workflow_dispatch)
# Purpose: Diagnose 403 errors, missing secrets, and connectivity issues
# ============================================================================

name: Validate Staging Secrets

on:
  workflow_dispatch:

concurrency:
  group: validate-staging-secrets
  cancel-in-progress: false

jobs:
  validate-secrets:
    name: Validate GitHub Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Critical Secrets Exist
        env:
          # Infrastructure
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          TERRAFORM_DEPLOY_PRIVATE_KEY: ${{ secrets.TERRAFORM_DEPLOY_PRIVATE_KEY }}
          DOCR_CONFIG_JSON: ${{ secrets.DOCR_CONFIG_JSON }}

          # SSL/TLS
          CF_ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}

          # Auth & Security
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

          # Database
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

          # Speckle (credential-based auth — Five Why 2026-02-23)
          SPECKLE_ADMIN_PASSWORD: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          SPECKLE_SESSION_SECRET: ${{ secrets.SPECKLE_SESSION_SECRET }}
          SPECKLE_SERVER_TOKEN: ${{ secrets.SPECKLE_SERVER_TOKEN }}

          # External Services
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

          # MinIO
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}

          # Watchtower
          WATCHTOWER_HTTP_API_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}

          # Google OAuth
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_STAGING }}

          # Cloudflare DNS (optional)
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "========================================="
          echo "GITHUB SECRETS VALIDATION"
          echo "========================================="
          echo ""

          PASS=0
          FAIL=0
          WARN=0

          check_secret() {
            local name="$1"
            local value="$2"
            local required="$3"  # "required" or "optional"

            if [ -z "$value" ]; then
              if [ "$required" = "required" ]; then
                echo "  ❌ MISSING: $name"
                FAIL=$((FAIL + 1))
              else
                echo "  ⚠️  OPTIONAL (not set): $name"
                WARN=$((WARN + 1))
              fi
            else
              local len=${#value}
              echo "  ✅ SET: $name ($len chars)"
              PASS=$((PASS + 1))
            fi
          }

          echo "--- Infrastructure ---"
          check_secret "DIGITALOCEAN_ACCESS_TOKEN" "$DIGITALOCEAN_TOKEN" "required"
          check_secret "SPACES_ACCESS_KEY_ID" "$SPACES_ACCESS_KEY_ID" "required"
          check_secret "SPACES_SECRET_ACCESS_KEY" "$SPACES_SECRET_ACCESS_KEY" "required"
          check_secret "TERRAFORM_DEPLOY_PRIVATE_KEY" "$TERRAFORM_DEPLOY_PRIVATE_KEY" "required"
          check_secret "DOCR_CONFIG_JSON" "$DOCR_CONFIG_JSON" "required"
          echo ""

          echo "--- SSL/TLS (Cloudflare Origin Certificate) ---"
          check_secret "CF_ORIGIN_KEY" "$CF_ORIGIN_KEY" "required"
          check_secret "CF_ORIGIN_CERT" "$CF_ORIGIN_CERT" "required"
          echo ""

          echo "--- Auth & Security ---"
          check_secret "JWT_SECRET" "$JWT_SECRET" "required"
          check_secret "JWT_REFRESH_SECRET" "$JWT_REFRESH_SECRET" "required"
          check_secret "SESSION_SECRET" "$SESSION_SECRET" "required"
          check_secret "ENCRYPTION_KEY" "$ENCRYPTION_KEY" "required"
          echo ""

          echo "--- Database ---"
          check_secret "DB_PASSWORD" "$DB_PASSWORD" "required"
          echo ""

          echo "--- Speckle BIM ---"
          check_secret "SPECKLE_ADMIN_PASSWORD" "$SPECKLE_ADMIN_PASSWORD" "required"
          check_secret "SPECKLE_SESSION_SECRET" "$SPECKLE_SESSION_SECRET" "required"
          check_secret "SPECKLE_SERVER_TOKEN" "$SPECKLE_SERVER_TOKEN" "optional"
          echo ""

          echo "--- External Services ---"
          check_secret "REDIS_PASSWORD" "$REDIS_PASSWORD" "required"
          check_secret "MCP_API_KEY" "$MCP_API_KEY" "required"
          check_secret "OPENAI_API_KEY" "$OPENAI_API_KEY" "required"
          check_secret "RESEND_API_KEY" "$RESEND_API_KEY" "required"
          echo ""

          echo "--- MinIO ---"
          check_secret "MINIO_ACCESS_KEY" "$MINIO_ACCESS_KEY" "required"
          check_secret "MINIO_SECRET_KEY" "$MINIO_SECRET_KEY" "required"
          echo ""

          echo "--- Watchtower ---"
          check_secret "WATCHTOWER_HTTP_API_TOKEN" "$WATCHTOWER_HTTP_API_TOKEN" "required"
          echo ""

          echo "--- Google OAuth ---"
          check_secret "GOOGLE_CLIENT_ID_STAGING" "$GOOGLE_CLIENT_ID" "required"
          check_secret "GOOGLE_CLIENT_SECRET_STAGING" "$GOOGLE_CLIENT_SECRET" "required"
          echo ""

          echo "--- Cloudflare DNS (optional) ---"
          check_secret "CLOUDFLARE_API_TOKEN" "$CLOUDFLARE_API_TOKEN" "optional"
          echo ""

          echo "========================================="
          echo "RESULTS: $PASS passed, $FAIL failed, $WARN optional"
          echo "========================================="

          if [ $FAIL -gt 0 ]; then
            echo ""
            echo "❌ $FAIL required secrets are MISSING."
            echo "   These must be configured in GitHub Settings → Secrets → Actions."
            exit 1
          else
            echo ""
            echo "✅ All required secrets are configured."
          fi

      - name: Validate SSL Certificate Format
        env:
          CF_ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
        run: |
          echo "========================================="
          echo "SSL CERTIFICATE VALIDATION"
          echo "========================================="
          echo ""

          CERT_OK=true

          if [ -z "$CF_ORIGIN_CERT" ]; then
            echo "❌ CF_ORIGIN_CERT is empty"
            CERT_OK=false
          else
            echo "CF_ORIGIN_CERT: ${#CF_ORIGIN_CERT} chars"
            if echo "$CF_ORIGIN_CERT" | grep -q "BEGIN CERTIFICATE"; then
              echo "  ✅ Contains PEM certificate header"
            else
              echo "  ❌ Missing PEM certificate header (BEGIN CERTIFICATE)"
              echo "  The cert must be in PEM format."
              CERT_OK=false
            fi
          fi
          echo ""

          if [ -z "$CF_ORIGIN_KEY" ]; then
            echo "❌ CF_ORIGIN_KEY is empty"
            CERT_OK=false
          else
            echo "CF_ORIGIN_KEY: ${#CF_ORIGIN_KEY} chars"
            if echo "$CF_ORIGIN_KEY" | grep -q "BEGIN"; then
              echo "  ✅ Contains PEM key header"
            else
              echo "  ❌ Missing PEM key header"
              CERT_OK=false
            fi
          fi
          echo ""

          if [ "$CERT_OK" = "true" ]; then
            echo "✅ SSL certificate secrets appear valid"
          else
            echo "❌ SSL certificate issues detected"
            echo "   Without valid Origin Certificate, LB has no HTTPS:443 forwarding → HTTP 000"
            exit 1
          fi

  validate-connectivity:
    name: Validate Staging Connectivity
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - name: Test Staging Endpoints
        run: |
          echo "========================================="
          echo "STAGING CONNECTIVITY TEST"
          echo "========================================="
          echo ""

          test_endpoint() {
            local name="$1"
            local url="$2"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" -m 15 "$url" 2>/dev/null) || true
            if [ -z "$status" ] || [ "$status" = "000" ]; then
              echo "  ❌ $name: HTTP 000 (unreachable/timeout)"
              # Diagnose: try with -k (skip cert validation)
              local insecure_status
              insecure_status=$(curl -sk -o /dev/null -w "%{http_code}" -m 15 "$url" 2>/dev/null) || true
              if [ -n "$insecure_status" ] && [ "$insecure_status" != "000" ]; then
                echo "     → Reachable with -k (HTTP $insecure_status) — SSL CERTIFICATE ISSUE"
                echo "     → Fix: Run terraform-staging-gitops workflow with 'DEPLOY'"
              else
                echo "     → Unreachable even with -k — INFRASTRUCTURE ISSUE"
                echo "     → Fix: Check LB, droplet, DNS, and firewall"
              fi
              return 1
            elif [ "$status" = "200" ]; then
              echo "  ✅ $name: HTTP $status"
              return 0
            else
              echo "  ⚠️  $name: HTTP $status"
              return 0
            fi
          }

          FAILURES=0

          echo "Testing HTTPS endpoints..."
          test_endpoint "LB Health" "https://staging.ectropy.ai/lb-health" || FAILURES=$((FAILURES + 1))
          test_endpoint "API Health" "https://staging.ectropy.ai/api/health" || FAILURES=$((FAILURES + 1))
          test_endpoint "MCP Health" "https://staging.ectropy.ai/mcp/health" || FAILURES=$((FAILURES + 1))
          test_endpoint "Web Dashboard" "https://staging.ectropy.ai/health" || FAILURES=$((FAILURES + 1))
          echo ""

          echo "Testing Speckle endpoint..."
          test_endpoint "Speckle GraphQL" "https://staging.ectropy.ai/speckle/graphql" || FAILURES=$((FAILURES + 1))
          echo ""

          if [ $FAILURES -gt 0 ]; then
            echo "❌ $FAILURES endpoint(s) failed connectivity test"
            # Don't exit 1 — let token validation still run for diagnostics
          else
            echo "✅ All endpoints reachable"
          fi

      - name: Validate Speckle Admin Credential Authentication
        env:
          SPECKLE_ADMIN_EMAIL: ${{ vars.SPECKLE_ADMIN_EMAIL }}
          SPECKLE_ADMIN_PASSWORD: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
        run: |
          echo "========================================="
          echo "SPECKLE ADMIN CREDENTIAL AUTHENTICATION TEST"
          echo "========================================="
          echo ""

          SPECKLE_URL="https://staging.ectropy.ai/speckle"
          SPECKLE_ADMIN_EMAIL="${SPECKLE_ADMIN_EMAIL:-speckle-admin@ectropy.ai}"
          echo "Speckle URL:  $SPECKLE_URL"
          echo "Admin Email:  $SPECKLE_ADMIN_EMAIL"
          echo "Auth Pattern: Credential-based ephemeral token (Five Why 2026-02-23)"
          echo ""

          # Test 1: Can we reach the GraphQL endpoint at all?
          echo "Test 1: GraphQL endpoint reachability..."
          SERVER_RESP=$(curl -s -o /tmp/server_info.json -w "%{http_code}" -m 15 \
            "$SPECKLE_URL/graphql" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ serverInfo { name version } }"}' 2>/dev/null) || true

          if [ "$SERVER_RESP" = "200" ]; then
            SERVER_INFO=$(cat /tmp/server_info.json 2>/dev/null)
            echo "  ✅ GraphQL reachable (HTTP $SERVER_RESP)"
            echo "  Server info: $SERVER_INFO"
          elif [ "$SERVER_RESP" = "000" ]; then
            echo "  ❌ GraphQL unreachable (HTTP 000)"
            echo "  Staging server not responding — cannot test credentials"
            exit 1
          else
            echo "  ⚠️  GraphQL returned HTTP $SERVER_RESP"
            cat /tmp/server_info.json 2>/dev/null || true
          fi
          echo ""

          if [ -z "$SPECKLE_ADMIN_PASSWORD" ]; then
            echo "❌ SPECKLE_ADMIN_PASSWORD secret is not set — cannot test authentication"
            exit 1
          fi

          # Test 2: Obtain ephemeral token from admin credentials
          # Speckle v2 requires a challenge parameter for auth (middleware.ts)
          CHALLENGE=$(head -c 32 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 32)
          echo "Test 2: Credential-based ephemeral token acquisition..."
          echo "  Generated challenge: ${CHALLENGE:0:8}..."
          LOGIN_RESP=$(curl -s -o /dev/null -w "%{redirect_url}" \
            -X POST "$SPECKLE_URL/auth/local/login?challenge=${CHALLENGE}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${SPECKLE_ADMIN_EMAIL}\",\"password\":\"${SPECKLE_ADMIN_PASSWORD}\"}")
          ACCESS_CODE=$(echo "${LOGIN_RESP}" | grep -oE "access_code=[^&]+" | cut -d= -f2)

          if [ -z "$ACCESS_CODE" ]; then
            echo "  ❌ Login failed — no access_code in redirect"
            echo "     Possible causes:"
            echo "     1. SPECKLE_ADMIN_PASSWORD is wrong"
            echo "     2. Admin user does not exist yet (bootstrap has not run)"
            echo "     3. Speckle server is not healthy"
            echo ""
            echo "  Fix: Ensure speckle-admin-bootstrap ran successfully on the staging server."
            exit 1
          fi
          echo "  Got access_code: ${ACCESS_CODE:0:8}..."

          TOKEN_RESP=$(curl -sf "$SPECKLE_URL/auth/token" \
            -H "Content-Type: application/json" \
            -d "{\"appId\":\"spklwebapp\",\"appSecret\":\"spklwebapp\",\"accessCode\":\"${ACCESS_CODE}\",\"challenge\":\"${CHALLENGE}\"}")
          EPHEMERAL_TOKEN=$(echo "${TOKEN_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" 2>/dev/null)

          if [ -z "$EPHEMERAL_TOKEN" ]; then
            echo "  ❌ Token exchange failed"
            echo "     Response: ${TOKEN_RESP}"
            exit 1
          fi
          echo "  Got ephemeral token: ${EPHEMERAL_TOKEN:0:10}..."
          echo ""

          # Test 3: Validate the ephemeral token via activeUser query
          echo "Test 3: Token validation via activeUser query..."
          AUTH_RESP=$(curl -s "$SPECKLE_URL/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${EPHEMERAL_TOKEN}" \
            -d '{"query":"{ activeUser { id email name role } }"}' 2>/dev/null)

          VERIFIED_EMAIL=$(echo "$AUTH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['activeUser']['email'])" 2>/dev/null || true)
          VERIFIED_ROLE=$(echo "$AUTH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['activeUser']['role'])" 2>/dev/null || true)

          if [ -n "$VERIFIED_EMAIL" ]; then
            echo "  ✅ Authentication PASSED"
            echo "  Authenticated as: $VERIFIED_EMAIL (role: $VERIFIED_ROLE)"
          else
            echo "  ❌ activeUser query failed after obtaining token"
            echo "  Response: $AUTH_RESP"
            exit 1
          fi
