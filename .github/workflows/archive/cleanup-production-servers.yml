name: Cleanup Production Servers

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target server(s) to clean'
        required: true
        type: choice
        options:
          - blue
          - green
          - both

env:
  PROD_BLUE_IP: ${{ vars.PROD_BLUE_IP }}
  PROD_GREEN_IP: ${{ vars.PROD_GREEN_IP }}
  PROD_BLUE_DROPLET_ID: ${{ vars.PROD_BLUE_DROPLET_ID }}
  PROD_GREEN_DROPLET_ID: ${{ vars.PROD_GREEN_DROPLET_ID }}

jobs:
  cleanup-blue:
    name: Cleanup Blue Production Server
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'blue' || inputs.target == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/ectropy_prod
          chmod 600 ~/.ssh/ectropy_prod
          ssh-keyscan -H ${{ env.PROD_BLUE_IP }} >> ~/.ssh/known_hosts

      - name: Run cleanup on blue server
        run: |
          echo "========================================="
          echo "Cleaning up Blue Production Server"
          echo "IP: ${{ env.PROD_BLUE_IP }}"
          echo "========================================="

          # Transfer cleanup script
          scp -i ~/.ssh/ectropy_prod \
            scripts/deployment/cleanup-production-server.sh \
            root@${{ env.PROD_BLUE_IP }}:/tmp/cleanup.sh

          # Execute cleanup script
          ssh -i ~/.ssh/ectropy_prod root@${{ env.PROD_BLUE_IP }} \
            "chmod +x /tmp/cleanup.sh && /tmp/cleanup.sh"

  cleanup-green:
    name: Cleanup Green Production Server
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'green' || inputs.target == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/ectropy_prod
          chmod 600 ~/.ssh/ectropy_prod
          ssh-keyscan -H ${{ env.PROD_GREEN_IP }} >> ~/.ssh/known_hosts

      - name: Run cleanup on green server
        run: |
          echo "========================================="
          echo "Cleaning up Green Production Server"
          echo "IP: ${{ env.PROD_GREEN_IP }}"
          echo "========================================="

          # Transfer cleanup script
          scp -i ~/.ssh/ectropy_prod \
            scripts/deployment/cleanup-production-server.sh \
            root@${{ env.PROD_GREEN_IP }}:/tmp/cleanup.sh

          # Execute cleanup script
          ssh -i ~/.ssh/ectropy_prod root@${{ env.PROD_GREEN_IP }} \
            "chmod +x /tmp/cleanup.sh && /tmp/cleanup.sh"

  summary:
    name: Cleanup Summary
    runs-on: ubuntu-latest
    needs: [cleanup-blue, cleanup-green]
    if: always()

    steps:
      - name: Display summary
        run: |
          echo "========================================="
          echo "PRODUCTION SERVER CLEANUP COMPLETE"
          echo "========================================="
          echo ""
          echo "Target: ${{ inputs.target }}"
          echo ""
          if [ "${{ needs.cleanup-blue.result }}" == "success" ]; then
            echo "✅ Blue server cleanup: SUCCESS"
          elif [ "${{ needs.cleanup-blue.result }}" == "skipped" ]; then
            echo "⏭️  Blue server cleanup: SKIPPED"
          else
            echo "❌ Blue server cleanup: FAILED"
          fi

          if [ "${{ needs.cleanup-green.result }}" == "success" ]; then
            echo "✅ Green server cleanup: SUCCESS"
          elif [ "${{ needs.cleanup-green.result }}" == "skipped" ]; then
            echo "⏭️  Green server cleanup: SKIPPED"
          else
            echo "❌ Green server cleanup: FAILED"
          fi
          echo ""
          echo "Next step: Retry production deployment"
