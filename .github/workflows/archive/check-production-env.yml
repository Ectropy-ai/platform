name: Console Server State — READ ONLY

on:
  workflow_dispatch:

jobs:
  check-console:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: List all firewalls
        run: |
          echo "=== All DO firewalls ==="
          doctl compute firewall list --format ID,Name,Status --no-header

      - name: List all droplets
        run: |
          echo "=== All DO droplets ==="
          doctl compute droplet list --format ID,Name,PublicIPv4,Status --no-header

      - name: Check if console droplet is in firewall
        run: |
          echo "=== Firewall details for PROD_FIREWALL_ID ==="
          doctl compute firewall get ${{ vars.PROD_FIREWALL_ID }} --format DropletIDs

          echo ""
          echo "=== All firewalls with droplet membership ==="
          doctl compute firewall list --format ID,Name,DropletIDs

      - name: Add runner IP to ALL firewalls (temporary)
        id: add-firewall-rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT

          # Add to prod firewall
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall add-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32"

          # Try to find and add to any other firewalls
          ALL_FW=$(doctl compute firewall list --format ID --no-header)
          for fw in $ALL_FW; do
            if [ "$fw" != "$FIREWALL_ID" ]; then
              echo "Adding rule to firewall: $fw"
              doctl compute firewall add-rules $fw \
                --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
            fi
          done

          echo "Waiting 5s for firewall propagation..."
          sleep 5

      - name: Add SSH known hosts
        run: |
          ssh-keyscan -H 209.38.174.111 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Task 2 — Container state on console server
        run: |
          echo "=== Containers on 209.38.174.111 ==="
          ssh -o ConnectTimeout=15 root@209.38.174.111 \
            "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}\t{{.CreatedAt}}'" \
            2>&1 || echo "SSH FAILED"

      - name: Task 3 — Logs of failed/exited containers
        run: |
          echo "=== Logs of non-running containers ==="
          ssh -o ConnectTimeout=15 root@209.38.174.111 bash <<'REMOTE' 2>&1 || echo "SSH FAILED"
          EXITED=$(docker ps -a --format '{{.Names}}\t{{.Status}}' | grep -v 'Up ' | awk '{print $1}')
          if [ -z "$EXITED" ]; then
            echo "All containers are running"
          else
            for c in $EXITED; do
              echo "=== Logs: $c ==="
              docker logs "$c" --tail 30 2>&1
              echo ""
            done
          fi
          REMOTE

      - name: Task 4 — Compose file and nginx config
        run: |
          echo "=== Compose and config files ==="
          ssh -o ConnectTimeout=15 root@209.38.174.111 bash <<'REMOTE' 2>&1 || echo "SSH FAILED"
          echo "--- Find compose files ---"
          find / -name "docker-compose*" -o -name "compose.yml" -o -name "compose.yaml" 2>/dev/null | head -10

          echo ""
          echo "--- Find nginx config ---"
          find / -name "nginx.conf" -o -name "*.conf" -path "*/nginx/*" 2>/dev/null | head -10

          echo ""
          echo "--- Check what's listening on port 80/443 ---"
          ss -tlnp | grep -E ':80|:443' || echo "Nothing on 80/443"

          echo ""
          echo "--- Disk usage ---"
          df -h / | tail -1
          REMOTE

      - name: Remove runner IP from ALL firewalls (cleanup)
        if: always() && steps.add-firewall-rule.outputs.runner_ip
        run: |
          RUNNER_IP="${{ steps.add-firewall-rule.outputs.runner_ip }}"

          # Remove from prod firewall
          FIREWALL_ID="${{ vars.PROD_FIREWALL_ID }}"
          doctl compute firewall remove-rules $FIREWALL_ID \
            --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true

          # Remove from all other firewalls
          ALL_FW=$(doctl compute firewall list --format ID --no-header)
          for fw in $ALL_FW; do
            if [ "$fw" != "$FIREWALL_ID" ]; then
              doctl compute firewall remove-rules $fw \
                --inbound-rules "protocol:tcp,ports:22,address:$RUNNER_IP/32" || true
            fi
          done
