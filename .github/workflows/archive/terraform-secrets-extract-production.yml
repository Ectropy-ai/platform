name: Terraform Secrets Extract - Production

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  extract-production-secrets:
    name: Extract Production Secrets to terraform.tfvars
    runs-on: ubuntu-latest
    environment: production # Uses production environment secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate terraform.tfvars from production secrets
        env:
          # Infrastructure Variables
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_KEY }}

          # Application URLs (public - no secrets)
          APP_VERSION: 'production'
          API_URL: 'https://ectropy.ai'
          FRONTEND_URL: 'https://ectropy.ai'

          # Database Variables (production environment secrets)
          # DATABASE_URL constructed from components (enterprise pattern)
          DATABASE_HOST: ${{ secrets.DB_HOST }}
          DATABASE_PORT: ${{ secrets.DB_PORT }}
          DATABASE_NAME: ${{ secrets.DB_NAME }}
          DATABASE_USER: ${{ secrets.DB_USER }}
          DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}

          # Auth & Security (production environment secrets)
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PRODUCTION }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET_PRODUCTION }}

          # Data Layer (production environment secrets)
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

          # External APIs (production environment secrets)
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # Speckle BIM Integration (production environment secrets)
          SPECKLE_SERVER_TOKEN: ${{ secrets.SPECKLE_SERVER_TOKEN }}
          SPECKLE_ADMIN_PASSWORD: ${{ secrets.SPECKLE_ADMIN_PASSWORD }}
          SPECKLE_SESSION_SECRET: ${{ secrets.SPECKLE_SESSION_SECRET }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}

          # Infrastructure Services (production environment secrets)
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WATCHTOWER_HTTP_API_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}

        run: |
          cat > terraform.tfvars <<TFVARS_EOF
          # ============================================================================
          # Production Terraform Variables - Generated from GitHub Secrets
          # ============================================================================
          # Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          # Source: GitHub Actions production environment secrets
          # Workflow: terraform-secrets-extract-production.yml
          # ============================================================================

          # Infrastructure Variables
          production_ssh_private_key = """$PRODUCTION_SSH_PRIVATE_KEY"""

          # Application Variables
          app_version = "$APP_VERSION"
          api_url = "$API_URL"
          frontend_url = "$FRONTEND_URL"

          # Database Variables (DATABASE_URL constructed from components - enterprise pattern)
          database_url = "postgresql://$DATABASE_USER:$DATABASE_PASSWORD@$DATABASE_HOST:$DATABASE_PORT/$DATABASE_NAME?sslmode=require"
          database_host = "$DATABASE_HOST"
          database_name = "$DATABASE_NAME"
          database_user = "$DATABASE_USER"
          database_password = "$DATABASE_PASSWORD"

          # Auth & Security
          jwt_secret = "$JWT_SECRET"
          jwt_refresh_secret = "$JWT_REFRESH_SECRET"
          session_secret = "$SESSION_SECRET"
          google_client_id = "$GOOGLE_CLIENT_ID"
          google_client_secret = "$GOOGLE_CLIENT_SECRET"

          # Data Layer
          redis_password = "$REDIS_PASSWORD"
          encryption_key = "$ENCRYPTION_KEY"

          # External APIs
          mcp_api_key = "$MCP_API_KEY"
          openai_api_key = "$OPENAI_API_KEY"

          # Speckle BIM Integration
          speckle_server_token = "$SPECKLE_SERVER_TOKEN"
          speckle_admin_password = "$SPECKLE_ADMIN_PASSWORD"
          speckle_session_secret = "$SPECKLE_SESSION_SECRET"
          minio_access_key = "$MINIO_ACCESS_KEY"
          minio_secret_key = "$MINIO_SECRET_KEY"

          # Infrastructure Services
          resend_api_key = "$RESEND_API_KEY"
          watchtower_http_api_token = "$WATCHTOWER_HTTP_API_TOKEN"

          # ============================================================================
          # VALIDATION: All 25 variables populated from production environment secrets
          # Pattern: Environment secrets (production) → terraform.tfvars → Terraform
          # Security: File gitignored, artifact encrypted
          # ============================================================================
          TFVARS_EOF

          echo "✅ terraform.tfvars generated successfully"
          wc -l terraform.tfvars
          echo ""
          echo "Validating required variables are non-empty..."

          # Validation: Check no placeholder values remain
          if grep -q "placeholder" terraform.tfvars; then
            echo "❌ ERROR: Placeholder values found in terraform.tfvars"
            exit 1
          fi

          # Validation: Check all 25 variables are present
          variable_count=$(grep -c '^[a-z_]* = ' terraform.tfvars)
          if [ "$variable_count" -ne 25 ]; then
            echo "❌ ERROR: Expected 25 variables, found $variable_count"
            exit 1
          fi

          echo "✅ Validation passed: 25 variables, no placeholders"

      - name: Upload terraform.tfvars as encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-terraform-tfvars-${{ github.run_number }}
          path: terraform.tfvars
          retention-days: 1 # Auto-delete after 1 day for security
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## ✅ Production terraform.tfvars Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`production-terraform-tfvars-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Variables:** 25" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** 1 day (auto-delete for security)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifact from workflow run" >> $GITHUB_STEP_SUMMARY
          echo "2. Move to \`infrastructure/terraform/environments/production/terraform.tfvars\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Validate: \`terraform validate\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Deploy: \`terraform apply\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pattern:** GitHub production environment secrets → terraform.tfvars → Terraform GitOps" >> $GITHUB_STEP_SUMMARY
