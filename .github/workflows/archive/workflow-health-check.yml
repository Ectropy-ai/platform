# ARCHIVED: 2026-04-10
# One-off / low-frequency workflow — archived per Gap G-05
# See: .github/workflows/archive/README.md
# DO NOT remove — preserved for institutional knowledge

name: Weekly Workflow Health Check

on:
  schedule:
    # Every Monday at 9 AM UTC (4 AM EST)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to analyze'
        required: false
        default: '7'
      include_success:
        description: 'Include successful runs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  analyze-health:
    name: Analyze Workflow Health
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p gh > /dev/null && echo "✅ GitHub CLI already installed" && exit 0

          echo "📦 Installing GitHub CLI..."
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

          echo "✅ GitHub CLI installed successfully"

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: 🔍 Validate GitHub CLI Authentication
        run: |
          echo "📊 Checking GitHub CLI authentication..."
          if ! gh auth status; then
            echo "❌ GitHub CLI authentication failed"
            exit 1
          fi

          echo "✅ GitHub CLI authenticated successfully"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"

      - name: Run Workflow Health Analysis
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          REPORT_DATE=$(date +%Y-%m-%d)

          echo "🔍 Starting workflow health analysis..."
          echo "📅 Analysis period: Last $DAYS days"
          echo "📊 Report date: $REPORT_DATE"
          echo "🔒 Self-exclusion: This run (ID: ${{ github.run_id }}) will be excluded from analysis"
          echo ""

          if [ "${{ github.event.inputs.include_success }}" = "true" ]; then
            echo "Including successful runs in analysis..."
            bash scripts/ci/analyze-workflow-health.sh \
              --days "$DAYS" \
              --include-success \
              --output "evidence/weekly-health-${REPORT_DATE}"
          else
            echo "Analyzing failed runs only..."
            bash scripts/ci/analyze-workflow-health.sh \
              --days "$DAYS" \
              --failed-only \
              --output "evidence/weekly-health-${REPORT_DATE}"
          fi

          echo ""
          echo "✅ Analysis completed successfully"

      - name: Upload Health Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workflow-health-report-${{ github.run_number }}
          path: evidence/weekly-health-*/
          retention-days: 90

      - name: Extract P0 Critical Issues
        id: extract_p0
        run: |
          REPORT_DATE=$(date +%Y-%m-%d)
          REPORT_DIR="evidence/weekly-health-${REPORT_DATE}"

          if [ ! -f "$REPORT_DIR/priority-matrix.md" ]; then
            echo "⚠️ Priority matrix not found, no P0 issues to report"
            echo "p0_count=0" >> $GITHUB_OUTPUT
            echo "p0_detected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count P0 workflows by extracting only the P0 section and counting level 4 headers
          # This avoids counting workflows from P1, P2, P3 sections
          P0_SECTION=$(awk '/^## 🔴 P0 - Critical/,/^## 🟡 P1 - High/ {print}' "$REPORT_DIR/priority-matrix.md" | head -n -2)
          P0_COUNT=$(echo "$P0_SECTION" | grep -c "^#### " 2>/dev/null || echo "0")

          # CRITICAL: Strip newlines and whitespace for GitHub Actions output
          P0_COUNT=$(echo "$P0_COUNT" | tr -d '\n' | tr -d ' ')

          # Validate it's a number
          if ! [[ "$P0_COUNT" =~ ^[0-9]+$ ]]; then
            echo "⚠️ WARNING: P0_COUNT is not a valid integer, defaulting to 0"
            P0_COUNT=0
          fi

          echo "p0_count=$P0_COUNT" >> $GITHUB_OUTPUT
          echo "📊 P0 Count (validated): $P0_COUNT"

          if [ "$P0_COUNT" -gt 0 ]; then
            echo "p0_detected=true" >> $GITHUB_OUTPUT
            echo "🚨 Detected $P0_COUNT P0 critical workflow(s)"

            # Extract P0 section for issue body
            echo "$P0_SECTION" > /tmp/p0-issues.md

            # Add executive summary snippet
            if [ -f "$REPORT_DIR/EXECUTIVE_SUMMARY.md" ]; then
              echo "" >> /tmp/p0-issues.md
              echo "---" >> /tmp/p0-issues.md
              echo "" >> /tmp/p0-issues.md
              echo "## Executive Summary Metrics" >> /tmp/p0-issues.md
              echo "" >> /tmp/p0-issues.md
              awk '/^## Key Metrics/,/^## Priority Breakdown/ {print}' "$REPORT_DIR/EXECUTIVE_SUMMARY.md" | head -n -2 >> /tmp/p0-issues.md
            fi
          else
            echo "p0_detected=false" >> $GITHUB_OUTPUT
            echo "✅ No P0 critical workflows detected"
          fi

      - name: 🏷️ Validate Required Labels Exist
        if: steps.extract_p0.outputs.p0_detected == 'true'
        continue-on-error: true
        run: |
          echo "📊 Checking required labels..."

          # Fetch all existing labels once (optimization: 1 API call vs 4)
          if ! EXISTING_LABELS=$(gh label list --json name --jq '.[].name' 2>&1); then
            echo "⚠️ WARNING: Could not fetch existing labels (possible permission issue)"
            echo "Continuing without label validation..."
            exit 0
          fi

          # Define required labels with metadata (color|description)
          # Colors: D73A4A=red (critical), 0E8A16=green (automated), EDEDED=gray (neutral)
          declare -A LABEL_METADATA=(
            ["P0"]="D73A4A|Critical priority issues"
            ["ci-cd"]="EDEDED|CI/CD related issues"
            ["workflow-health"]="EDEDED|Workflow health monitoring"
            ["automated"]="0E8A16|Automatically generated by CI/CD workflows"
          )

          MISSING_LABELS=()
          for label in "${!LABEL_METADATA[@]}"; do
            if ! echo "$EXISTING_LABELS" | grep -qFx "$label"; then
              MISSING_LABELS+=("$label")
            fi
          done

          if [ ${#MISSING_LABELS[@]} -gt 0 ]; then
            echo "⚠️ WARNING: Missing labels: ${MISSING_LABELS[*]}"
            echo "Attempting to create missing labels..."

            for label in "${MISSING_LABELS[@]}"; do
              # Use subshell to avoid global IFS modification
              # Continue on error - label creation is nice-to-have, not critical
              (
                IFS='|' read -r color description <<< "${LABEL_METADATA[$label]}"
                if gh label create "$label" --description "$description" --color "$color" 2>&1; then
                  echo "✅ Created label: $label"
                else
                  echo "⚠️ Could not create label: $label (may already exist or insufficient permissions)"
                fi
              ) || true
            done
          fi

          echo "✅ Label validation completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or Update GitHub Issue for P0 Workflows
        if: steps.extract_p0.outputs.p0_detected == 'true'
        continue-on-error: true
        run: |
          # Use portable date command
          if date --version >/dev/null 2>&1; then
            # GNU date (Linux)
            REPORT_DATE=$(date +%Y-%m-%d)
            # Simple relative timeframe instead of exact date calculation
            NEXT_MONDAY="next Monday"
          else
            # BSD date (macOS)
            REPORT_DATE=$(date +%Y-%m-%d)
            NEXT_MONDAY="next Monday"
          fi

          P0_COUNT="${{ steps.extract_p0.outputs.p0_count }}"

          echo "🔍 Checking for existing P0 workflow health issues..."

          # Check if P0 issue already exists (open state)
          # Use proper error handling - if this fails, we'll create a new issue
          EXISTING_ISSUE=""
          if EXISTING_ISSUE=$(gh issue list \
            --label "P0,ci-cd,workflow-health" \
            --state open \
            --json number,title \
            --jq '.[0].number' 2>&1); then
            # Strip all whitespace characters (newlines, spaces, tabs, etc.)
            EXISTING_ISSUE=$(echo "$EXISTING_ISSUE" | tr -d '[:space:]')
            
            # Validate it's a positive integer immediately after API call
            if ! [[ "$EXISTING_ISSUE" =~ ^[0-9]+$ ]]; then
              echo "⚠️ API response is not a valid issue number: '$EXISTING_ISSUE'"
              echo "This may be an error message or empty response"
              EXISTING_ISSUE=""
            fi
          else
            echo "⚠️ Could not check for existing issues (may be permissions issue)"
            EXISTING_ISSUE=""
          fi

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "📝 Updating existing P0 issue #$EXISTING_ISSUE"

            if gh issue comment "$EXISTING_ISSUE" --body "## 🔄 Updated Analysis - ${REPORT_DATE}

          $(cat /tmp/p0-issues.md)

          ---

          **Full Report**: Available in workflow run #${{ github.run_number }} artifacts
          **Trend**: ${P0_COUNT} P0 workflow(s) detected this week
          **Analysis Period**: Last ${{ github.event.inputs.days || '7' }} days
          **Auto-generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" 2>&1; then
              echo "✅ Updated issue #$EXISTING_ISSUE with latest analysis"
            else
              echo "⚠️ Failed to update issue #$EXISTING_ISSUE, will try to create new issue"
              EXISTING_ISSUE=""
            fi
          fi

          if [ -z "$EXISTING_ISSUE" ]; then
            echo "📝 Creating new P0 critical workflow issue"

            if gh issue create \
              --title "🚨 P0 Critical: ${P0_COUNT} Workflow(s) with 0% Success Rate (Week of ${REPORT_DATE})" \
              --body "## Executive Summary

          Automated workflow health analysis detected **${P0_COUNT} critical workflow(s)** with 0% success rate.

          $(cat /tmp/p0-issues.md)

          ---

          ## Recommended Actions

          1. ✅ Review full analysis report in workflow artifacts (run #${{ github.run_number }})
          2. 🎯 Prioritize P0 workflows for immediate remediation
          3. 📋 Create individual issues for each P0 workflow with root cause analysis
          4. 📊 Track remediation progress with success rate metrics
          5. 🔄 Re-run this workflow after fixes to validate improvements

          ## Analysis Details

          - **Analysis Date**: ${REPORT_DATE}
          - **Time Period**: Last ${{ github.event.inputs.days || '7' }} days
          - **P0 Workflows**: ${P0_COUNT}
          - **Overall Health**: 🔴 CRITICAL
          - **Target**: ≥95% success rate per workflow

          ## Related Evidence

          - **Evidence Directory**: \`evidence/weekly-health-${REPORT_DATE}/\`
          - **Executive Summary**: \`evidence/weekly-health-${REPORT_DATE}/EXECUTIVE_SUMMARY.md\`
          - **Priority Matrix**: \`evidence/weekly-health-${REPORT_DATE}/priority-matrix.md\`
          - **Success Rates CSV**: \`evidence/weekly-health-${REPORT_DATE}/metrics/success-rates.csv\`

          ## Performance Metrics

          - **Analysis Time**: <2 minutes (vs. 2-4 hours manual)
          - **Performance Gain**: 120-240x faster
          - **Detection Method**: Automated weekly scan
          - **Next Scan**: ${NEXT_MONDAY} at 09:00 UTC

          ---

          🤖 **Auto-generated** by workflow health monitoring system
          📅 **Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          🔗 **Workflow Run**: #${{ github.run_number }}" \
              --label "P0,ci-cd,workflow-health,automated" 2>&1; then
              echo "✅ Created new P0 issue (unassigned - ready for triage)"
            else
              echo "⚠️ Failed to create P0 issue (possible permission issue)"
              echo "P0 workflows detected but issue creation failed"
              echo "Please check workflow artifacts for P0 details"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Workflow Summary
        if: always()
        run: |
          REPORT_DATE=$(date +%Y-%m-%d)
          REPORT_DIR="evidence/weekly-health-${REPORT_DATE}"

          echo "# 📊 Workflow Health Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Analysis Date:** ${REPORT_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "**Analysis Period:** Last ${{ github.event.inputs.days || '7' }} days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$REPORT_DIR/EXECUTIVE_SUMMARY.md" ]; then
            echo "## Executive Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT_DIR/EXECUTIVE_SUMMARY.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Warning:** Analysis failed to generate executive summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check workflow logs for errors." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Full report available in workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Retention period: 90 days" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact name: \`workflow-health-report-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [View All Workflow Runs](../../actions)" >> $GITHUB_STEP_SUMMARY
          echo "- [P0 Critical Issues](../../issues?q=is%3Aissue+is%3Aopen+label%3AP0+label%3Aci-cd)" >> $GITHUB_STEP_SUMMARY
          echo "- [Workflow Health Script](../../blob/main/scripts/ci/analyze-workflow-health.sh)" >> $GITHUB_STEP_SUMMARY

          echo "✅ Workflow summary generated"

      - name: Post-Analysis Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files..."
          rm -f /tmp/p0-issues.md 2>/dev/null || true
          echo "✅ Cleanup completed"
