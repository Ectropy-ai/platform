name: Bootstrap Staging Droplet

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Bootstrap Staging Droplet
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Bootstrap staging droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 600s
          envs: SPACES_ACCESS_KEY_ID,SPACES_SECRET_ACCESS_KEY,DIGITALOCEAN_ACCESS_TOKEN
          script: |
            set -euo pipefail
            echo "=== BOOTSTRAP START ==="

            # ── 1. System update ────────────────────────────────────────
            echo "--- Installing system dependencies ---"
            apt-get update -qq
            apt-get install -y -qq \
              ca-certificates curl gnupg lsb-release \
              s3cmd awscli jq

            # ── 2. Install Docker CE ────────────────────────────────────
            echo "--- Installing Docker ---"
            if ! command -v docker &>/dev/null; then
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) \
                signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" \
                > /etc/apt/sources.list.d/docker.list
              apt-get update -qq
              apt-get install -y -qq \
                docker-ce docker-ce-cli containerd.io \
                docker-buildx-plugin docker-compose-plugin
              systemctl enable docker
              systemctl start docker
              echo "Docker installed: $(docker --version)"
            else
              echo "Docker already installed: $(docker --version)"
            fi

            # ── 3. Create directory structure ───────────────────────────
            echo "--- Creating /opt/ectropy ---"
            mkdir -p /opt/ectropy
            mkdir -p /opt/ectropy/infrastructure/nginx

            # ── 4. Pull configs from DO Spaces ──────────────────────────
            echo "--- Pulling configs from Spaces ---"
            export AWS_ACCESS_KEY_ID="${SPACES_ACCESS_KEY_ID}"
            export AWS_SECRET_ACCESS_KEY="${SPACES_SECRET_ACCESS_KEY}"
            export AWS_DEFAULT_REGION="us-east-1"

            aws s3 cp \
              s3://ectropy-staging-configs/staging/compose/docker-compose.staging.yml \
              /opt/ectropy/docker-compose.yml \
              --endpoint-url https://sfo3.digitaloceanspaces.com

            aws s3 cp \
              s3://ectropy-staging-configs/staging/env/.env.staging \
              /opt/ectropy/.env \
              --endpoint-url https://sfo3.digitaloceanspaces.com

            aws s3 cp \
              s3://ectropy-staging-configs/staging/nginx/ectropy-staging.conf \
              /opt/ectropy/infrastructure/nginx/ectropy-staging.conf \
              --endpoint-url https://sfo3.digitaloceanspaces.com

            aws s3 cp \
              s3://ectropy-staging-configs/staging/nginx/main.conf \
              /opt/ectropy/infrastructure/nginx/nginx.conf \
              --endpoint-url https://sfo3.digitaloceanspaces.com


            echo "Configs pulled. Verifying..."
            ls -lh /opt/ectropy/
            ls -lh /opt/ectropy/infrastructure/nginx/


            # ── 6. Authenticate with DOCR ───────────────────────────────
            echo "--- Authenticating with DOCR ---"
            echo "${DIGITALOCEAN_ACCESS_TOKEN}" | \
              docker login registry.digitalocean.com \
              --username token \
              --password-stdin
            echo "DOCR auth complete"

            # ── 7. Start Watchtower ─────────────────────────────────────
            echo "--- Starting Watchtower ---"
            docker stop watchtower 2>/dev/null || true
            docker rm watchtower 2>/dev/null || true
            docker run -d \
              --name watchtower \
              --restart always \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /root/.docker/config.json:/config.json \
              containrrr/watchtower \
              --interval 60 \
              --cleanup \
              --include-restarting
            echo "Watchtower: $(docker inspect --format='{{.State.Status}}' watchtower)"

            # ── 8. Initial stack start ──────────────────────────────────
            echo "--- Starting initial stack ---"
            cd /opt/ectropy
            docker compose pull
            docker compose up -d
            echo "Stack started"

            # ── 9. Validation ───────────────────────────────────────────
            echo "--- Waiting 30s for services to stabilise ---"
            sleep 30
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost/health || echo "UNREACHABLE")
            echo "Health check (localhost): ${HEALTH}"

            echo "Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "=== BOOTSTRAP COMPLETE ==="
        env:
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
