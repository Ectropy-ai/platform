name: Assign Demo Users to Projects (One-Off)
on:
  workflow_dispatch:

jobs:
  assign:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack
        run: |
          corepack enable
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack prepare pnpm@${PNPM_VERSION} --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          LUHTECH_PKG_READ: ${{ secrets.LUHTECH_PKG_READ }}
      - name: Generate Prisma Client
        run: pnpm prisma:generate
      - name: Dry Run
        run: npx tsx scripts/database/assign-demo-users-to-projects.ts --dry-run
        env:
          DATABASE_URL: postgresql://${{ vars.DATABASE_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DATABASE_HOST }}:${{ vars.DATABASE_PORT }}/${{ vars.DATABASE_NAME }}?sslmode=require
      - name: Execute Assignment
        run: npx tsx scripts/database/assign-demo-users-to-projects.ts --execute
        env:
          DATABASE_URL: postgresql://${{ vars.DATABASE_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DATABASE_HOST }}:${{ vars.DATABASE_PORT }}/${{ vars.DATABASE_NAME }}?sslmode=require
