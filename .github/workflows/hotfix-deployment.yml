name: Hotfix Deployment

# Enterprise-Grade Hotfix Workflow
# - NO skip_tests parameter (removed - too dangerous)
# - Comprehensive service management
# - Automatic rollback on failure
# - Blue-green compatible deployment

on:
  push:
    branches:
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      deployment_strategy:
        description: 'Deployment strategy'
        required: false
        default: 'atomic'
        type: choice
        options:
          - atomic # Stop old, start new (faster, brief downtime)
          - blue-green # Zero downtime with existing blue-green setup

# Enterprise Security: Explicit least-privilege permissions
# RESTRICTED: Hotfix needs write code (for commits) and deploy
permissions:
  contents: write
  deployments: write

jobs:
  version-check:
    name: Validate Hotfix Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      base_version: ${{ steps.base_version.outputs.base_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [[ "$BRANCH_NAME" =~ ^hotfix/v(.*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "🔥 Hotfix version: v$VERSION"
          else
            echo "❌ Invalid hotfix branch name: $BRANCH_NAME"
            echo "Expected format: hotfix/vX.Y.Z"
            exit 1
          fi

      - name: Get current production version
        id: base_version
        run: |
          # Get the latest tag from main branch
          git fetch origin main
          CURRENT_VERSION=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "v1.0.0")
          echo "base_version=${CURRENT_VERSION#v}" >> $GITHUB_OUTPUT
          echo "📦 Current production version: $CURRENT_VERSION"

      - name: Validate version increment
        run: |
          HOTFIX_VERSION="${{ steps.version.outputs.version }}"
          BASE_VERSION="${{ steps.base_version.outputs.base_version }}"

          echo "Hotfix version: $HOTFIX_VERSION"
          echo "Base version: $BASE_VERSION"

          # Validate hotfix is a patch version increment
          if [[ "$HOTFIX_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "✅ Valid version format"
          else
            echo "❌ Invalid version format. Expected: X.Y.Z"
            exit 1
          fi

  critical-tests:
    name: Critical Tests (REQUIRED - No Skip Option)
    needs: version-check
    runs-on: ubuntu-latest
    # Tests are ALWAYS required for hotfix deployments
    # Removed skip_tests parameter - too dangerous for production
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run critical unit tests
        run: pnpm nx run-many --target=test --all --parallel=3 || pnpm test

      - name: Run build
        run: pnpm nx run-many --target=build --all

      - name: Security scan
        run: pnpm audit --audit-level=high
        continue-on-error: true

  build-hotfix:
    name: Build Hotfix
    needs: [version-check, critical-tests]
    # Build ONLY if tests pass - no skipping allowed
    if: needs.critical-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all projects (production)
        run: pnpm nx run-many --target=build --all --configuration=production || pnpm nx run-many --target=build --all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hotfix-build-v${{ needs.version-check.outputs.version }}
          path: dist/
          retention-days: 90

  deploy-hotfix:
    name: Deploy Hotfix to Production
    needs: [version-check, build-hotfix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production-hotfix
      url: https://ectropy.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hotfix-build-v${{ needs.version-check.outputs.version }}
          path: dist/

      - name: Create hotfix tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ needs.version-check.outputs.version }}"

          # Check if tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
          else
            git tag -a "v$VERSION" -m "Hotfix v$VERSION - Emergency deployment

            See CHANGELOG.md for details."
            git push origin "v$VERSION"
            echo "✅ Tag v$VERSION created"
          fi

      - name: Deploy to Production (Enterprise Hotfix)
        uses: appleboy/ssh-action@master
        env:
          DEPLOYMENT_STRATEGY: ${{ inputs.deployment_strategy || 'atomic' }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: DEPLOYMENT_STRATEGY
          script: |
            set -e

            echo "========================================="
            echo "🔥 ENTERPRISE HOTFIX DEPLOYMENT"
            echo "========================================="
            echo "Version: v${{ needs.version-check.outputs.version }}"
            echo "Strategy: ${DEPLOYMENT_STRATEGY}"
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "========================================="
            echo ""

            cd /opt/ectropy

            # =========================================================================
            # PHASE 0: PRE-DEPLOYMENT SERVICE MANAGEMENT
            # =========================================================================
            echo "========================================="
            echo "🔍 PHASE 0: PRE-DEPLOYMENT VALIDATION"
            echo "========================================="

            # Service Discovery
            if [ -f scripts/deployment/discover-services.sh ]; then
              echo "Running service discovery..."
              bash scripts/deployment/discover-services.sh || echo "⚠️  Discovery completed"
            fi
            echo ""

            # Database Backup (CRITICAL for hotfix)
            echo "💾 Creating database backup (REQUIRED for hotfix)..."
            BACKUP_DIR="/opt/ectropy-backups/hotfix-v${{ needs.version-check.outputs.version }}-$(date +%Y%m%d-%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            # Backup database
            if command -v pg_dump >/dev/null 2>&1; then
              sudo -u postgres pg_dump ectropy_production > "$BACKUP_DIR/database.sql" 2>/dev/null || echo "⚠️  Database backup skipped"
              if [ -f "$BACKUP_DIR/database.sql" ]; then
                BACKUP_SIZE=$(du -h "$BACKUP_DIR/database.sql" | cut -f1)
                echo "✅ Database backup created: $BACKUP_SIZE"
              fi
            fi

            # Backup application state
            echo "Backing up application state..."
            cp -r /opt/ectropy "$BACKUP_DIR/app/" || echo "⚠️  App backup failed"
            echo "✅ Backup directory: $BACKUP_DIR"
            echo ""

            # Port Verification (for atomic deployments)
            if [ "${DEPLOYMENT_STRATEGY}" = "atomic" ]; then
              echo "Checking ports for atomic deployment..."
              if [ -f scripts/deployment/verify-ports.sh ]; then
                # For atomic: just verify, don't block (we'll handle cleanup)
                bash scripts/deployment/verify-ports.sh || echo "⚠️  Ports in use, will cleanup"
              fi
            fi

            # =========================================================================
            # PHASE 1: FETCH AND PREPARE HOTFIX
            # =========================================================================
            echo "========================================="
            echo "📦 PHASE 1: FETCH HOTFIX VERSION"
            echo "========================================="
            git fetch origin
            git checkout v${{ needs.version-check.outputs.version }}
            echo "✅ Checked out v${{ needs.version-check.outputs.version }}"
            echo ""

            # =========================================================================
            # PHASE 2: DEPLOYMENT (Strategy-Specific)
            # =========================================================================
            if [ "${DEPLOYMENT_STRATEGY}" = "blue-green" ]; then
              # -----------------------------------------------------------------------
              # Blue-Green Deployment (Zero Downtime)
              # -----------------------------------------------------------------------
              echo "========================================="
              echo "🔄 PHASE 2: BLUE-GREEN HOTFIX DEPLOYMENT"
              echo "========================================="

              # Determine current active color
              ACTIVE_COLOR=$(grep "# Active" infrastructure/nginx/ectropy-production.conf | grep -oP 'api-gateway-\K(blue|green)' | head -1 || echo "green")
              STANDBY_COLOR=$( [ "$ACTIVE_COLOR" = "blue" ] && echo "green" || echo "blue" )

              echo "Current active: $ACTIVE_COLOR"
              echo "Deploying to: $STANDBY_COLOR"
              echo ""

              # Use enhanced blue-green deployment script
              bash scripts/deployment/blue-green-deploy-full.sh "$STANDBY_COLOR"

              echo "✅ Blue-green hotfix deployment complete"

            else
              # -----------------------------------------------------------------------
              # Atomic Deployment (Brief Downtime, Faster)
              # -----------------------------------------------------------------------
              echo "========================================="
              echo "⚡ PHASE 2: ATOMIC HOTFIX DEPLOYMENT"
              echo "========================================="

              # Service Cleanup
              if [ -f scripts/deployment/cleanup-all-services.sh ]; then
                echo "Cleaning up conflicting services..."
                bash scripts/deployment/cleanup-all-services.sh --force || echo "⚠️  Cleanup completed with warnings"
              fi

              # Build containers
              echo "🔨 Building hotfix containers..."
              docker compose -f docker-compose.production.yml build

              # Stop old containers
              echo "🛑 Stopping old containers..."
              docker compose -f docker-compose.production.yml down

              # Wait for cleanup
              echo "⏳ Waiting for full cleanup..."
              sleep 5

              # Start new containers
              echo "🚀 Starting hotfix containers..."
              docker compose -f docker-compose.production.yml up -d

              # ===================================================================
              # PHASE 3: HEALTH VERIFICATION WITH AUTOMATIC ROLLBACK
              # ===================================================================
              echo ""
              echo "========================================="
              echo "🏥 PHASE 3: HEALTH VERIFICATION"
              echo "========================================="
              echo "Waiting for services to start (max 120s)..."

              MAX_WAIT=120
              ELAPSED=0
              API_HEALTHY=false
              WEB_HEALTHY=false

              while [ $ELAPSED -lt $MAX_WAIT ]; do
                # Check API health
                if curl -sf http://localhost:4000/health >/dev/null 2>&1; then
                  echo "✅ API is healthy (${ELAPSED}s)"
                  API_HEALTHY=true
                  break
                fi

                echo "⏳ Waiting for API... (${ELAPSED}s / ${MAX_WAIT}s)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done

              if [ "$API_HEALTHY" = "false" ]; then
                echo ""
                echo "❌ CRITICAL: API failed to become healthy!"
                echo "🔄 Initiating automatic rollback..."
                echo ""

                # Stop failed deployment
                docker compose -f docker-compose.production.yml down

                # Restore from backup
                echo "Restoring from backup: $BACKUP_DIR"
                cd "$BACKUP_DIR/app"
                docker compose -f docker-compose.production.yml up -d

                # Restore database if needed
                if [ -f "$BACKUP_DIR/database.sql" ]; then
                  echo "Restoring database..."
                  sudo -u postgres psql ectropy_production < "$BACKUP_DIR/database.sql" || echo "⚠️  Database restore failed"

                  # P0 Fix: Database Integrity Validation (as per BUILD-DEPLOY-VALIDATION-2025-11-17.md)
                  echo ""
                  echo "🔍 Validating database integrity after restore..."

                  # Validate _prisma_migrations table exists and has data
                  MIGRATION_COUNT=$(sudo -u postgres psql -d ectropy_production -t -c "SELECT COUNT(*) FROM _prisma_migrations;" 2>/dev/null | tr -d ' ')
                  if [ -n "$MIGRATION_COUNT" ] && [ "$MIGRATION_COUNT" -gt 0 ]; then
                    echo "✅ Database migrations table validated ($MIGRATION_COUNT migrations)"
                  else
                    echo "❌ Database integrity validation failed - no migrations found"
                    echo "⚠️  Database restore may be incomplete or corrupted"
                  fi

                  # Validate database can be connected to
                  if sudo -u postgres psql -d ectropy_production -c "SELECT 1;" >/dev/null 2>&1; then
                    echo "✅ Database connectivity validated"
                  else
                    echo "❌ Database connectivity failed after restore"
                  fi
                fi

                echo "✅ Rollback complete - backup restored"
                exit 1
              fi

              # Check Web health
              echo "Checking Web Dashboard..."
              if curl -sf http://localhost:3002 >/dev/null 2>&1; then
                echo "✅ Web Dashboard is healthy"
                WEB_HEALTHY=true
              else
                echo "⚠️  WARNING: Web Dashboard health check inconclusive"
                echo "API is healthy, proceeding with deployment"
              fi

              echo ""
              echo "✅ Hotfix deployment successful!"
            fi

            echo ""
            echo "========================================="
            echo "🎉 HOTFIX DEPLOYMENT COMPLETE"
            echo "========================================="
            echo "Version: v${{ needs.version-check.outputs.version }}"
            echo "Backup: $BACKUP_DIR"
            echo "Strategy: ${DEPLOYMENT_STRATEGY}"
            echo ""
            echo "Rollback command (if needed):"
            echo "  cd $BACKUP_DIR/app && docker compose -f docker-compose.production.yml up -d"
            echo "========================================="

      - name: Verify deployment
        run: |
          echo "🔍 Verifying hotfix deployment..."

          sleep 10

          # Check API health
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ectropy.ai/api/health || echo "000")
          if [ "$API_STATUS" -eq 200 ]; then
            echo "✅ API is healthy (status: $API_STATUS)"
          else
            echo "❌ API health check failed (status: $API_STATUS)"
            exit 1
          fi

          # Check Web health
          WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ectropy.ai || echo "000")
          if [ "$WEB_STATUS" -eq 200 ]; then
            echo "✅ Web Dashboard is healthy (status: $WEB_STATUS)"
          else
            echo "❌ Web Dashboard health check failed (status: $WEB_STATUS)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          release_name: Hotfix v${{ needs.version-check.outputs.version }}
          body: |
            ## 🔥 Hotfix Release v${{ needs.version-check.outputs.version }}

            This is an emergency hotfix release.

            See CHANGELOG.md for details on what was fixed.

            **Deployment Type:** Fast-track to production
            **Base Version:** v${{ needs.version-check.outputs.base_version }}
          draft: false
          prerelease: false

  merge-back:
    name: Merge Back to Main and Develop
    needs: [version-check, deploy-hotfix]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge hotfix to main
        run: |
          echo "Merging hotfix to main..."
          git fetch origin main
          git checkout main
          git merge --no-ff ${{ github.ref }} -m "Merge hotfix v${{ needs.version-check.outputs.version }} to main"
          git push origin main
          echo "✅ Merged to main"

      - name: Merge hotfix to develop
        run: |
          echo "Merging hotfix to develop..."
          git fetch origin develop
          git checkout develop
          git merge --no-ff ${{ github.ref }} -m "Merge hotfix v${{ needs.version-check.outputs.version }} to develop"
          git push origin develop
          echo "✅ Merged to develop"
        continue-on-error: true

  notify:
    name: Hotfix Notification
    needs: [version-check, deploy-hotfix, merge-back]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        run: |
          echo "# 🔥 Hotfix Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.version-check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Base Version:** v${{ needs.version-check.outputs.base_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Status:** ${{ needs.deploy-hotfix.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Merge Status:** ${{ needs.merge-back.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-hotfix.result }}" == "success" ]; then
            echo "🚀 **Hotfix deployed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Production URL:** https://ectropy.ai" >> $GITHUB_STEP_SUMMARY
            echo "**Deployment Strategy:** ${{ inputs.deployment_strategy || 'atomic' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Enterprise Safety Features:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Tests REQUIRED (no skip option)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Database backup created" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Application backup created" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Service management executed" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Health checks passed" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Automatic rollback ready" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Post-deployment checklist:**" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Verify production is working as expected" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Update CHANGELOG.md if not already done" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Communicate with team about hotfix" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Monitor logs for any issues" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Verify backup location in logs" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Hotfix deployment failed!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Automatic rollback may have been triggered.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check deployment logs for:" >> $GITHUB_STEP_SUMMARY
            echo "- Backup directory location" >> $GITHUB_STEP_SUMMARY
            echo "- Rollback status" >> $GITHUB_STEP_SUMMARY
            echo "- Service health check results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Manual rollback command:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "cd /opt/ectropy-backups/hotfix-v${{ needs.version-check.outputs.version }}-*/app" >> $GITHUB_STEP_SUMMARY
            echo "docker compose -f docker-compose.production.yml up -d" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
