name: Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - staging
          - production
      snapshot_name:
        description: 'Snapshot name to rollback to (leave empty for latest)'
        required: false
        type: string
      rollback_mode:
        description: 'Rollback mode'
        required: true
        type: choice
        default: 'emergency'
        options:
          - emergency
          - targeted
      confirm_rollback:
        description: 'Type ROLLBACK to confirm'
        required: true
        type: string

env:
  ROLLBACK_TIMEOUT: 300
  BACKUP_DIR: backups/rollback

# Enterprise Security: Explicit least-privilege permissions
# RESTRICTED: Emergency rollback needs read code and deploy
permissions:
  contents: read
  deployments: write

jobs:
  validate-confirmation:
    name: Validate Rollback Confirmation
    runs-on: ubuntu-latest
    outputs:
      confirmed: ${{ steps.check.outputs.confirmed }}
    steps:
      - name: Check confirmation input
        id: check
        run: |
          if [ "${{ github.event.inputs.confirm_rollback }}" != "ROLLBACK" ]; then
            echo "❌ Rollback not confirmed. Input must be exactly 'ROLLBACK'"
            exit 1
          fi
          echo "✅ Rollback confirmed"
          echo "confirmed=true" >> $GITHUB_OUTPUT

  pre-flight-checks:
    name: Pre-Flight Checks
    runs-on: ubuntu-latest
    needs: validate-confirmation
    outputs:
      docker_available: ${{ steps.docker.outputs.available }}
      compose_available: ${{ steps.compose.outputs.available }}
      tools_available: ${{ steps.tools.outputs.available }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Docker daemon
        id: docker
        run: |
          if docker info > /dev/null 2>&1; then
            echo "✅ Docker daemon is running"
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Docker daemon is not running"
            exit 1
          fi

      - name: Check Docker Compose
        id: compose
        run: |
          if docker compose version > /dev/null 2>&1; then
            echo "✅ Docker Compose is available"
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Docker Compose is not available"
            exit 1
          fi

      - name: Check required tools
        id: tools
        run: |
          for tool in curl jq; do
            if command -v $tool > /dev/null 2>&1; then
              echo "✅ $tool is available"
            else
              echo "❌ $tool is not installed"
              exit 1
            fi
          done
          echo "available=true" >> $GITHUB_OUTPUT

      - name: Check backup directory
        run: |
          if [ -d "backups/rollback" ]; then
            echo "✅ Backup directory exists"
          else
            echo "⚠️ Backup directory not found, creating..."
            mkdir -p backups/rollback
          fi

      - name: Check snapshot availability
        run: |
          if [ "$(ls -A backups/rollback 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "✅ Snapshots available for rollback"
          else
            echo "❌ No snapshots available for rollback"
            exit 1
          fi

      - name: Check disk space
        run: |
          disk_usage=$(df -h . | awk 'NR==2 {print $5}' | sed 's/%//')
          if [ "$disk_usage" -lt 90 ]; then
            echo "✅ Disk space sufficient (${disk_usage}% used)"
          else
            echo "⚠️ Disk space is low (${disk_usage}% used). Rollback may fail."
          fi

  snapshot-selection:
    name: Snapshot Selection and Validation
    runs-on: ubuntu-latest
    needs: pre-flight-checks
    outputs:
      snapshot_name: ${{ steps.select.outputs.snapshot_name }}
      snapshot_valid: ${{ steps.validate.outputs.valid }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List available snapshots
        run: |
          echo "## Available Snapshots"
          for snapshot_dir in backups/rollback/*; do
            if [ -d "$snapshot_dir" ] && [ -f "$snapshot_dir/metadata.json" ]; then
              snapshot_name=$(basename "$snapshot_dir")
              timestamp=$(jq -r '.timestamp' "$snapshot_dir/metadata.json")
              commit=$(jq -r '.git_commit' "$snapshot_dir/metadata.json" | cut -c1-8)
              echo "- $snapshot_name: $timestamp, commit: $commit"
            fi
          done

      - name: Select target snapshot
        id: select
        run: |
          if [ "${{ github.event.inputs.rollback_mode }}" == "emergency" ]; then
            echo "🚨 Emergency mode: selecting latest snapshot"
            SNAPSHOT_NAME=$(ls -t backups/rollback/ | head -1)
          else
            echo "🎯 Targeted mode: using specified snapshot"
            SNAPSHOT_NAME="${{ github.event.inputs.snapshot_name }}"
          fi

          if [ -z "$SNAPSHOT_NAME" ]; then
            echo "❌ No snapshot name provided or found"
            exit 1
          fi

          echo "Selected snapshot: $SNAPSHOT_NAME"
          echo "snapshot_name=$SNAPSHOT_NAME" >> $GITHUB_OUTPUT

      - name: Validate snapshot integrity
        id: validate
        run: |
          SNAPSHOT_NAME="${{ steps.select.outputs.snapshot_name }}"

          echo "Validating snapshot: $SNAPSHOT_NAME"

          # Check required files
          if [ ! -f "backups/rollback/$SNAPSHOT_NAME/metadata.json" ]; then
            echo "❌ metadata.json not found"
            exit 1
          fi

          if [ ! -f "backups/rollback/$SNAPSHOT_NAME/container_states.json" ]; then
            echo "❌ container_states.json not found"
            exit 1
          fi

          if [ ! -f "backups/rollback/$SNAPSHOT_NAME/current_images.json" ]; then
            echo "❌ current_images.json not found"
            exit 1
          fi

          # Validate JSON
          if ! jq empty "backups/rollback/$SNAPSHOT_NAME/metadata.json" 2>/dev/null; then
            echo "❌ metadata.json is not valid JSON"
            exit 1
          fi

          echo "✅ Snapshot validation passed"
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Display snapshot metadata
        run: |
          SNAPSHOT_NAME="${{ steps.select.outputs.snapshot_name }}"
          echo "## Snapshot Metadata"
          jq '.' "backups/rollback/$SNAPSHOT_NAME/metadata.json"

  pre-rollback-snapshot:
    name: Create Pre-Rollback Safety Snapshot
    runs-on: ubuntu-latest
    needs: snapshot-selection
    outputs:
      pre_snapshot_name: ${{ steps.create.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create pre-rollback snapshot name
        id: create
        run: |
          PRE_SNAPSHOT="pre-rollback-$(date +%Y%m%d-%H%M%S)"
          echo "Creating safety snapshot: $PRE_SNAPSHOT"
          echo "name=$PRE_SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Capture current container states
        run: |
          PRE_SNAPSHOT="${{ steps.create.outputs.name }}"
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          mkdir -p "backups/rollback/$PRE_SNAPSHOT"
          docker compose -f "$COMPOSE_FILE" ps --format json > "backups/rollback/$PRE_SNAPSHOT/container_states.json" 2>/dev/null || echo '[]' > "backups/rollback/$PRE_SNAPSHOT/container_states.json"

          echo "✅ Container states captured"

      - name: Capture current Docker images
        run: |
          PRE_SNAPSHOT="${{ steps.create.outputs.name }}"
          docker images --format json | jq 'select(.Repository | contains("ectropy"))' > "backups/rollback/$PRE_SNAPSHOT/current_images.json" 2>/dev/null || echo '[]' > "backups/rollback/$PRE_SNAPSHOT/current_images.json"

          echo "✅ Docker images captured"

      - name: Backup configuration files
        run: |
          PRE_SNAPSHOT="${{ steps.create.outputs.name }}"
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          [ -f .env ] && cp .env "backups/rollback/$PRE_SNAPSHOT/env_backup" || true
          [ -f "$COMPOSE_FILE" ] && cp "$COMPOSE_FILE" "backups/rollback/$PRE_SNAPSHOT/compose_backup.yml" || true

          echo "✅ Configuration files backed up"

      - name: Create snapshot metadata
        run: |
          PRE_SNAPSHOT="${{ steps.create.outputs.name }}"
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          cat > "backups/rollback/$PRE_SNAPSHOT/metadata.json" <<EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "environment": "${{ github.event.inputs.environment }}",
            "git_commit": "$(git rev-parse HEAD 2>/dev/null || echo 'unknown')",
            "git_branch": "$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'unknown')",
            "snapshot_name": "$PRE_SNAPSHOT",
            "compose_file": "$COMPOSE_FILE",
            "snapshot_type": "pre-rollback",
            "rollback_target": "${{ needs.snapshot-selection.outputs.snapshot_name }}"
          }
          EOF

          echo "✅ Snapshot metadata created"

  stop-current-deployment:
    name: Stop Current Deployment
    runs-on: ubuntu-latest
    needs: pre-rollback-snapshot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Graceful shutdown of all services
        id: graceful_stop
        continue-on-error: true
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"
          timeout ${{ env.ROLLBACK_TIMEOUT }} docker compose -f "$COMPOSE_FILE" down --remove-orphans 2>&1 | tee logs/rollback/stop_current.log || true

      - name: Force stop if graceful shutdown fails
        if: steps.graceful_stop.outcome == 'failure'
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"
          echo "⚠️ Graceful shutdown failed, forcing stop..."
          docker compose -f "$COMPOSE_FILE" kill || true
          docker compose -f "$COMPOSE_FILE" down --remove-orphans --volumes || true

      - name: Verify containers are stopped
        run: |
          if docker ps --filter 'name=ectropy' --format '{{.Names}}' | grep -q .; then
            echo "❌ Containers still running"
            docker ps --filter 'name=ectropy'
            exit 1
          else
            echo "✅ All containers stopped"
          fi

  restore-from-snapshot:
    name: Restore from Snapshot
    runs-on: ubuntu-latest
    needs: [snapshot-selection, stop-current-deployment]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore environment configuration
        continue-on-error: true
        run: |
          SNAPSHOT_NAME="${{ needs.snapshot-selection.outputs.snapshot_name }}"
          if [ -f "backups/rollback/$SNAPSHOT_NAME/env_backup" ]; then
            cp "backups/rollback/$SNAPSHOT_NAME/env_backup" .env
            echo "✅ Environment file restored"
          else
            echo "⚠️ No environment file in snapshot, using existing .env"
          fi

      - name: Restore Docker Compose configuration
        continue-on-error: true
        run: |
          SNAPSHOT_NAME="${{ needs.snapshot-selection.outputs.snapshot_name }}"
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          if [ -f "backups/rollback/$SNAPSHOT_NAME/compose_backup.yml" ]; then
            cp "backups/rollback/$SNAPSHOT_NAME/compose_backup.yml" "$COMPOSE_FILE"
            echo "✅ Compose file restored"
          else
            echo "⚠️ No compose file in snapshot, using existing configuration"
          fi

      - name: Verify Docker images availability
        continue-on-error: true
        run: |
          SNAPSHOT_NAME="${{ needs.snapshot-selection.outputs.snapshot_name }}"

          echo "## Docker Images Availability"
          jq -r '.[] | select(.Repository | contains("ectropy")) | "\(.Repository):\(.Tag)"' "backups/rollback/$SNAPSHOT_NAME/current_images.json" 2>/dev/null | while read -r image; do
            if [ -n "$image" ] && [ "$image" != "null" ]; then
              if docker images "$image" --format '{{.Repository}}:{{.Tag}}' | grep -q "$image"; then
                echo "✅ Image available: $image"
              else
                echo "⚠️ Image not available: $image (will be pulled from registry)"
              fi
            fi
          done

  start-restored-deployment:
    name: Start Restored Deployment
    runs-on: ubuntu-latest
    needs: restore-from-snapshot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start infrastructure services
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"
          echo "🚀 Starting infrastructure services..."
          timeout ${{ env.ROLLBACK_TIMEOUT }} docker compose -f "$COMPOSE_FILE" up -d postgres redis speckle-postgres speckle-redis 2>&1 | tee logs/rollback/start_infrastructure.log

      - name: Wait for infrastructure initialization
        run: |
          echo "⏳ Waiting 30 seconds for databases to initialize..."
          sleep 30

      - name: Start all application services
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"
          echo "🚀 Starting all application services..."
          timeout ${{ env.ROLLBACK_TIMEOUT }} docker compose -f "$COMPOSE_FILE" up -d 2>&1 | tee logs/rollback/start_application.log

  rollback-verification:
    name: Rollback Verification
    runs-on: ubuntu-latest
    needs: start-restored-deployment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for services to stabilize
        run: |
          echo "⏳ Waiting 60 seconds for services to stabilize..."
          sleep 60

      - name: Check container health status
        id: container_health
        continue-on-error: true
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          echo "## Container Health Status"
          unhealthy=$(docker compose -f "$COMPOSE_FILE" ps --format json | jq -r '.[] | select(.State != "running") | .Name' 2>/dev/null)

          if [ -z "$unhealthy" ]; then
            echo "✅ All containers are running"
          else
            echo "⚠️ Some containers are not running:"
            echo "$unhealthy"
          fi

      - name: Check API Gateway health
        id: api_health
        continue-on-error: true
        run: |
          echo "🔍 Checking API Gateway health..."

          max_retries=10
          retry_count=0

          while [ $retry_count -lt $max_retries ]; do
            if curl -f -s http://localhost:4000/health > /dev/null 2>&1; then
              echo "✅ API Gateway health check passed"
              exit 0
            fi

            retry_count=$((retry_count + 1))
            echo "⏳ Attempt $retry_count/$max_retries failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "❌ API Gateway health check failed after $max_retries attempts"
          exit 1

      - name: Check Redis connectivity
        id: redis_health
        continue-on-error: true
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          echo "🔍 Checking Redis connectivity..."
          if docker compose -f "$COMPOSE_FILE" exec -T redis redis-cli ping 2>/dev/null | grep -q "PONG"; then
            echo "✅ Redis is responding"
          else
            echo "⚠️ Redis health check failed"
          fi

      - name: Check database connectivity
        id: db_health
        continue-on-error: true
        run: |
          COMPOSE_FILE="docker-compose.${{ github.event.inputs.environment }}.yml"

          echo "🔍 Checking database connectivity..."
          max_retries=3
          retry_count=0

          while [ $retry_count -lt $max_retries ]; do
            if docker compose -f "$COMPOSE_FILE" exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
              echo "✅ Database is accessible"
              exit 0
            fi

            retry_count=$((retry_count + 1))
            echo "⏳ Attempt $retry_count/$max_retries failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "⚠️ Database connectivity check failed after $max_retries attempts"

      - name: Generate verification report
        run: |
          echo "## 🔍 Rollback Verification Report"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Snapshot: ${{ needs.snapshot-selection.outputs.snapshot_name }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo ""
          echo "### Health Checks"
          echo "- Container Health: ${{ steps.container_health.outcome }}"
          echo "- API Gateway: ${{ steps.api_health.outcome }}"
          echo "- Redis: ${{ steps.redis_health.outcome }}"
          echo "- Database: ${{ steps.db_health.outcome }}"
          echo ""

          if [ "${{ steps.api_health.outcome }}" == "success" ] && [ "${{ steps.db_health.outcome }}" == "success" ]; then
            echo "✅ **Rollback verification PASSED**"
            echo "rollback_status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ **Rollback verification completed with warnings**"
            echo "Please review service logs for any issues."
            echo "rollback_status=warning" >> $GITHUB_OUTPUT
          fi

  notification:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [snapshot-selection, rollback-verification]
    if: always()
    steps:
      - name: Prepare notification
        run: |
          echo "## 🚨 Emergency Rollback Notification"
          echo ""
          echo "**Environment:** ${{ github.event.inputs.environment }}"
          echo "**Mode:** ${{ github.event.inputs.rollback_mode }}"
          echo "**Snapshot:** ${{ needs.snapshot-selection.outputs.snapshot_name }}"
          echo "**Status:** ${{ needs.rollback-verification.result }}"
          echo "**Triggered by:** ${{ github.actor }}"
          echo "**Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo ""
          echo "**Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
