name: Retention Policy Enforcement

on:
  schedule:
    # Weekly Sunday 3 AM UTC (staggered after documentation-review at 2 AM)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual archiving)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  enforce-retention:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run retention enforcement (dry-run)
        if: github.event.inputs.dry_run == 'true'
        run: node scripts/governance/enforce-retention.js --dry-run

      - name: Run retention enforcement (actual)
        if: github.event.inputs.dry_run != 'true'
        run: node scripts/governance/enforce-retention.js

      - name: Regenerate markdown
        if: github.event.inputs.dry_run != 'true'
        run: node scripts/docs/generate-current-truth-md.js

      - name: Configure Git
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Retention Enforcement Bot"
          git config user.email "bot@ectropy.ai"

      - name: Commit and push changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git add docs/current-truth.json
          git add docs/CURRENT_TRUTH.md
          git add docs/archive/quarterly/*.json
          git add evidence/governance/retention-audit.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated retention enforcement [skip ci]
            
            - Archived expired nodes per retention policy
            - Updated current-truth.json and CURRENT_TRUTH.md
            - Audit trail: evidence/governance/retention-audit.json"
            git push
            echo "✅ Changes committed and pushed"
          fi

      - name: Upload audit log
        if: github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: retention-audit-log-${{ github.run_id }}
          path: evidence/governance/retention-audit.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "## 🔍 Retention Policy Dry Run" >> $GITHUB_STEP_SUMMARY
            echo "No changes were made to the repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Retention Policy Enforcement" >> $GITHUB_STEP_SUMMARY
            echo "Automated retention enforcement completed successfully." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
