name: 'Setup Node.js + pnpm + Nx with Enterprise Caching'
description: 'Enterprise-grade setup for Node.js, pnpm, and Nx with GitHub Actions caching patterns'
author: 'Ectropy Platform Engineering'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  install-dependencies:
    description: 'Whether to install dependencies with pnpm install'
    required: false
    default: 'true'
  frozen-lockfile:
    description: 'Use --frozen-lockfile for pnpm install'
    required: false
    default: 'true'
  prefer-offline:
    description: 'Use --prefer-offline for pnpm install'
    required: false
    default: 'true'
  install-timeout:
    description: 'Timeout in minutes for pnpm install'
    required: false
    default: '10'

outputs:
  pnpm-version:
    description: 'The pnpm version that was installed'
    value: ${{ steps.setup-pnpm.outputs.pnpm-version }}
  cache-hit-pnpm:
    description: 'Whether the pnpm cache was hit'
    value: ${{ steps.cache-pnpm.outputs.cache-hit }}
  cache-hit-nx:
    description: 'Whether the Nx cache was hit'
    value: ${{ steps.cache-nx.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack and Install pnpm
      id: setup-pnpm
      shell: bash
      run: |
        echo "🔧 Enabling Corepack and installing pnpm..."
        corepack enable

        # Extract pnpm version from package.json packageManager field
        PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
        echo "pnpm-version=${PNPM_VERSION}" >> $GITHUB_OUTPUT

        corepack prepare pnpm@${PNPM_VERSION} --activate

        echo "✅ pnpm ${PNPM_VERSION} installed"

    - name: Setup pnpm cache
      id: cache-pnpm
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Setup Nx cache
      id: cache-nx
      uses: actions/cache@v4
      with:
        path: .nx/cache
        key: ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/project.json', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-nx-${{ hashFiles('**/pnpm-lock.yaml') }}-
          ${{ runner.os }}-nx-

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        echo "📦 Installing dependencies with pnpm..."

        # Build install command with optional flags
        INSTALL_CMD="pnpm install"

        if [ "${{ inputs.frozen-lockfile }}" == "true" ]; then
          INSTALL_CMD="$INSTALL_CMD --frozen-lockfile"
        fi

        if [ "${{ inputs.prefer-offline }}" == "true" ]; then
          INSTALL_CMD="$INSTALL_CMD --prefer-offline"
        fi

        echo "Running: $INSTALL_CMD"

        # Run with timeout
        timeout ${{ inputs.install-timeout }}m $INSTALL_CMD

        echo "✅ Dependencies installed successfully"

branding:
  icon: 'package'
  color: 'blue'
