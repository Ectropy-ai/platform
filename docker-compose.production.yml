# Fortune 500 Container Security Defaults (CIS Docker Benchmark v1.6)
x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true # Prevent privilege escalation (CIS 5.25)

services:
  nginx:
    image: nginx:alpine
    container_name: ectropy-nginx
    <<: *security-defaults
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - '80:80'
    volumes:
      - ./infrastructure/nginx/ectropy-production.conf:/etc/nginx/sites-enabled/ectropy-production:ro
      - ./infrastructure/nginx/main.conf:/etc/nginx/nginx.conf:ro
    # NOTE: No SSL volumes needed — DO LB terminates TLS (HTTPS→HTTP on port 80)
    # All upstream containers listed — defense-in-depth alongside resolve parameter
    depends_on:
      api-gateway:
        condition: service_started
      web-dashboard:
        condition: service_started
      mcp-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - nginx
        - '-t'
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - ectropy-network
  api-gateway:
    image: registry.digitalocean.com/ectropy-registry/api-gateway:latest
    container_name: ectropy-api-gateway
    <<: *security-defaults
    # ENTERPRISE FIX (2025-12-19): P0 CRITICAL - Publish port for deployment health checks
    # Problem: Deployment script SSHes to host and curls localhost:4000/health
    # Without port publishing, host localhost:4000 cannot reach container
    # Docker healthcheck works (runs inside container) but deployment validation fails
    # Solution: Publish port 4000 to host for deployment script health validation
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      # Separate migration credentials (doadmin) from runtime (ectropy)
      # DO managed PostgreSQL 16 revokes CREATE on public schema for non-admin users
      - MIGRATION_DATABASE_URL=${MIGRATION_DATABASE_URL:-}
      - DATABASE_SSL=true
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID_PRODUCTION}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET_PRODUCTION}
      - OAUTH_CALLBACK_URL=https://ectropy.ai/api/auth/google/callback
      - AUTHORIZED_USERS=${AUTHORIZED_USERS:-}
      - API_URL=${API_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - MCP_API_KEY=${MCP_API_KEY}

      # Speckle BIM Integration
      # API Gateway needs these to authenticate with Speckle Server's GraphQL API
      - SPECKLE_SERVER_URL=${SPECKLE_SERVER_URL:-http://ectropy-speckle-server:3000}
      - SPECKLE_SERVER_TOKEN=${SPECKLE_SERVER_TOKEN}
      - SPECKLE_ADMIN_EMAIL=${SPECKLE_ADMIN_EMAIL:-speckle-admin@ectropy.ai}
      - SPECKLE_ADMIN_PASSWORD=${SPECKLE_ADMIN_PASSWORD}

      # Email Service - Resend (ENTERPRISE FIX 2025-12-21)
      # Transactional email for waitlist, password reset, email verification
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@ectropy.ai}
      - EMAIL_RETRY_ATTEMPTS=${EMAIL_RETRY_ATTEMPTS:-3}

      # Multi-Database Architecture (Phase 4 — DatabaseManager)
      - PLATFORM_DATABASE_URL=${PLATFORM_DATABASE_URL}
      - SHARED_DATABASE_URL=${SHARED_DATABASE_URL}
      # CRM Integration (Twenty CRM)
      - CRM_ENABLED=${CRM_ENABLED:-false}
      - CRM_API_URL=${CRM_API_URL:-}
      - CRM_API_KEY=${CRM_API_KEY:-}
      - CRM_WEBHOOK_SECRET=${CRM_WEBHOOK_SECRET:-}
    volumes:
      - speckle-tokens:/shared-tokens:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:4000/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '1.0'
          memory: 1024M
    networks:
      - ectropy-network
  web-dashboard:
    image: registry.digitalocean.com/ectropy-registry/web-dashboard:latest
    <<: *security-defaults
    # NOTE: Build args (REACT_APP_*) now baked into CI/CD image build
    # See: .github/workflows/build-production-images.yml
    container_name: ectropy-web-dashboard
    environment:
      - NODE_ENV=production
      - PORT=3002
      - VITE_API_URL=https://ectropy.ai/api
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:3002
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ectropy-network

  # Console service: Moved to private repo (DEC-002)
  # Image still published to DOCR by Ectropy-Business CI

  mcp-server:
    image: registry.digitalocean.com/ectropy-registry/mcp-server:latest
    container_name: ectropy-mcp
    <<: *security-defaults
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MCP_PORT=3001
      - EXPRESS_PORT=3002
      - MCP_API_KEY=${MCP_API_KEY}
      - VALIDATION_ONLY=true
      # ENTERPRISE FIX (ROOT CAUSE #24): Add missing environment variables for API Gateway communication
      # Required for Docker container networking and request handling behind reverse proxy
      - TRUST_PROXY=true
      - API_BASE_URL=https://ectropy.ai/api
      - API_GATEWAY_HOST=ectropy-api-gateway
      - API_GATEWAY_PORT=4000
      # ENTERPRISE FIX (2025-12-17): Add database configuration (ROOT CAUSE - MCP server crash)
      # MCP server requires database access for decision logs, infrastructure catalog, etc.
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SSL=true
      # Redis configuration for caching and session management
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # ENTERPRISE FIX (ROOT CAUSE #25): P0 CRITICAL - OAuth and Session Configuration
      # MCP Express app requires these variables for authentication middleware initialization
      # Without these, the app crashes during startup when initializing auth routes
      # Discovered: 2025-12-19 - Production deployment #20387025990
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID_PRODUCTION}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET_PRODUCTION}
      - OAUTH_CALLBACK_URL=https://ectropy.ai/api/auth/google/callback
      # ENTERPRISE FIX (2026-01-15): ROOT CAUSE #68 - MCP Server API_URL Production Validation Failure
      # Problem: API_URL missing from MCP environment, causing "API_URL must not be localhost in production" error
      # Impact: MCP server fails CORS configuration, health checks fail, deployment blocked
      # Root Cause: env-schema.ts:530 validates API_URL, env-schema.ts:706 rejects localhost in production
      # Solution: Add API_URL and use variable substitution for FRONTEND_URL (no hardcoding)
      # Pattern: Follow API Gateway pattern (lines 52-78) - use ${VARIABLE} for environment-specific URLs
      - API_URL=${API_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${FRONTEND_URL}
      # Seppä Agent Infrastructure - Qdrant Vector Database for RAG
      - QDRANT_HOST=ectropy-qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Seppä Agent Infrastructure - Twilio for Phone Agent
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      # Seppä Agent Infrastructure - Claude API for Assistant
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Seppä Agent Infrastructure - Jina AI for RAG Embeddings
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_EMBEDDING_MODEL=${JINA_EMBEDDING_MODEL:-jina-embeddings-v3}
    ports:
      - '3001:3001'
      - '3002:3002'
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    # Enterprise Health Check System - 4-Layer Architecture (Kubernetes-compatible)
    # Available endpoints:
    #   /lb-health     - Ultra-lightweight (load balancer optimized, <1ms)
    #   /ping          - Minimal check (container alive)
    #   /health/live   - Liveness probe (process responsive)
    #   /health/ready  - Readiness probe (ready to serve traffic)
    #   /health/startup- Startup probe (initialization complete)
    #   /health        - Full health check (all components)
    # Docker healthcheck uses /lb-health for fast, efficient container monitoring
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:3001/lb-health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - ectropy-network
  redis:
    image: redis:7-alpine
    container_name: ectropy-redis
    <<: *security-defaults
    read_only: true
    tmpfs:
      - /tmp
    # ENTERPRISE FIX (2025-12-18): P0 CRITICAL - Redis Password in Container Environment
    # Required for healthcheck authentication (healthcheck runs inside container)
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 450mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    restart: unless-stopped
    # ENTERPRISE FIX (2025-12-17): ROOT CAUSE #54 - Authenticate Redis healthcheck
    # Problem: redis-cli ping fails when --requirepass is set (NOAUTH error)
    # Solution: Use redis-cli -a ${REDIS_PASSWORD} ping for authenticated healthcheck
    # Note: redis-cli automatically reads REDIS_PASSWORD from environment when using -a flag
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ectropy-network
  # NOTE: certbot service REMOVED — DO LB manages Let's Encrypt auto-renewal
  # via digitalocean_certificate resource (see terraform/environments/production/main.tf)

  # =============================================================================
  # Seppä Agent Infrastructure - EIL (Ectropy Intelligence Layer)
  # =============================================================================

  # Qdrant Vector Database - Powers RAG layer for semantic search
  # Required for: Assistant context retrieval, document search, similarity matching
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: ectropy-qdrant
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      # Enterprise: Enable API key authentication in production
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
      # Performance tuning for production workloads
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=4
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB=20000
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    # Qdrant image has no curl/wget, /bin/sh is dash (no /dev/tcp).
    # Use bash explicitly for TCP probe.
    # FIX (2026-03-06): curl-based check failed 27,705 times on staging.
    healthcheck:
      test:
        ['CMD', 'bash', '-c', '(echo > /dev/tcp/localhost/6333) 2>/dev/null']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - ectropy-network

  # =============================================================================
  # Speckle BIM Integration Services (PRODUCTION)
  # =============================================================================
  # Enterprise-grade BIM viewing, sharing, and collaboration platform
  # Official Speckle Server: https://github.com/specklesystems/speckle-server
  # ENTERPRISE FIX (2026-01-23): Added Speckle services to production
  # ROOT CAUSE: 502 errors on /speckle/* endpoints - services not deployed
  # =============================================================================

  # Speckle Database Initialization (Init Container Pattern)
  # Creates "speckle" database before Speckle server starts
  speckle-db-init:
    image: postgres:15-alpine
    container_name: ectropy-speckle-db-init
    environment:
      # ENTERPRISE FIX (2026-03-09): Use doadmin credentials for DDL operations
      # Root Cause (chain-9): ectropy user lacks CREATE DATABASE privilege on DO managed PostgreSQL 16
      # Uses Compose interpolation (not $$ shell refs) — values baked in at parse time
      PGPASSWORD: ${DB_ADMIN_PASSWORD}
    command: >
      sh -c '
        echo "=========================================" &&
        echo "SPECKLE DATABASE INITIALIZATION" &&
        echo "=========================================" &&
        echo "Waiting for external PostgreSQL (max 60s)..." &&
        ATTEMPT=0 &&
        until psql "postgresql://doadmin:${DB_ADMIN_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/${DATABASE_NAME}?sslmode=require" -c "\q" 2>/dev/null; do
          ATTEMPT=$$((ATTEMPT + 1)) &&
          if [ $$ATTEMPT -ge 30 ]; then echo "FATAL: PostgreSQL unreachable after 60s"; exit 1; fi &&
          echo "  Attempt $$ATTEMPT/30 - retrying in 2s..." &&
          sleep 2
        done &&
        echo "PostgreSQL ready. Creating Speckle database..." &&
        psql "postgresql://doadmin:${DB_ADMIN_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/${DATABASE_NAME}?sslmode=require" -tc "SELECT 1 FROM pg_database WHERE datname = '\''speckle'\''" | grep -q 1 ||
        psql "postgresql://doadmin:${DB_ADMIN_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/${DATABASE_NAME}?sslmode=require" -c "CREATE DATABASE speckle;" &&
        echo "Granting speckle database access to runtime user..." &&
        psql "postgresql://doadmin:${DB_ADMIN_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require" -c "GRANT ALL PRIVILEGES ON DATABASE speckle TO ${DATABASE_USER};" &&
        psql "postgresql://doadmin:${DB_ADMIN_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require" -c "GRANT ALL ON SCHEMA public TO ${DATABASE_USER};" &&
        echo "Speckle database ready" &&
        echo "========================================="
      '
    restart: 'no'
    labels:
      com.ectropy.service: 'speckle-database-init'
      com.ectropy.type: 'init-container'
      com.ectropy.purpose: 'Create Speckle database before server startup'
    networks:
      - ectropy-network

  speckle-server:
    image: speckle/speckle-server:2
    container_name: ectropy-speckle-server
    restart: unless-stopped
    environment:
      # Server URL configuration (production environment)
      CANONICAL_URL: ${SPECKLE_PUBLIC_URL:-https://ectropy.ai/speckle}
      PRIVATE_OBJECTS_SERVER_URL: http://speckle-server:3000

      # Session security (from GitHub Secrets)
      SESSION_SECRET: ${SPECKLE_SESSION_SECRET}

      # Authentication strategy
      STRATEGY_LOCAL: 'true'
      FIRST_USER_ADMIN: 'true'

      # Logging (production level)
      LOG_LEVEL: warn
      LOG_PRETTY: 'false'

      # Database configuration (external DigitalOcean PostgreSQL)
      # Speckle knexfile.ts: when POSTGRES_USER+PASSWORD are set, it builds URI
      # without sslmode. So we pass a full connection string via POSTGRES_URL
      # and omit the individual vars to force the else-path (raw URI mode).
      POSTGRES_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

      # Redis configuration (internal Redis, separate DB index)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      PREVIEW_SERVICE_USE_PRIVATE_OBJECTS_SERVER_URL: 'true'
      PREVIEW_SERVICE_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FILEIMPORT_SERVICE_USE_PRIVATE_OBJECTS_SERVER_URL: 'true'
      FILEIMPORT_SERVICE_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1

      # MinIO S3-compatible object storage
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_URL:-https://ectropy.ai/minio}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_BUCKET: speckle-server
      S3_CREATE_BUCKET: 'true'
      S3_REGION: 'us-east-1'

      # File upload limits (production-ready)
      FILE_SIZE_LIMIT_MB: 2000

      # Email configuration - Resend SMTP
      EMAIL_FROM: ${RESEND_FROM_EMAIL:-speckle@ectropy.ai}
      EMAIL_HOST: smtp.resend.com
      EMAIL_PORT: 587
      EMAIL_USERNAME: resend
      EMAIL_PASSWORD: ${RESEND_API_KEY}
      EMAIL_SECURE: 'false'
      EMAIL_REQUIRE_TLS: 'true'

      # Frontend URL
      FRONTEND_ORIGIN: ${SPECKLE_PUBLIC_URL:-https://ectropy.ai/speckle}

      # File import queue
      FILEIMPORT_QUEUE_POSTGRES_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require
      FF_NEXT_GEN_FILE_IMPORTER_ENABLED: 'true'

      # Trust proxy (nginx reverse proxy)
      TRUST_PROXY: 'true'
    ports:
      - '3100:3000'
    depends_on:
      speckle-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    # Speckle v2 images are distroless (no /bin/sh), node at /nodejs/bin/node not in PATH
    # This healthcheck gates speckle-admin-bootstrap via depends_on: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          '/nodejs/bin/node',
          '-e',
          'fetch(''http://localhost:3000/graphql'',{method:''POST'',headers:{''Content-Type'':''application/json''},body:''{"query":"{serverInfo{name}}"}''}).then(r=>r.json()).then(d=>process.exit(d.data&&d.data.serverInfo?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - ectropy-network

  # Speckle Admin Bootstrap (Init Container Pattern)
  # Registers admin user, creates service PAT, writes to shared volume for api-gateway
  speckle-admin-bootstrap:
    image: alpine:3.19
    container_name: ectropy-speckle-admin-bootstrap
    environment:
      SPECKLE_ADMIN_EMAIL: ${SPECKLE_ADMIN_EMAIL:-speckle-admin@ectropy.ai}
      SPECKLE_ADMIN_PASSWORD: ${SPECKLE_ADMIN_PASSWORD}
    volumes:
      - speckle-tokens:/shared-tokens
    command: >
      sh -c '
        echo "=========================================" &&
        echo "SPECKLE ADMIN & TOKEN BOOTSTRAP" &&
        echo "=========================================" &&

        echo "Installing curl and jq..." &&
        apk add --no-cache curl jq 2>&1 | tail -1 || {
          echo "FATAL: Could not install curl/jq." &&
          exit 1
        } &&

        SPECKLE_URL="http://ectropy-speckle-server:3000" &&
        TOKEN_FILE="/shared-tokens/speckle-service-token" &&

        if [ -z "$$SPECKLE_ADMIN_EMAIL" ] || [ -z "$$SPECKLE_ADMIN_PASSWORD" ]; then
          echo "FATAL: SPECKLE_ADMIN_EMAIL and SPECKLE_ADMIN_PASSWORD are required" &&
          exit 1
        fi &&

        echo "" &&
        CHALLENGE=$$(head -c 32 /dev/urandom | base64 | tr -dc '\''a-zA-Z0-9'\'' | head -c 32) &&
        echo "Step 1: Registering admin user ($$SPECKLE_ADMIN_EMAIL)..." &&
        REGISTER_RESP=$$(curl -s -o /dev/null -w "%{redirect_url}" \
          -X POST "$$SPECKLE_URL/auth/local/register?challenge=$$CHALLENGE" \
          -H "Content-Type: application/json" \
          -d "{\"email\":\"$$SPECKLE_ADMIN_EMAIL\",\"password\":\"$$SPECKLE_ADMIN_PASSWORD\",\"name\":\"Ectropy Admin\",\"company\":\"Ectropy\"}") &&
        ACCESS_CODE=$$(echo "$$REGISTER_RESP" | grep -oE "access_code=[^&]+" | cut -d= -f2) &&

        if [ -z "$$ACCESS_CODE" ]; then
          echo "  Registration returned no access_code (user may exist), trying login..." &&
          LOGIN_RESP=$$(curl -s -o /dev/null -w "%{redirect_url}" \
            -X POST "$$SPECKLE_URL/auth/local/login?challenge=$$CHALLENGE" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$$SPECKLE_ADMIN_EMAIL\",\"password\":\"$$SPECKLE_ADMIN_PASSWORD\"}") &&
          ACCESS_CODE=$$(echo "$$LOGIN_RESP" | grep -oE "access_code=[^&]+" | cut -d= -f2)
        fi &&

        if [ -z "$$ACCESS_CODE" ]; then
          echo "FATAL: Could not obtain access_code from register or login" &&
          exit 1
        fi &&
        echo "  Got access_code: $${ACCESS_CODE:0:8}..." &&

        echo "" &&
        echo "Step 2: Exchanging access_code for JWT..." &&
        TOKEN_RESP=$$(curl -sf "$$SPECKLE_URL/auth/token" \
          -H "Content-Type: application/json" \
          -d "{\"appId\":\"spklwebapp\",\"appSecret\":\"spklwebapp\",\"accessCode\":\"$$ACCESS_CODE\",\"challenge\":\"$$CHALLENGE\"}") &&
        JWT=$$(echo "$$TOKEN_RESP" | sed -n "s/.*\"token\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p") &&

        if [ -z "$$JWT" ]; then
          echo "FATAL: Could not obtain JWT from token exchange" &&
          echo "  Response: $$TOKEN_RESP" &&
          exit 1
        fi &&
        echo "  Got JWT: $${JWT:0:20}..." &&

        echo "" &&
        echo "Step 3: Checking shared volume for existing valid token..." &&
        if [ -f "$$TOKEN_FILE" ]; then
          EXISTING=$$(cat "$$TOKEN_FILE" | tr -d "[:space:]") &&
          if [ -n "$$EXISTING" ]; then
            CHECK=$$(curl -s "$$SPECKLE_URL/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $$EXISTING" \
              -d "{\"query\":\"{ activeUser { id } }\"}" 2>/dev/null || true) &&
            if echo "$$CHECK" | grep -q "\"activeUser\""; then
              echo "  Existing token is valid — skipping PAT creation" &&
              echo "=========================================" &&
              echo "SPECKLE BOOTSTRAP COMPLETE (token reused)" &&
              echo "=========================================" &&
              exit 0
            fi &&
            echo "  Existing token is no longer valid — creating new PAT"
          fi
        else
          echo "  No token file found — creating new PAT"
        fi &&

        echo "" &&
        echo "Step 4: Creating service PAT via apiTokenCreate..." &&
        CREATE_RESP=$$(curl -sf "$$SPECKLE_URL/graphql" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $$JWT" \
          -d "{\"query\":\"mutation{apiTokenCreate(token:{name:\\\"Ectropy Service Token\\\",scopes:[\\\"streams:read\\\",\\\"streams:write\\\",\\\"profile:read\\\",\\\"users:read\\\"],lifespan:3154000000000})}\"}") &&
        SERVICE_TOKEN=$$(echo "$$CREATE_RESP" | jq -r ".data.apiTokenCreate // empty" 2>/dev/null) &&

        if [ -z "$$SERVICE_TOKEN" ]; then
          echo "FATAL: apiTokenCreate returned no token" &&
          echo "  Response: $$CREATE_RESP" &&
          exit 1
        fi &&
        echo "  PAT created: $${SERVICE_TOKEN:0:10}..." &&

        echo "" &&
        echo "Step 5: Writing service token to shared volume..." &&
        echo -n "$$SERVICE_TOKEN" > "$$TOKEN_FILE" &&
        chmod 644 "$$TOKEN_FILE" &&
        echo "  Written to $$TOKEN_FILE" &&

        echo "" &&
        echo "Step 6: Validating service token via GraphQL (HARD FAIL if invalid)..." &&
        VERIFY=$$(curl -s "$$SPECKLE_URL/graphql" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $$SERVICE_TOKEN" \
          -d "{\"query\":\"{ activeUser { id email name role } }\"}") &&

        if echo "$$VERIFY" | grep -q "\"activeUser\""; then
          VERIFIED_EMAIL=$$(echo "$$VERIFY" | jq -r ".data.activeUser.email // \"unknown\"" 2>/dev/null) &&
          VERIFIED_ROLE=$$(echo "$$VERIFY" | jq -r ".data.activeUser.role // \"unknown\"" 2>/dev/null) &&
          echo "  Token validation PASSED" &&
          echo "  Authenticated as: $$VERIFIED_EMAIL (role: $$VERIFIED_ROLE)"
        else
          echo "FATAL: Service token validation FAILED after creation" &&
          echo "  Response: $$VERIFY" &&
          exit 1
        fi &&

        echo "" &&
        echo "=========================================" &&
        echo "SPECKLE BOOTSTRAP COMPLETE" &&
        echo "  Admin: $$SPECKLE_ADMIN_EMAIL" &&
        echo "  Token: $${SERVICE_TOKEN:0:10}... (Speckle-generated, bcrypt in DB)" &&
        echo "  Scopes: streams:read, streams:write, profile:read, users:read" &&
        echo "  Shared volume: $$TOKEN_FILE" &&
        echo "========================================="
      '
    depends_on:
      speckle-server:
        condition: service_healthy
    restart: on-failure:5
    labels:
      com.ectropy.service: 'speckle-admin-bootstrap'
      com.ectropy.type: 'init-container'
      com.ectropy.purpose: 'Bootstrap Speckle admin user and create service PAT via Speckle API'
    networks:
      - ectropy-network

  speckle-frontend:
    image: speckle/speckle-frontend-2:2
    container_name: ectropy-speckle-frontend
    restart: unless-stopped
    environment:
      # Server name
      NUXT_PUBLIC_SERVER_NAME: 'Ectropy Production'

      # Public-facing URLs (accessed by browser via nginx)
      NUXT_PUBLIC_API_ORIGIN: ${SPECKLE_PUBLIC_URL:-https://ectropy.ai/speckle}
      NUXT_PUBLIC_BASE_URL: ${SPECKLE_PUBLIC_URL:-https://ectropy.ai/speckle}

      # Backend URL (Docker network internal)
      NUXT_PUBLIC_BACKEND_API_ORIGIN: http://speckle-server:3000

      # Redis for SSR caching
      NUXT_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1

      # Logging (production level)
      NUXT_PUBLIC_LOG_LEVEL: error
      LOG_LEVEL: warn
      LOG_PRETTY: 'false'

      # Feature flags
      NUXT_PUBLIC_FF_LARGE_FILE_IMPORTS_ENABLED: 'true'
      NUXT_PUBLIC_FF_NEXT_GEN_FILE_IMPORTER_ENABLED: 'true'
    ports:
      - '3101:8080'
    depends_on:
      - speckle-server
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ectropy-network

  speckle-preview:
    image: speckle/speckle-preview-service:2
    container_name: ectropy-speckle-preview
    restart: unless-stopped
    environment:
      HOST: '0.0.0.0'
      PORT: '3001'
      LOG_LEVEL: warn
      LOG_PRETTY: 'false'
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '0.5'
          memory: 1024M
    networks:
      - ectropy-network

  speckle-webhook:
    image: speckle/speckle-webhook-service:2
    container_name: ectropy-speckle-webhook
    restart: unless-stopped
    environment:
      LOG_LEVEL: warn
      LOG_PRETTY: 'false'
      PG_CONNECTION_STRING: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    depends_on:
      - speckle-server
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ectropy-network

  speckle-fileimport:
    image: speckle/speckle-fileimport-service:2
    container_name: ectropy-speckle-fileimport
    restart: unless-stopped
    environment:
      LOG_LEVEL: warn
      LOG_PRETTY: 'false'

      # Speckle Server URLs (internal Docker network)
      SPECKLE_SERVER_URL: http://ectropy-speckle-server:3000
      CANONICAL_URL: ${SPECKLE_PUBLIC_URL:-https://ectropy.ai/speckle}

      # Redis configuration
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1

      # PostgreSQL configuration (full connection string — see speckle-server comment)
      POSTGRES_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
      PG_CONNECTION_STRING: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require
      FILEIMPORT_QUEUE_POSTGRES_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-25060}/speckle?sslmode=require
    depends_on:
      - speckle-server
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ectropy-network

  minio:
    image: minio/minio:latest
    container_name: ectropy-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_DOMAIN: ectropy.ai
      MINIO_SERVER_URL: https://ectropy.ai/minio
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - http://localhost:9000/minio/health/live
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ectropy-network

volumes:
  redis-data: null
  qdrant-data: null
  minio-data: null
  speckle-tokens:
    driver: local

networks:
  ectropy-network:
    driver: bridge
